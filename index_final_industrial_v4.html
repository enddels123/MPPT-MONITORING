<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISOKUIKI Industrial V4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,sans-serif}
body{background:#06111d;color:#fff;padding:10px}
.topbar{background:#0b1f33;border:1px solid #1f4c73;border-radius:12px;padding:12px;margin-bottom:10px}
.main-grid{display:grid;grid-template-columns:340px 1fr;gap:10px}
.scada{background:#0b1f33;border:1px solid #1f4c73;border-radius:16px;height:300px;padding:10px}
.flow{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px}
.node{width:90px;height:90px;border-radius:50%;border:2px solid #00e5ff;display:flex;flex-direction:column;justify-content:center;align-items:center}
.line{width:4px;height:18px;background:#00e5ff}
.right-panel{display:grid;grid-template-rows:145px 145px;gap:10px}
.top-cards,.bottom-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#0b1f33;border:1px solid #1f4c73;border-radius:16px;padding:10px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.chart{background:#0b1f33;border:1px solid #1f4c73;border-radius:16px;height:260px;padding:10px}
@media(max-width:900px){.main-grid,.chart-row{grid-template-columns:1fr}.top-cards,.bottom-cards{grid-template-columns:repeat(2,1fr)}.scada{height:auto}}
</style>
</head>
<body>
<div class="topbar"><h2>ISOKUIKI INDUSTRIAL SCADA V4</h2></div>

<div class="main-grid">
  <div class="scada">
    <div class="flow">
      <div class="node">☀ SOLAR</div>
      <div class="line"></div>
      <div class="node">⚡ MPPT</div>
      <div class="line"></div>
      <div class="node">🔋 BATTERY</div>
      <div class="line"></div>
      <div class="node">🏠 LOAD DC</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="top-cards">
      <div class="card">PV</div>
      <div class="card">BATTERY</div>
      <div class="card">LOAD</div>
      <div class="card">MPPT</div>
    </div>
    <div class="bottom-cards">
      <div class="card">ENERGY</div>
      <div class="card">INCOME</div>
      <div class="card">WIFI</div>
      <div class="card">HEALTH</div>
    </div>
  </div>
</div>

<div class="chart-row">
  <div class="chart">Realtime Power</div>
  <div class="chart">Energy Production</div>
</div>

</body>
</html>
