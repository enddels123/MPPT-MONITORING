<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#010611,
#02142d
);

color:white;
}

/* ========================================= */

.main{

width:100vw;
height:100vh;

display:flex;
flex-direction:column;
}

/* ========================================= */

.header{

height:7vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;
}

.header h1{

font-size:
clamp(15px,1.4vw,28px);

color:#00ffd5;

text-shadow:
0 0 15px #00ffd5;
}

.network{

font-size:
clamp(9px,0.7vw,12px);

margin-top:2px;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* ========================================= */

.status-center{

height:9vh;

display:flex;

justify-content:center;
align-items:center;
}

.device-box{

width:
min(70vw,420px);

padding:
clamp(6px,0.7vw,14px);

border-radius:18px;

background:
rgba(10,20,40,0.95);

border:
2px solid #00ff88;

text-align:center;

font-size:
clamp(12px,1vw,22px);

font-weight:bold;

box-shadow:
0 0 18px rgba(0,255,140,0.28);
}

/* ========================================= */

.content{

flex:1;

display:grid;

grid-template-columns:
minmax(180px,28%)
1fr;

gap:10px;

padding:8px;

width:100%;
height:100%;

overflow:hidden;

align-items:center;
}

/* ========================================= */

.left-panel{

width:100%;
height:100%;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;
}

/* ========================================= */

.power-wrapper{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

width:100%;

height:100%;

transform-origin:center center;

scale:min(
1,
calc(100vw / 900),
calc(100vh / 700)
);
}

/* ========================================= */

.node-wrap{

display:flex;
flex-direction:column;
align-items:center;
}

/* ========================================= */

.circle-node{

width:
clamp(60px,5vw,100px);

height:
clamp(60px,5vw,100px);

border-radius:50%;

background:
rgba(10,20,35,0.95);

border:
2px solid rgba(0,255,200,0.4);

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

box-shadow:
0 0 15px rgba(0,255,200,0.22);
}

.circle-node img{

width:
clamp(18px,1.8vw,35px);

height:
clamp(18px,1.8vw,35px);

margin-bottom:3px;
}

.node-title{

margin-top:4px;

font-size:
clamp(7px,0.6vw,11px);

color:#00ffd5;
}

.node-value{

font-size:
clamp(6px,0.55vw,10px);

display:flex;
flex-direction:column;

align-items:center;
}

/* ========================================= */

.line-vertical{

width:3px;

height:
clamp(35px,3vw,55px);

background:#355b8c;

position:relative;
}

.split-system{

position:relative;

width:
clamp(120px,11vw,220px);

height:
clamp(45px,4vw,70px);
}

.line-horizontal{

position:absolute;

top:0;

left:0;

width:100%;
height:3px;

background:#355b8c;
}

.line-left{

position:absolute;

left:0;
top:0;

width:3px;
height:100%;

background:#355b8c;
}

.line-right{

position:absolute;

right:0;
top:0;

width:3px;
height:100%;

background:#355b8c;
}

/* ========================================= */

.bottom-nodes{

display:flex;

justify-content:space-between;

width:
clamp(120px,11vw,220px);
}

/* ========================================= */

.flow-node{

width:
clamp(5px,0.5vw,10px);

height:
clamp(5px,0.5vw,10px);

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:
0 0 10px #00ff88;
}

/* ========================================= */

.flow-pv{

left:-1px;

animation:
flowPV 1s linear infinite;
}

.flow-battery{

left:-1px;

animation:
flowBattery 1s linear infinite;
}

.flow-energy{

left:-1px;

animation:
flowEnergy 1s linear infinite;
}

/* ========================================= */

@keyframes flowPV{

0%{
top:0;
opacity:0;
}

25%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowBattery{

0%{
top:0;
opacity:0;
}

25%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowEnergy{

0%{
top:0;
opacity:0;
}

25%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

/* ========================================= */

.right-panel{

display:flex;

flex-direction:column;

justify-content:space-between;

gap:8px;

height:100%;

overflow:hidden;
}

/* ========================================= */

.flow{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(140px,1fr)
);

gap:8px;

width:100%;
}

/* ========================================= */

.box{

background:
rgba(16,25,43,0.88);

border-radius:12px;

padding:8px;

box-shadow:
0 0 10px rgba(0,255,200,0.08);
}

.box h2{

text-align:center;

margin-bottom:6px;

color:#00ffd5;

font-size:
clamp(9px,0.75vw,13px);
}

/* ========================================= */

.data{

display:flex;

justify-content:space-between;

padding:5px;

margin-top:5px;

background:#111b2d;

border-radius:6px;

font-size:
clamp(7px,0.65vw,11px);
}

/* ========================================= */

.soc-bar{

width:100%;
height:8px;

background:#1c2740;

border-radius:10px;

overflow:hidden;

margin-top:8px;
}

.soc-fill{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);
}

/* ========================================= */

.chart-grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(180px,1fr)
);

gap:8px;

width:100%;

height:32%;
}

/* ========================================= */

.chart-box{

background:
rgba(16,25,43,0.88);

border-radius:12px;

padding:6px;

position:relative;

width:100%;

height:100%;

min-height:120px;

overflow:hidden;
}

/* ========================================= */

@media(max-width:1000px){

.content{

grid-template-columns:
35% 65%;
}

.power-wrapper{

scale:0.78;
}

.chart-grid{

height:28%;
}
}

/* ========================================= */

@media(max-width:700px){

.content{

grid-template-columns:
32% 68%;

gap:4px;

padding:4px;
}

.power-wrapper{

scale:0.58;
}

.flow{

grid-template-columns:
repeat(2,1fr);

gap:4px;
}

.chart-grid{

grid-template-columns:1fr;

height:22%;
}

.chart-box{

min-height:95px;
}

.box{

padding:5px;
}

.data{

padding:4px;

font-size:9px;
}
}

/* ========================================= */

@media(max-width:430px){

.power-wrapper{

scale:0.50;
}

.device-box{

font-size:11px;

padding:5px;
}

.chart-box{

min-height:85px;
}
}

</style>

</head>

<body>

<div class="main">

<div class="header">

<h1>
ISOKUIKI SMART ENERGY
</h1>

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

</div>

<div class="status-center">

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

<div class="content">

<div class="left-panel">

<div class="power-wrapper">

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/2933/2933821.png">

<div class="node-value">

<span id="pv_v_circle">0V</span>
<span id="pv_i_circle">0A</span>
<span id="pv_p_circle">0W</span>

</div>

</div>

<div class="node-title">
PHOTOVOLTAIC
</div>

</div>

<div class="line-vertical">

<div class="flow-node flow-pv"></div>

</div>

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div class="node-value">

<span id="mppt_power_circle">0W</span>
<span id="mppt_eff_circle">0%</span>

</div>

</div>

<div class="node-title">
MPPT
</div>

</div>

<div class="split-system">

<div class="line-horizontal"></div>

<div class="line-left">

<div class="flow-node flow-battery"></div>

</div>

<div class="line-right">

<div class="flow-node flow-energy"></div>

</div>

</div>

<div class="bottom-nodes">

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">

<div class="node-value">

<span id="bat_v_circle">0V</span>
<span id="bat_i_circle">0A</span>
<span id="soc_circle">0%</span>

</div>

</div>

<div class="node-title">
BATTERY
</div>

</div>

<div class="node-wrap">

<div class="circle-node">

<div style="font-size:24px">
⚡
</div>

<div class="node-value">

<span id="energy_day_circle">
0
</span>

<span>
KWH
</span>

</div>

</div>

<div class="node-title">
ENERGY
</div>

</div>

</div>

</div>

</div>

<div class="right-panel">

<div class="flow">

<div class="box">

<h2>PHOTOVOLTAIC</h2>

<div class="data">
<span>V</span>
<span id="pv_v">0</span>
</div>

<div class="data">
<span>A</span>
<span id="pv_i">0</span>
</div>

<div class="data">
<span>W</span>
<span id="pv_p">0</span>
</div>

</div>

<div class="box">

<h2>MPPT</h2>

<div class="data">
<span>Charge</span>
<span id="charge_p">0</span>
</div>

<div class="data">
<span>Eff</span>
<span id="mppt_eff">0</span>
</div>

</div>

<div class="box">

<h2>BATTERY</h2>

<div class="data">
<span>V</span>
<span id="bat_v">0</span>
</div>

<div class="data">
<span>A</span>
<span id="bat_i">0</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0</span>
</div>

<div class="soc-bar">

<div class="soc-fill"
id="soc_fill"></div>

</div>

<div style="
text-align:center;
margin-top:5px;
font-size:9px;
"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>ENERGY</h2>

<div class="data">
<span>DAY</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>MONTH</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<div class="chart-grid">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyDayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyMonthChart"></canvas>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
