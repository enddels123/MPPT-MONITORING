<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART MONITOR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#070b16;

  font-family:'Orbitron',sans-serif;

  color:white;

  overflow-x:hidden;
}

.header{

  text-align:center;

  padding:20px;
}

.header h1{

  color:#00ffd5;

  font-size:30px;

  text-shadow:0 0 20px #00ffd5;
}

/* ================= MAIN ================= */

.container{

  width:95%;

  margin:auto;

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:20px;
}

/* ================= LEFT ================= */

.left{

  background:#10192b;

  border-radius:20px;

  padding:20px;

  position:relative;

  overflow:hidden;

  box-shadow:
  0 0 25px rgba(0,255,200,0.15);
}

/* ================= ENERGY ICON ================= */

.energy-icon{

  width:130px;

  display:block;

  margin:auto;

  animation:float 3s ease-in-out infinite;
}

@keyframes float{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* ================= FLOW DOT ================= */

.flow{

  position:absolute;

  width:100%;

  height:100%;

  top:0;

  left:0;

  pointer-events:none;
}

.dot{

  width:8px;

  height:8px;

  background:#00ff88;

  border-radius:50%;

  position:absolute;

  animation:moveDot 3s linear infinite;
}

.dot:nth-child(1){

  top:20%;
  animation-delay:0s;
}

.dot:nth-child(2){

  top:45%;
  animation-delay:1s;
}

.dot:nth-child(3){

  top:70%;
  animation-delay:2s;
}

@keyframes moveDot{

  0%{

    left:-10%;
    opacity:0;
  }

  20%{

    opacity:1;
  }

  100%{

    left:110%;
    opacity:0;
  }
}

/* ================= STATUS ================= */

.status{

  text-align:center;

  margin-top:20px;

  font-size:24px;

  color:#00ff88;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.5;
  }

  50%{
    opacity:1;
  }

  100%{
    opacity:0.5;
  }
}

/* ================= PROGRESS ================= */

.progress-container{

  margin-top:25px;
}

.progress-text{

  display:flex;

  justify-content:space-between;

  margin-bottom:10px;
}

.progress-bar{

  width:100%;

  height:20px;

  background:#1a2333;

  border-radius:20px;

  overflow:hidden;
}

.progress{

  width:0%;

  height:100%;

  background:
  linear-gradient(
  90deg,
  #00ff88,
  #00ffd5
  );

  transition:1s;
}

/* ================= CARD ================= */

.cards{

  margin-top:30px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:15px;
}

.card{

  background:#151f34;

  border-radius:15px;

  padding:15px;

  text-align:center;

  box-shadow:
  0 0 10px rgba(0,255,200,0.1);

  transition:0.3s;
}

.card:hover{

  transform:translateY(-5px);
}

.card h3{

  color:#00ffd5;

  margin-bottom:10px;

  font-size:14px;
}

.value{

  font-size:22px;

  font-weight:bold;
}

/* ================= RIGHT ================= */

.right{

  background:#10192b;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 0 25px rgba(0,255,200,0.15);
}

.chart-title{

  text-align:center;

  color:#00ffd5;

  margin-bottom:20px;
}

.chart-box{

  margin-bottom:30px;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

  .container{

    grid-template-columns:1fr;
  }

  .cards{

    grid-template-columns:1fr;
  }
}

</style>

</head>

<body>

<div class="header">

  <h1>
    ⚡ SMART ENERGY MONITOR ⚡
  </h1>

</div>

<div class="container">

  <!-- LEFT -->

  <div class="left">

    <div class="flow">

      <div class="dot"></div>

      <div class="dot"></div>

      <div class="dot"></div>

    </div>

    <img
    class="energy-icon"
    src="https://cdn-icons-png.flaticon.com/512/595/595067.png">

    <div
    class="status"
    id="status">

      DEVICE WORKING

    </div>

    <!-- PROGRESS -->

    <div class="progress-container">

      <div class="progress-text">

        <span>LOAD</span>

        <span id="loadPercent">
          0%
        </span>

      </div>

      <div class="progress-bar">

        <div
        class="progress"
        id="progress">

        </div>

      </div>

    </div>

    <!-- CARDS -->

    <div class="cards">

      <div class="card">

        <h3>Voltage</h3>

        <div
        class="value"
        id="voltage">

          0 V

        </div>

      </div>

      <div class="card">

        <h3>Current</h3>

        <div
        class="value"
        id="current">

          0 A

        </div>

      </div>

      <div class="card">

        <h3>Power</h3>

        <div
        class="value"
        id="power">

          0 W

        </div>

      </div>

      <div class="card">

        <h3>Battery</h3>

        <div
        class="value"
        id="battery">

          0 %

        </div>

      </div>

      <div class="card">

        <h3>Efficiency</h3>

        <div
        class="value"
        id="efficiency">

          0 %

        </div>

      </div>

      <div class="card">

        <h3>Daily</h3>

        <div
        class="value"
        id="daily">

          0 kWh

        </div>

      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="right">

    <h2 class="chart-title">

      Hourly / Daily / Monthly

    </h2>

    <div class="chart-box">

      <canvas id="hourChart"></canvas>

    </div>

    <div class="chart-box">

      <canvas id="dayChart"></canvas>

    </div>

    <div class="chart-box">

      <canvas id="monthChart"></canvas>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
