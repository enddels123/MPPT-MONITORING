<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:#010b1d;

color:#fff;

overflow:hidden;

}

/* MAIN */

.main{

width:100vw;
height:100vh;

display:grid;

grid-template-columns:
26% 74%;

grid-template-rows:
11vh 34vh 25vh 30vh;

gap:.5vh;

padding:.5vh;

}

/* HEADER */

.header{

grid-column:1/3;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

.title{

font-size:2.2vh;

color:#00ffe1;

text-shadow:
0 0 15px #00ffe1;

}

.online{

font-size:1vh;

color:#00ff88;

margin-top:.2vh;

}

.device{

margin-top:.6vh;

width:38vw;
height:3.8vh;

border:
2px solid #00ffb3;

border-radius:1vh;

display:flex;
justify-content:center;
align-items:center;

font-size:1.1vh;

font-weight:bold;

box-shadow:
0 0 15px #00ffb3;

}

/* SCADA */

.scada{

grid-row:2/5;

background:#04152d;

border-radius:1vh;

padding:.5vh;

overflow:hidden;

}

svg{

width:100%;
height:100%;

}

/* DATA GRID */

.dataGrid{

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

gap:.5vh;

}

.box{

background:#04152d;

border-radius:1vh;

padding:.7vh;

aspect-ratio:1/1;

overflow:hidden;

}

.boxTitle{

text-align:center;

font-size:1vh;

margin-bottom:.5vh;

color:#00ffe1;

}

.row{

display:flex;
justify-content:space-between;

padding:.25vh 0;

font-size:.85vh;

border-bottom:
1px solid rgba(255,255,255,.08);

}

/* CHART */

.chartGrid{

grid-column:2/3;

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:.5vh;

}

.chartBox{

background:#04152d;

border-radius:1vh;

padding:.5vh;

aspect-ratio:1/1;

overflow:hidden;

}

.chartTitle{

text-align:center;

font-size:.9vh;

margin-bottom:.3vh;

color:#00ffe1;

}

.chartCanvas{

position:relative;

width:100%;
height:85%;

}

/* RESPONSIVE */

@media(max-width:900px){

.main{

grid-template-columns:
38% 62%;

grid-template-rows:
10vh 32vh 25vh 33vh;

}

.device{

width:65vw;

}

.title{

font-size:2vh;

}

}

/* SCADA GLOW */

circle{

filter:
drop-shadow(0 0 8px #00ffe1);

}

</style>

</head>

<body>

<div class="main">

<!-- HEADER -->

<div class="header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online"
id="onlineText">
OFFLINE
</div>

<div class="device"
id="deviceStatus">
DEVICE SHUTDOWN
</div>

</div>

<!-- SCADA -->

<div class="scada">

<svg viewBox="0 0 400 700">

<!-- FLOW -->

<path d="
M200 135
L200 230
"

stroke="#36a3ff"
stroke-width="5"
fill="none"/>

<path d="
M200 335
L110 335
L110 505
"

stroke="#36a3ff"
stroke-width="5"
fill="none"/>

<path d="
M200 335
L290 335
L290 505
"

stroke="#36a3ff"
stroke-width="5"
fill="none"/>

<!-- NODE -->

<circle id="n1"
r="8"
fill="#00ff88"/>

<circle id="n2"
r="8"
fill="#00ff88"/>

<circle id="n3"
r="8"
fill="#00ff88"/>

<!-- PV -->

<circle cx="200"
cy="80"
r="55"

fill="#031326"
stroke="#00ffe1"
stroke-width="4"/>

<text x="200"
y="88"

fill="#fff"
font-size="18"
text-anchor="middle">
PV
</text>

<!-- MPPT -->

<circle cx="200"
cy="280"
r="55"

fill="#031326"
stroke="#00ffe1"
stroke-width="4"/>

<text x="200"
y="288"

fill="#fff"
font-size="18"
text-anchor="middle">
MPPT
</text>

<!-- BAT -->

<circle cx="110"
cy="560"
r="55"

fill="#031326"
stroke="#00ffe1"
stroke-width="4"/>

<text x="110"
y="568"

fill="#fff"
font-size="18"
text-anchor="middle">
BAT
</text>

<!-- LOAD -->

<circle cx="290"
cy="560"
r="55"

fill="#031326"
stroke="#00ffe1"
stroke-width="4"/>

<text x="290"
y="568"

fill="#fff"
font-size="18"
text-anchor="middle">
LOAD
</text>

</svg>

</div>

<!-- DATA -->

<div class="dataGrid">

<div class="box">

<div class="boxTitle">
PHOTOVOLTAIC
</div>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="box">

<div class="boxTitle">
MPPT
</div>

<div class="row">
<span>Charge</span>
<span id="charge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="eff">0%</span>
</div>

</div>

<div class="box">

<div class="boxTitle">
BATTERY
</div>

<div class="row">
<span>Voltage</span>
<span id="bv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bi">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="soc">0%</span>
</div>

</div>

<div class="box">

<div class="boxTitle">
ENERGY
</div>

<div class="row">
<span>Daily</span>
<span id="day">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="month">0</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="chartGrid">

<div class="chartBox">

<div class="chartTitle">
PV POWER
</div>

<div class="chartCanvas">
<canvas id="gauge1"></canvas>
</div>

</div>

<div class="chartBox">

<div class="chartTitle">
BATTERY SOC
</div>

<div class="chartCanvas">
<canvas id="gauge2"></canvas>
</div>

</div>

<div class="chartBox">

<div class="chartTitle">
MPPT EFFICIENCY
</div>

<div class="chartCanvas">
<canvas id="gauge3"></canvas>
</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
