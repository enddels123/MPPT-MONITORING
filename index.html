<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>ISOKUIKI</title>

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
rel="stylesheet"
/>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#000814,
#001233
);

height:100vh;

overflow:hidden;

color:white;
}

.dashboard{

width:100vw;
height:100vh;

display:grid;

grid-template-rows:
8vh 8vh 1fr;

gap:1vh;

padding:1vh;
}

/* HEADER */

.header{

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;
}

.title{

font-size:
clamp(20px,2vw,42px);

color:#00ffe1;

text-shadow:
0 0 10px #00ffe1;
}

#network{

font-size:
clamp(10px,.8vw,16px);

margin-top:.3vh;
}

/* STATUS */

.status{

display:flex;

justify-content:center;
align-items:center;
}

#deviceStatus{

width:min(60vw,520px);

height:100%;

display:flex;

justify-content:center;
align-items:center;

border-radius:40px;

border:
3px solid #00ff99;

background:
rgba(0,20,40,.8);

box-shadow:
0 0 18px #00ff99;
}

/* MAIN */

.main{

display:grid;

grid-template-columns:
28% 72%;

gap:1vh;
}

/* SCADA */

.scada{

background:
rgba(0,10,30,.7);

border-radius:20px;

display:flex;

justify-content:center;
align-items:center;
}

/* RIGHT */

.right{

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

gap:1vh;
}

/* WIDGET */

.widget{

background:
rgba(0,15,40,.85);

border-radius:18px;

padding:1vh;
}

.widget h3{

text-align:center;

margin-bottom:1vh;

color:#00ffe1;
}

.row{

display:flex;

justify-content:space-between;

padding:.5vh;

margin-bottom:.5vh;

background:
rgba(255,255,255,.04);

border-radius:8px;
}

/* SOC */

.socbar{

height:10px;

background:#1e293b;

border-radius:20px;

overflow:hidden;
}

.socfill{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffe1
);
}

/* RESPONSIVE */

@media(max-width:900px){

.main{

grid-template-columns:
35% 65%;
}
}

</style>
</head>

<body>

<div class="dashboard">

<div class="header">

<div class="title">
ISOKUIKI
</div>

<div id="network">
OFFLINE
</div>

</div>

<div class="status">

<div id="deviceStatus">
DEVICE SHUTDOWN
</div>

</div>

<div class="main">

<!-- SCADA -->

<div class="scada">

<svg
viewBox="0 0 400 500"
width="100%"
height="100%">

<!-- FLOW -->

<line
x1="200"
y1="100"
x2="200"
y2="200"
stroke="#3b82f6"
stroke-width="5"
/>

<line
x1="200"
y1="250"
x2="110"
y2="250"
stroke="#3b82f6"
stroke-width="5"
/>

<line
x1="110"
y1="250"
x2="110"
y2="360"
stroke="#3b82f6"
stroke-width="5"
/>

<line
x1="200"
y1="250"
x2="290"
y2="250"
stroke="#3b82f6"
stroke-width="5"
/>

<line
x1="290"
y1="250"
x2="290"
y2="360"
stroke="#3b82f6"
stroke-width="5"
/>

<!-- PV -->

<circle
cx="200"
cy="60"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<!-- MPPT -->

<circle
cx="200"
cy="200"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<!-- BAT -->

<circle
cx="110"
cy="400"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<!-- ENERGY -->

<circle
cx="290"
cy="400"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

</svg>

</div>

<!-- RIGHT -->

<div class="right">

<div class="widget">

<h3>PHOTOVOLTAIC</h3>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="widget">

<h3>MPPT</h3>

<div class="row">
<span>Charge</span>
<span id="cpp">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpe">0%</span>
</div>

</div>

<div class="widget">

<h3>BATTERY</h3>

<div class="row">
<span>Voltage</span>
<span id="bvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bii">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="socc">0%</span>
</div>

<div class="socbar">
<div
id="socfill"
class="socfill">
</div>
</div>

</div>

<div class="widget">

<h3>ENERGY</h3>

<div class="row">
<span>Daily</span>
<span id="dayy">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthh">0</span>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
