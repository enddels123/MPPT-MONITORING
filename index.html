<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#010611,
#02142d
);

color:white;

overflow-x:hidden;
}

/* =========================================
HEADER
========================================= */

.header{

text-align:center;

padding:15px;
}

.header h1{

font-size:
clamp(22px,3vw,48px);

color:#00ffd5;

text-shadow:
0 0 25px #00ffd5;
}

/* =========================================
NETWORK
========================================= */

.network{

text-align:center;

margin-bottom:10px;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* =========================================
LAYOUT
========================================= */

.dashboard-grid{

display:grid;

grid-template-columns:
0.9fr 1.1fr;

gap:18px;

padding:12px;

min-height:100vh;
}

/* =========================================
LEFT PANEL
========================================= */

.left-panel{

display:flex;

flex-direction:column;

align-items:center;
}

/* =========================================
DEVICE
========================================= */

.status-widget{

display:flex;

flex-direction:column;

align-items:center;

margin-bottom:25px;
}

.status-icon{

font-size:
clamp(45px,6vw,80px);

margin-bottom:8px;
}

.device-box{

width:
min(95%,520px);

padding:
clamp(16px,2vw,28px);

border-radius:28px;

background:
rgba(10,20,40,0.95);

border:
4px solid #00ff88;

text-align:center;

font-size:
clamp(20px,2vw,36px);

font-weight:bold;

box-shadow:
0 0 35px rgba(0,255,140,0.35);
}

/* =========================================
FLOW
========================================= */

.power-wrapper{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;
}

.node-wrap{

display:flex;

flex-direction:column;

align-items:center;
}

.circle-node{

width:
clamp(95px,9vw,160px);

height:
clamp(95px,9vw,160px);

border-radius:50%;

background:
rgba(10,20,35,0.95);

border:
2px solid rgba(0,255,200,0.45);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

box-shadow:
0 0 30px rgba(0,255,200,0.28);
}

.circle-node img{

width:
clamp(32px,4vw,65px);

height:
clamp(32px,4vw,65px);

object-fit:contain;

margin-bottom:6px;
}

.node-title{

margin-top:10px;

font-size:
clamp(12px,1vw,20px);

color:#00ffd5;
}

.node-value{

display:flex;

flex-direction:column;

align-items:center;

gap:2px;

font-size:
clamp(8px,0.9vw,14px);
}

/* LINE */

.line-vertical{

width:4px;

height:
clamp(70px,7vw,110px);

background:#355b8c;

position:relative;
}

.split-system{

position:relative;

width:
clamp(180px,24vw,400px);

height:
clamp(80px,7vw,120px);
}

.line-horizontal{

position:absolute;

top:0;

left:0;

width:100%;

height:4px;

background:#355b8c;
}

.line-left{

position:absolute;

left:0;

top:0;

width:4px;

height:100%;

background:#355b8c;
}

.line-right{

position:absolute;

right:0;

top:0;

width:4px;

height:100%;

background:#355b8c;
}

.bottom-nodes{

display:flex;

justify-content:space-between;

width:
clamp(180px,24vw,400px);
}

/* =========================================
FLOW NODE
========================================= */

.flow-node{

width:
clamp(10px,1vw,16px);

height:
clamp(10px,1vw,16px);

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:
0 0 20px #00ff88;
}

/* PV */

.flow-pv{

left:-4px;

animation:
flowPV 1.1s linear infinite;
}

/* BATTERY */

.flow-battery{

left:-4px;

animation:
flowBattery 1.2s linear infinite;
}

/* ENERGY */

.flow-energy{

left:-4px;

animation:
flowEnergy 1.2s linear infinite;
}

/* ANIMATION */

@keyframes flowPV{

0%{
top:0;
opacity:0;
}

30%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowBattery{

0%{
top:0;
opacity:0;
}

30%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowEnergy{

0%{
top:0;
opacity:0;
}

30%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

/* =========================================
RIGHT PANEL
========================================= */

.right-panel{

display:flex;

flex-direction:column;

gap:16px;
}

/* WIDGET */

.flow{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:16px;
}

.box{

background:
rgba(16,25,43,0.88);

border-radius:20px;

padding:18px;

box-shadow:
0 0 25px rgba(0,255,200,0.1);
}

.box h2{

text-align:center;

margin-bottom:14px;

color:#00ffd5;

font-size:
clamp(14px,1.2vw,22px);
}

.data{

display:flex;

justify-content:space-between;

padding:12px;

margin-top:10px;

background:#111b2d;

border-radius:12px;

font-size:
clamp(11px,1vw,15px);
}

/* SOC */

.soc-bar{

width:100%;

height:18px;

background:#1c2740;

border-radius:18px;

overflow:hidden;

margin-top:15px;
}

.soc-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

transition:1s;
}

/* =========================================
CHART
========================================= */

.chart-grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:16px;
}

.chart-box{

height:
clamp(180px,18vw,260px);

background:
rgba(16,25,43,0.88);

border-radius:20px;

padding:14px;
}

/* =========================================
MOBILE
========================================= */

@media(max-width:1000px){

.dashboard-grid{

grid-template-columns:1fr;
}

.chart-grid{

grid-template-columns:1fr;
}

.flow{

grid-template-columns:1fr 1fr;
}
}

@media(max-width:700px){

.flow{

grid-template-columns:1fr;
}

.chart-box{

height:220px;
}

.dashboard-grid{

padding:8px;
}
}

</style>

</head>

<body>

<div class="header">

<h1>
ISOKUIKI SMART ENERGY
</h1>

</div>

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

<div class="dashboard-grid">

<!-- LEFT -->

<div class="left-panel">

<!-- DEVICE -->

<div class="status-widget">

<div class="status-icon">
⚡
</div>

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

<!-- FLOW -->

<div class="power-wrapper">

<!-- PV -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/2933/2933821.png">

<div class="node-value">

<span id="pv_v_circle">0V</span>
<span id="pv_i_circle">0A</span>
<span id="pv_p_circle">0W</span>

</div>

</div>

<div class="node-title">
PHOTOVOLTAIC
</div>

</div>

<div class="line-vertical">

<div class="flow-node flow-pv"></div>

</div>

<!-- MPPT -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div class="node-value">

<span id="mppt_power_circle">0W</span>
<span id="mppt_eff_circle">0%</span>

</div>

</div>

<div class="node-title">
MPPT
</div>

</div>

<!-- SPLIT -->

<div class="split-system">

<div class="line-horizontal"></div>

<div class="line-left">

<div class="flow-node flow-battery"></div>

</div>

<div class="line-right">

<div class="flow-node flow-energy"></div>

</div>

</div>

<!-- BOTTOM -->

<div class="bottom-nodes">

<!-- BATTERY -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">

<div class="node-value">

<span id="bat_v_circle">0V</span>
<span id="bat_i_circle">0A</span>
<span id="soc_circle">0%</span>

</div>

</div>

<div class="node-title">
BATTERY
</div>

</div>

<!-- ENERGY -->

<div class="node-wrap">

<div class="circle-node">

<div style="
font-size:
clamp(28px,5vw,55px)
">
⚡
</div>

<div class="node-value">

<span id="energy_day_circle">0</span>

<span>KWH DAY</span>

</div>

</div>

<div class="node-title">
ENERGY
</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-panel">

<!-- WIDGET -->

<div class="flow">

<div class="box">

<h2>☀️ PHOTOVOLTAIC</h2>

<div class="data">
<span>Voltage</span>
<span id="pv_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="pv_i">0</span>
</div>

<div class="data">
<span>Power</span>
<span id="pv_p">0</span>
</div>

</div>

<div class="box">

<h2>⚙️ MPPT</h2>

<div class="data">
<span>Charge Power</span>
<span id="charge_p">0</span>
</div>

<div class="data">
<span>Efficiency</span>
<span id="mppt_eff">0</span>
</div>

</div>

<div class="box">

<h2>🔋 BATTERY</h2>

<div class="data">
<span>Voltage</span>
<span id="bat_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="bat_i">0</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0</span>
</div>

<div class="soc-bar">

<div class="soc-fill"
id="soc_fill"></div>

</div>

<div style="
text-align:center;
margin-top:15px;
"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>⚡ ENERGY</h2>

<div class="data">
<span>Daily kWh</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>Monthly kWh</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="chart-grid">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyDayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyMonthChart"></canvas>
</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
