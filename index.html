<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JNGE Solar Monitor</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      background: #0a0f1c;
      color: #00ffcc;
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 20px;
    }

    .card {
      background: #111a2e;
      padding: 20px;
      border-radius: 12px;
      font-size: 18px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ffcc;
    }

    h1 {
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>⚡ JNGE SOLAR MONITOR</h1>

<div class="grid">

  <div class="card">PV Voltage<br><span id="pv_v">0</span> V</div>
  <div class="card">PV Current<br><span id="pv_i">0</span> A</div>
  <div class="card">PV Power<br><span id="pv_p">0</span> W</div>

  <div class="card">Battery Voltage<br><span id="bat_v">0</span> V</div>
  <div class="card">Battery Current<br><span id="bat_i">0</span> A</div>

  <div class="card">kWh Day<br><span id="kwh_day">0</span></div>
  <div class="card">kWh Month<br><span id="kwh_month">0</span></div>

</div>

<script src="app.js"></script>

</body>
</html>
