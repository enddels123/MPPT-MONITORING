<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ISOKUIKI SMART ENERGY</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(180deg,#050b14,#071320,#0a1625);
color:#fff;
padding:10px;
min-height:100vh;
}
.topbar{
background:#0b1f33;
border-radius:18px;
padding:12px 18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
border:1px solid #1d3b59;
}
.dashboard-top{
display:grid;
grid-template-columns:320px 1fr;
gap:12px;
}
.scada{
background:#0b1f33;
border-radius:20px;
padding:15px;
border:1px solid #1d3b59;
}
.flow{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}
.node{
width:140px;
height:140px;
border-radius:50%;
background:#102842;
border:3px solid #00ffe5;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
box-shadow:0 0 18px rgba(0,255,229,.35);
}
.node h3{font-size:14px;margin-bottom:6px}
.big{font-size:22px;font-weight:bold}
.line{
width:6px;height:55px;background:#12385c;
border-radius:10px;position:relative;overflow:hidden;
}
.line:before{
content:'';position:absolute;width:100%;height:22px;
background:#00ffe5;animation:flow 1.2s linear infinite;
}
@keyframes flow{0%{top:-22px}100%{top:100%}}

.gaugeGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.card{
background:#0b1f33;
border-radius:18px;
padding:10px;
border:1px solid #1d3b59;
}
.card h3{margin-bottom:8px}
.gauge{height:120px}
.infoGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}
.infoCard{
background:#0b1f33;
border-radius:18px;
padding:12px;
border:1px solid #1d3b59;
}
.infoCard h3{margin-bottom:8px}
.value{font-size:22px;font-weight:bold}
.chartBox{
background:#0b1f33;
border-radius:18px;
padding:10px;
border:1px solid #1d3b59;
margin-top:10px;
}
canvas{width:100%!important}

@media(max-width:768px){
.dashboard-top{grid-template-columns:1fr}
.gaugeGrid{grid-template-columns:repeat(2,1fr)}
.infoGrid{grid-template-columns:1fr 1fr}
.node{width:120px;height:120px}
}
</style>
</head>
<body>

<div class="topbar">
<div><h2>ISOKUIKI SMART ENERGY</h2></div>
<div>
<div>Status : <span id="onlineText">OFFLINE</span></div>
<div id="deviceStatus">NO DATA</div>
</div>
</div>

<div class="dashboard-top">

<div class="scada">
<div class="flow">

<div class="node">
<h3>☀ SOLAR</h3>
<div class="big" id="pvPowerScada">0W</div>
<div id="pvInfoScada">0V | 0A</div>
</div>

<div class="line"></div>

<div class="node">
<h3>⚡ MPPT</h3>
<div class="big" id="mpptEffScada">0%</div>
</div>

<div class="line"></div>

<div class="node">
<h3>🔋 BATTERY</h3>
<div class="big" id="batterySocScada">0%</div>
<div id="batteryInfoScada">0V | 0A</div>
</div>

<div class="line"></div>

<div class="node">
<h3>🏠 LOAD</h3>
<div class="big" id="loadPowerScada">0W</div>
<div id="loadInfoScada">0V | 0A</div>
</div>

</div>
</div>

<div class="gaugeGrid">

<div class="card">
<h3>PV</h3>
<div class="gauge"><canvas id="gaugePV"></canvas></div>
<div class="value" id="pvPower">0W</div>
<div id="pvVoltage">0V</div>
<div id="pvCurrent">0A</div>
</div>

<div class="card">
<h3>BATTERY</h3>
<div class="gauge"><canvas id="gaugeBAT"></canvas></div>
<div class="value" id="batterySoc">0%</div>
<div id="batteryVoltage">0V</div>
<div id="batteryCurrent">0A</div>
</div>

<div class="card">
<h3>LOAD</h3>
<div class="gauge"><canvas id="gaugeLOAD"></canvas></div>
<div class="value" id="loadPower">0W</div>
<div id="loadVoltage">0V</div>
<div id="loadCurrent">0A</div>
</div>

<div class="card">
<h3>MPPT</h3>
<div class="gauge"><canvas id="gaugeEFF"></canvas></div>
<div class="value" id="mpptEff">0%</div>
</div>

</div>
</div>

<div class="infoGrid">

<div class="infoCard">
<h3>Energy</h3>
<div id="todayEnergy">0 kWh</div>
<div id="monthEnergy">0 kWh</div>
<div id="totalEnergy">0 kWh</div>
</div>

<div class="infoCard">
<h3>Income</h3>
<div id="todayIncome">Rp 0</div>
<div id="monthIncome">Rp 0</div>
<div id="totalIncome">Rp 0</div>
</div>

<div class="infoCard">
<h3>WiFi</h3>
<div id="wifiRSSI">0 dBm</div>
</div>

<div class="infoCard">
<h3>Health</h3>
<div id="systemHealth">NORMAL</div>
</div>

</div>

<div class="chartBox">
<h3>Realtime Power</h3>
<canvas id="realtimeChart"></canvas>
</div>

<div class="chartBox">
<h3>Energy Production</h3>
<canvas id="energyChart"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
