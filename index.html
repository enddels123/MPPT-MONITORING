<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART ENERGY</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#010611,
#02142d
);

color:white;

overflow-x:hidden;
}

/* =========================================
HEADER
========================================= */

.header{

text-align:center;

padding:20px;
}

.header h1{

font-size:
clamp(24px,4vw,52px);

color:#00ffd5;

text-shadow:
0 0 25px #00ffd5;
}

/* =========================================
NETWORK
========================================= */

.network{

text-align:center;

margin-bottom:20px;

font-size:
clamp(14px,2vw,20px);
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* =========================================
DEVICE
========================================= */

.status-widget{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

margin-bottom:30px;
}

.status-icon{

font-size:
clamp(50px,8vw,90px);

margin-bottom:10px;
}

.device-box{

width:
min(92%,700px);

padding:
clamp(18px,3vw,35px);

border-radius:30px;

background:
rgba(10,20,40,0.95);

border:
4px solid #00ff88;

text-align:center;

font-size:
clamp(22px,3vw,46px);

font-weight:bold;

box-shadow:
0 0 40px rgba(0,255,180,0.35);
}

/* =========================================
PERFECT FLOW
========================================= */

.power-wrapper{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

width:100%;

padding:
clamp(10px,2vw,30px);
}

.node-wrap{

display:flex;

flex-direction:column;

align-items:center;
}

.circle-node{

width:
clamp(95px,12vw,170px);

height:
clamp(95px,12vw,170px);

border-radius:50%;

background:
rgba(10,20,35,0.95);

border:
2px solid rgba(0,255,200,0.45);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

box-shadow:
0 0 30px rgba(0,255,200,0.28);

backdrop-filter:blur(12px);
}

.circle-node img{

width:
clamp(34px,5vw,70px);

height:
clamp(34px,5vw,70px);

object-fit:contain;

margin-bottom:5px;
}

.node-title{

margin-top:10px;

font-size:
clamp(12px,1.5vw,22px);

color:#00ffd5;

text-align:center;
}

.node-value{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:2px;

font-size:
clamp(9px,1vw,14px);
}

/* LINE */

.line-vertical{

width:5px;

height:
clamp(70px,8vw,120px);

background:#355b8c;

position:relative;
}

.split-system{

position:relative;

width:
clamp(180px,28vw,420px);

height:
clamp(80px,8vw,120px);
}

.line-horizontal{

position:absolute;

top:0;

left:0;

width:100%;

height:5px;

background:#355b8c;
}

.line-left{

position:absolute;

left:0;

top:0;

width:5px;

height:100%;

background:#355b8c;
}

.line-right{

position:absolute;

right:0;

top:0;

width:5px;

height:100%;

background:#355b8c;
}

.bottom-nodes{

display:flex;

justify-content:space-between;

align-items:flex-start;

width:
clamp(180px,28vw,420px);
}

/* FLOW DOT */

.flow-dot{

width:
clamp(10px,1.5vw,18px);

height:
clamp(10px,1.5vw,18px);

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:
0 0 20px #00ff88;
}

.vertical-dot{

left:-3px;

animation:
flowVertical 1.2s linear infinite;
}

.horizontal-dot{

top:-3px;

animation:
flowHorizontal 1.4s linear infinite;
}

@keyframes flowVertical{

0%{
transform:translateY(0px);
opacity:0;
}

25%{
opacity:1;
}

100%{
transform:translateY(100%);
opacity:0;
}
}

@keyframes flowHorizontal{

0%{
transform:translateX(0px);
opacity:0;
}

25%{
opacity:1;
}

100%{
transform:translateX(100%);
opacity:0;
}
}

/* =========================================
WIDGET
========================================= */

.flow{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:20px;

width:min(96%,1600px);

margin:auto;

padding:20px;
}

.box{

background:
rgba(16,25,43,0.9);

border-radius:20px;

padding:20px;

box-shadow:
0 0 25px rgba(0,255,200,0.12);
}

.box h2{

text-align:center;

margin-bottom:15px;

color:#00ffd5;
}

.data{

display:flex;

justify-content:space-between;

padding:14px;

margin-top:12px;

background:#111b2d;

border-radius:12px;

font-size:
clamp(12px,1.2vw,16px);
}

/* SOC */

.soc-bar{

width:100%;

height:20px;

background:#1c2740;

border-radius:20px;

overflow:hidden;

margin-top:15px;
}

.soc-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

transition:1s;
}

/* =========================================
CHART
========================================= */

.chart-area{

width:min(96%,1600px);

margin:auto;

padding:20px;
}

.chart-box{

width:100%;

height:
clamp(240px,35vw,420px);

margin-bottom:35px;

background:
rgba(16,25,43,0.85);

border-radius:20px;

padding:20px;
}

/* =========================================
MOBILE
========================================= */

@media(max-width:768px){

.bottom-nodes{

width:220px;
}

.split-system{

width:220px;
}

.circle-node{

width:100px;
height:100px;
}

.flow{

grid-template-columns:1fr;
}

.chart-box{

height:260px;
}
}

</style>

</head>

<body>

<div class="header">

<h1>
ISOKUIKI SMART ENERGY
</h1>

</div>

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

<div class="status-widget">

<div class="status-icon">
⚡
</div>

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

<!-- POWER FLOW -->

<div class="power-wrapper">

<!-- PV -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/2933/2933821.png">

<div class="node-value">

<span id="pv_v_circle">0V</span>
<span id="pv_i_circle">0A</span>
<span id="pv_p_circle">0W</span>

</div>

</div>

<div class="node-title">
PHOTOVOLTAIC
</div>

</div>

<div class="line-vertical">
<div class="flow-dot vertical-dot" id="pv_flow"></div>
</div>

<!-- MPPT -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div class="node-value">

<span id="mppt_power_circle">0W</span>
<span id="mppt_eff_circle">0%</span>

</div>

</div>

<div class="node-title">
MPPT
</div>

</div>

<!-- SPLIT -->

<div class="split-system">

<div class="line-horizontal">
<div class="flow-dot horizontal-dot" id="split_flow"></div>
</div>

<div class="line-left">
<div class="flow-dot vertical-dot" id="bat_flow"></div>
</div>

<div class="line-right">
<div class="flow-dot vertical-dot" id="load_flow"></div>
</div>

</div>

<!-- BOTTOM -->

<div class="bottom-nodes">

<!-- BATTERY -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">

<div class="node-value">

<span id="bat_v_circle">0V</span>
<span id="bat_i_circle">0A</span>
<span id="soc_circle">0%</span>

</div>

</div>

<div class="node-title">
BATTERY
</div>

</div>

<!-- ENERGY -->

<div class="node-wrap">

<div class="circle-node">

<div style="font-size:clamp(26px,4vw,60px)">
⚡
</div>

<div class="node-value">

<span id="energy_day_circle">0</span>
<span>KWH DAY</span>

</div>

</div>

<div class="node-title">
ENERGY
</div>

</div>

</div>

<!-- WIDGET -->

<div class="flow">

<div class="box">

<h2>☀️ PHOTOVOLTAIC</h2>

<div class="data">
<span>Voltage</span>
<span id="pv_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="pv_i">0</span>
</div>

<div class="data">
<span>Power</span>
<span id="pv_p">0</span>
</div>

</div>

<div class="box">

<h2>⚙️ MPPT</h2>

<div class="data">
<span>Charge Power</span>
<span id="charge_p">0</span>
</div>

<div class="data">
<span>Efficiency</span>
<span id="mppt_eff">0</span>
</div>

</div>

<div class="box">

<h2>🔋 BATTERY</h2>

<div class="data">
<span>Voltage</span>
<span id="bat_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="bat_i">0</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0</span>
</div>

<div class="soc-bar">

<div class="soc-fill"
id="soc_fill"></div>

</div>

<div style="
text-align:center;
margin-top:15px;
"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>⚡ ENERGY</h2>

<div class="data">
<span>Daily kWh</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>Monthly kWh</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="chart-area">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyDayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyMonthChart"></canvas>
</div>

</div>

<script src="app.js"></script>

</body>

</html>
