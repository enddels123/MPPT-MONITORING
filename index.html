<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PVKeeper Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =====================================================
   GLOBAL
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#081218;

  color:white;

  font-family:
  Segoe UI,sans-serif;

  overflow:hidden;
}

/* =====================================================
   FLOW WRAPPER
===================================================== */

.flow-wrapper{

  position:relative;

  width:100vw;

  height:100vh;

  overflow:hidden;
}

/* =====================================================
   SVG LINE
===================================================== */

.flow-lines{

  position:absolute;

  inset:0;

  width:100%;
  height:100%;

  z-index:0;
}

.flow-lines path{

  fill:none;

  stroke:#ffee00;

  stroke-width:3;

  stroke-linecap:round;

  opacity:.9;

  filter:
  drop-shadow(
    0 0 6px rgba(255,230,0,.5)
  );
}

/* =====================================================
   ENERGY NODE
===================================================== */

.energy-node{

  position:absolute;

  width:10px;

  height:10px;

  border-radius:50%;

  background:#ffee00;

  box-shadow:
  0 0 10px #ffee00;

  z-index:5;
}

/* =====================================================
   NODE ANIMATION
===================================================== */

#node-pv{

  top:160px;
  left:180px;

  animation:
  nodePV 2s linear infinite;
}

@keyframes nodePV{

  0%{
    left:180px;
    top:160px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  70%{
    left:470px;
    top:160px;
  }

  100%{
    left:470px;
    top:260px;
    opacity:0;
  }
}

#node-load{

  top:260px;
  left:540px;

  animation:
  nodeLOAD 2s linear infinite;
}

@keyframes nodeLOAD{

  0%{
    left:540px;
    top:260px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  70%{
    left:820px;
    top:260px;
  }

  100%{
    left:820px;
    top:160px;
    opacity:0;
  }
}

#node-battery{

  top:330px;
  left:500px;

  animation:
  nodeBAT 1.8s linear infinite;
}

@keyframes nodeBAT{

  0%{
    top:330px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    top:520px;
    opacity:0;
  }
}

#node-idle{

  top:330px;
  left:560px;

  animation:
  nodeIDLE 1.8s linear infinite;
}

@keyframes nodeIDLE{

  0%{
    top:330px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    top:520px;
    opacity:0;
  }
}

/* =====================================================
   CENTER ICON
===================================================== */

.center-icons{

  position:relative;

  width:100%;
  height:100%;
}

/* =====================================================
   CIRCLE
===================================================== */

.circle-box{

  position:absolute;

  width:170px;

  height:170px;

  border-radius:50%;

  background:
  radial-gradient(
    circle at center,
    #0d8ea6 0%,
    #0b6071 65%,
    #083845 100%
  );

  border:
  2px solid rgba(255,255,255,.15);

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  box-shadow:
  0 0 20px rgba(0,255,255,.15),
  inset 0 0 25px rgba(255,255,255,.06);

  overflow:hidden;

  z-index:2;
}

.circle-ring{

  position:absolute;

  width:85%;
  height:85%;

  border-radius:50%;

  border:
  2px solid rgba(255,255,255,.08);
}

/* =====================================================
   POSITION
===================================================== */

.pv-circle{

  top:80px;
  left:40px;
}

.load-circle{

  top:80px;
  right:40px;
}

.mppt-circle{

  top:200px;
  left:50%;

  transform:
  translateX(-50%);
}

.battery-circle{

  bottom:30px;
  left:30%;
}

.idle-circle{

  bottom:30px;
  right:30%;
}

/* =====================================================
   TEXT
===================================================== */

.circle-icon{

  font-size:34px;

  margin-bottom:5px;
}

.circle-title{

  font-size:16px;

  margin-bottom:5px;

  opacity:.9;
}

.circle-data{

  font-size:14px;

  line-height:1.6;

  text-align:center;
}

.circle-value{

  font-weight:bold;
}

/* =====================================================
   MOBILE
===================================================== */

@media(max-width:900px){

  body{

    overflow:auto;
  }

  .flow-wrapper{

    min-height:1100px;
  }

  .pv-circle{

    top:40px;
    left:50%;

    transform:
    translateX(-50%);
  }

  .mppt-circle{

    top:320px;
  }

  .load-circle{

    top:600px;
    left:50%;

    transform:
    translateX(-50%);
  }

  .battery-circle{

    top:850px;
    left:25%;
  }

  .idle-circle{

    top:850px;
    right:25%;
  }
}

</style>

</head>

<body>

<div class="flow-wrapper">

  <!-- =================================================
       SVG FLOW
  ================================================= -->

  <svg class="flow-lines"
  viewBox="0 0 1000 700">

    <!-- PV -> MPPT -->
    <path
    d="
    M180 170
    L470 170
    L470 260
    " />

    <!-- MPPT -> LOAD -->
    <path
    d="
    M540 260
    L820 260
    L820 170
    " />

    <!-- MPPT -> BATTERY -->
    <path
    d="
    M500 330
    L500 520
    " />

    <!-- MPPT -> IDLE -->
    <path
    d="
    M560 330
    L560 520
    " />

  </svg>

  <!-- =================================================
       NODE
  ================================================= -->

  <div class="energy-node"
  id="node-pv"></div>

  <div class="energy-node"
  id="node-load"></div>

  <div class="energy-node"
  id="node-battery"></div>

  <div class="energy-node"
  id="node-idle"></div>

  <!-- =================================================
       WIDGET
  ================================================= -->

  <div class="center-icons">

    <!-- PV -->
    <div class="circle-box pv-circle">

      <div class="circle-ring"></div>

      <div class="circle-icon">
        <i class="fa-solid fa-solar-panel"></i>
      </div>

      <div class="circle-title">
        PV
      </div>

      <div class="circle-data">

        <div id="pv_v">
          0 V
        </div>

        <div id="pv_i">
          0 A
        </div>

        <div class="circle-value"
        id="pv_p">
          0 W
        </div>

      </div>

    </div>

    <!-- MPPT -->
    <div class="circle-box mppt-circle">

      <div class="circle-ring"></div>

      <div class="circle-icon">
        <i class="fa-solid fa-bolt"></i>
      </div>

      <div class="circle-title">
        MPPT
      </div>

      <div class="circle-data">

        <div id="mppt_v">
          0 V
        </div>

        <div id="mppt_i">
          0 A
        </div>

        <div class="circle-value"
        id="mppt_p">
          0 W
        </div>

      </div>

    </div>

    <!-- LOAD -->
    <div class="circle-box load-circle">

      <div class="circle-ring"></div>

      <div class="circle-icon">
        <i class="fa-solid fa-house"></i>
      </div>

      <div class="circle-title">
        LOAD
      </div>

      <div class="circle-data">

        <div id="load_v">
          0 V
        </div>

        <div id="load_i">
          0 A
        </div>

        <div class="circle-value"
        id="load_p">
          0 W
        </div>

      </div>

    </div>

    <!-- BATTERY -->
    <div class="circle-box battery-circle">

      <div class="circle-ring"></div>

      <div class="circle-icon">
        <i class="fa-solid fa-battery-full"></i>
      </div>

      <div class="circle-title">
        BATTERY
      </div>

      <div class="circle-data">

        <div id="bat_v">
          0 V
        </div>

        <div id="bat_i">
          0 A
        </div>

        <div class="circle-value"
        id="bat_p">
          0 W
        </div>

        <div id="soc">
          0 %
        </div>

      </div>

    </div>

    <!-- IDLE -->
    <div class="circle-box idle-circle">

      <div class="circle-ring"></div>

      <div class="circle-icon">
        <i class="fa-solid fa-power-off"></i>
      </div>

      <div class="circle-title">
        IDLE
      </div>

      <div class="circle-data">

        <div id="idle_v">
          0 V
        </div>

        <div id="idle_i">
          0 A
        </div>

        <div class="circle-value"
        id="idle_p">
          0 W
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
