<!-- =========================================================
INDEX.HTML — FINAL FULL VERSION
ISOKUIKI SMART ENERGY
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

/* =========================================================
ROOT
========================================================= */

:root{

--bg:#020b1d;
--panel:#03162d;
--cyan:#00ffe5;
--blue:#36a3ff;
--lime:#7CFC00;
--white:#ffffff;
--red:#ff3b3b;

}

/* =========================================================
GLOBAL
========================================================= */

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);

font-family:'Orbitron',sans-serif;

color:white;

overflow-x:hidden;

}

/* =========================================================
MAIN LAYOUT
========================================================= */

.main{

max-width:1500px;

margin:auto;

padding:14px 18px;

display:grid;

grid-template-columns:
290px 1fr;

gap:14px;

min-height:100vh;

}

/* =========================================================
PANEL
========================================================= */

.panel{

background:var(--panel);

border-radius:22px;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 0 15px rgba(0,255,229,.08);

}

/* =========================================================
LEFT PANEL
========================================================= */

.leftPanel{

display:flex;

flex-direction:column;

gap:14px;

}

/* =========================================================
HEADER
========================================================= */

.header{

padding:14px;

text-align:center;

}

.title{

font-size:1.5rem;

color:var(--cyan);

text-shadow:
0 0 10px var(--cyan);

margin-bottom:5px;

}

.online{

font-size:.8rem;

font-weight:bold;

margin-bottom:10px;

}

.online-status{

color:var(--lime);

}

.offline-status{

color:var(--red);

}

.device{

width:92%;

margin:auto;

padding:7px;

border-radius:14px;

border:
2px solid #00ffae;

font-size:.72rem;

}

/* =========================================================
SCADA
========================================================= */

.scada{

height:370px;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;

padding:0;

}

svg{

width:100%;
height:100%;

display:block;

margin:auto;

}

/* =========================================================
SCADA STYLE
========================================================= */

.scada-circle{

fill:#041933;

stroke:var(--cyan);

stroke-width:4;

filter:
drop-shadow(0 0 10px rgba(0,255,229,.7));

}

.scada-name{

fill:var(--cyan);

font-size:11px;

font-weight:700;

text-anchor:middle;

}

.scada-value{

fill:white;

font-size:10px;

font-weight:bold;

text-anchor:middle;

dominant-baseline:middle;

}

.scada-sub{

fill:var(--lime);

font-size:7px;

text-anchor:middle;

dominant-baseline:middle;

}

/* =========================================================
RIGHT PANEL
========================================================= */

.rightPanel{

display:flex;

flex-direction:column;

gap:14px;

}

/* =========================================================
DATA GRID
========================================================= */

.dataGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:14px;

}

.box{

padding:14px;

min-height:135px;

}

.boxTitle{

text-align:center;

color:var(--cyan);

font-size:.95rem;

margin-bottom:12px;

}

.row{

display:flex;

justify-content:space-between;

padding:8px 0;

border-bottom:
1px solid rgba(255,255,255,.08);

font-size:.8rem;

}

/* =========================================================
ENERGY BOX
========================================================= */

.energyBox{

grid-column:2/3;

}

/* =========================================================
CHART GRID
========================================================= */

.chartGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:14px;

}

.chartBox{

height:210px;

padding:10px;

}

.chartTitle{

text-align:center;

color:var(--cyan);

margin-bottom:6px;

font-size:.95rem;

}

.chartCanvas{

position:relative;

height:150px;

}

/* =========================================================
RESPONSIVE
========================================================= */

@media(max-width:1000px){

.main{

grid-template-columns:1fr;

padding:10px;

}

.dataGrid{

grid-template-columns:
1fr 1fr;

}

.chartGrid{

grid-template-columns:1fr;

}

.energyBox{

grid-column:auto;

}

}

@media(max-width:650px){

.dataGrid{

grid-template-columns:1fr;

}

}

/* =========================================================
SCROLLBAR
========================================================= */

::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:var(--cyan);

border-radius:10px;

}

</style>

</head>

<body>

<div class="main">

<!-- =========================================================
LEFT PANEL
========================================================= -->

<div class="leftPanel">

<!-- HEADER -->

<div class="panel header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online online-status"
id="onlineText">
ONLINE
</div>

<div class="device"
id="deviceStatus">
DEVICE ACTIVE
</div>

</div>

<!-- =========================================================
SCADA
========================================================= -->

<div class="panel scada">

<svg
viewBox="0 0 340 390"
preserveAspectRatio="xMidYMid meet">

<!-- MAIN LINE -->

<line
x1="170"
y1="72"
x2="170"
y2="160"
stroke="#36a3ff"
stroke-width="4"/>

<!-- SPLIT -->

<line
x1="170"
y1="205"
x2="125"
y2="205"
stroke="#36a3ff"
stroke-width="4"/>

<line
x1="170"
y1="205"
x2="215"
y2="205"
stroke="#36a3ff"
stroke-width="4"/>

<line
x1="125"
y1="205"
x2="125"
y2="285"
stroke="#36a3ff"
stroke-width="4"/>

<line
x1="215"
y1="205"
x2="215"
y2="285"
stroke="#36a3ff"
stroke-width="4"/>

<!-- NODE ANIMATION -->

<circle r="5" fill="#00ff88">

<animateMotion
dur="1.8s"
repeatCount="indefinite"
path="M170 90 L170 145"/>

</circle>

<circle r="5" fill="#00ff88">

<animateMotion
dur="1.8s"
repeatCount="indefinite"
path="M170 205 L125 205 L125 285"/>

</circle>

<circle r="5" fill="#00ff88">

<animateMotion
dur="1.8s"
repeatCount="indefinite"
path="M170 205 L215 205 L215 285"/>

</circle>

<!-- PV PANEL -->

<text
x="170"
y="25"
class="scada-name">
PV PANEL
</text>

<circle
cx="170"
cy="58"
r="30"
class="scada-circle"/>

<text
x="170"
y="52"
class="scada-value"
id="pvPowerScada">
0W
</text>

<text
x="170"
y="69"
class="scada-sub"
id="pvVoltScada">
0V | 0A
</text>

<!-- MPPT -->

<circle
cx="170"
cy="160"
r="30"
class="scada-circle"/>

<text
x="170"
y="154"
class="scada-value"
id="mpptPowerScada">
0W
</text>

<text
x="170"
y="171"
class="scada-sub"
id="mpptEffScada">
0%
</text>

<text
x="170"
y="248"
class="scada-name">
MPPT
</text>

<!-- BATTERY -->

<circle
cx="125"
cy="318"
r="30"
class="scada-circle"/>

<text
x="125"
y="312"
class="scada-value"
id="batSocScada">
0%
</text>

<text
x="125"
y="329"
class="scada-sub"
id="batVoltScada">
0V | 0A
</text>

<text
x="125"
y="382"
class="scada-name">
BATTERY
</text>

<!-- LOAD -->

<circle
cx="215"
cy="318"
r="30"
class="scada-circle"/>

<text
x="215"
y="312"
class="scada-value"
id="loadPowerScada">
0W
</text>

<text
x="215"
y="329"
class="scada-sub"
id="loadVoltScada">
0V | 0A
</text>

<text
x="215"
y="382"
class="scada-name">
LOAD
</text>

</svg>

</div>

</div>

<!-- =========================================================
RIGHT PANEL
========================================================= -->

<div class="rightPanel">

<!-- DATA -->

<div class="dataGrid">

<div class="panel box">

<div class="boxTitle">
PHOTOVOLTAIC
</div>

<div class="row">
<span>Voltage</span>
<span id="pvVoltage">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvCurrent">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvPower">0W</span>
</div>

</div>

<div class="panel box">

<div class="boxTitle">
MPPT
</div>

<div class="row">
<span>Charge</span>
<span id="mpptCharge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpptEff">0%</span>
</div>

</div>

<div class="panel box">

<div class="boxTitle">
BATTERY
</div>

<div class="row">
<span>Voltage</span>
<span id="batVoltage">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="batCurrent">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="batSoc">0%</span>
</div>

</div>

<div class="panel box energyBox">

<div class="boxTitle">
ENERGY
</div>

<div class="row">
<span>Daily</span>
<span id="dailyEnergy">0 kWh</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthlyEnergy">0 kWh</span>
</div>

</div>

</div>

<!-- =========================================================
GAUGE
========================================================= -->

<div class="chartGrid">

<div class="panel chartBox">

<div class="chartTitle">
PV
</div>

<div class="chartCanvas">
<canvas id="gauge1"></canvas>
</div>

</div>

<div class="panel chartBox">

<div class="chartTitle">
BATTERY SOC
</div>

<div class="chartCanvas">
<canvas id="gauge2"></canvas>
</div>

</div>

<div class="panel chartBox">

<div class="chartTitle">
MPPT EFFICIENCY
</div>

<div class="chartCanvas">
<canvas id="gauge3"></canvas>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
