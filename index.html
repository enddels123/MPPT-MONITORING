<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISOKUIKI SMART ENERGY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

:root{
  --bg:#010b1d;
  --card:#04152d;
  --line:#36a3ff;
  --accent:#00ffe1;
  --accent2:#00ff88;
  --text:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Orbitron',sans-serif;
  overflow-x:hidden;
}

.main{
  width:100%;
  min-height:100vh;
  display:grid;
  grid-template-columns:minmax(320px, 34%) 1fr;
  gap:14px;
  padding:14px;
}

.panel{
  background:var(--card);
  border-radius:22px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 20px rgba(0,255,225,.08);
}

.leftPanel{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.header{
  padding:18px;
  text-align:center;
}

.title{
  color:var(--accent);
  font-size:clamp(1.1rem,2vw,2rem);
  text-shadow:0 0 12px var(--accent);
}

.online{
  margin-top:10px;
  font-size:clamp(.75rem,1vw,1rem);
  color:var(--accent2);
}

.device{
  margin-top:14px;
  border:2px solid var(--accent2);
  border-radius:14px;
  padding:10px;
  font-size:clamp(.7rem,1vw,1rem);
  box-shadow:0 0 15px rgba(0,255,136,.2);
}

.scada{
  padding:10px;
  flex:1;
  min-height:620px;
}

svg{
  width:100%;
  height:100%;
}

.scada-circle{
  fill:#031326;
  stroke:var(--accent);
  stroke-width:4;
  filter:drop-shadow(0 0 10px rgba(0,255,225,.6));
}

.scada-name{
  fill:var(--accent);
  font-size:18px;
  font-weight:700;
  text-anchor:middle;
}

.scada-value{
  fill:#ffffff;
  font-size:15px;
  text-anchor:middle;
}

.scada-sub{
  fill:#00ff88;
  font-size:13px;
  text-anchor:middle;
}

.dataArea{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.box{
  padding:16px;
}

.boxTitle{
  color:var(--accent);
  margin-bottom:14px;
  font-size:clamp(.9rem,1vw,1.1rem);
  text-align:center;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:clamp(.8rem,.95vw,1rem);
}

.chartGrid{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}

.chartBox{
  padding:14px;
  min-height:280px;
}

.chartTitle{
  text-align:center;
  color:var(--accent);
  margin-bottom:10px;
  font-size:clamp(.9rem,1vw,1.1rem);
}

.chartCanvas{
  position:relative;
  width:100%;
  height:220px;
}

circle.flowNode{
  filter:drop-shadow(0 0 8px #00ffe1);
}

@media(max-width:980px){

  .main{
    grid-template-columns:1fr;
  }

  .scada{
    min-height:540px;
  }

}

@media(max-width:640px){

  .main{
    padding:10px;
    gap:10px;
  }

  .scada{
    min-height:500px;
  }

  .chartCanvas{
    height:180px;
  }

}

</style>
</head>

<body>

<div class="main">

  <div class="leftPanel">

    <div class="panel header">
      <div class="title">ISOKUIKI SMART ENERGY</div>
      <div class="online" id="onlineText">OFFLINE</div>
      <div class="device" id="deviceStatus">DEVICE SHUTDOWN</div>
    </div>

    <div class="panel scada">

      <svg viewBox="0 0 400 700">

        <path d="M200 140 L200 260"
              stroke="#36a3ff"
              stroke-width="5"
              fill="none"/>

        <path d="M200 355 L110 355 L110 520"
              stroke="#36a3ff"
              stroke-width="5"
              fill="none"/>

        <path d="M200 355 L290 355 L290 520"
              stroke="#36a3ff"
              stroke-width="5"
              fill="none"/>

        <circle id="n1" class="flowNode" r="8" fill="#00ff88"/>
        <circle id="n2" class="flowNode" r="8" fill="#00ff88"/>
        <circle id="n3" class="flowNode" r="8" fill="#00ff88"/>

        <text x="200" y="45" class="scada-name">PV PANEL</text>

        <circle cx="200" cy="95" r="62" class="scada-circle"/>

        <text x="200" y="85" class="scada-value" id="pvPowerScada">0W</text>
        <text x="200" y="108" class="scada-sub" id="pvVoltScada">0V | 0A</text>

        <text x="200" y="240" class="scada-name">MPPT</text>

        <circle cx="200" cy="300" r="62" class="scada-circle"/>

        <text x="200" y="290" class="scada-value" id="mpptPowerScada">0W</text>
        <text x="200" y="313" class="scada-sub" id="mpptEffScada">0%</text>

        <text x="110" y="455" class="scada-name">BATTERY</text>

        <circle cx="110" cy="575" r="62" class="scada-circle"/>

        <text x="110" y="565" class="scada-value" id="batSocScada">0%</text>
        <text x="110" y="588" class="scada-sub" id="batVoltScada">0V | 0A</text>

        <text x="290" y="455" class="scada-name">LOAD</text>

        <circle cx="290" cy="575" r="62" class="scada-circle"/>

        <text x="290" y="565" class="scada-value" id="loadPowerScada">0W</text>
        <text x="290" y="588" class="scada-sub" id="loadVoltScada">0V | 0A</text>

      </svg>

    </div>

  </div>

  <div class="rightPanel">

    <div class="dataArea">

      <div class="panel box">
        <div class="boxTitle">PHOTOVOLTAIC</div>

        <div class="row"><span>Voltage</span><span id="pvv">0V</span></div>
        <div class="row"><span>Current</span><span id="pvi">0A</span></div>
        <div class="row"><span>Power</span><span id="pvp">0W</span></div>
      </div>

      <div class="panel box">
        <div class="boxTitle">MPPT</div>

        <div class="row"><span>Charge</span><span id="charge">0W</span></div>
        <div class="row"><span>Efficiency</span><span id="eff">0%</span></div>
      </div>

      <div class="panel box">
        <div class="boxTitle">BATTERY</div>

        <div class="row"><span>Voltage</span><span id="bv">0V</span></div>
        <div class="row"><span>Current</span><span id="bi">0A</span></div>
        <div class="row"><span>SOC</span><span id="soc">0%</span></div>
      </div>

      <div class="panel box">
        <div class="boxTitle">ENERGY</div>

        <div class="row"><span>Daily</span><span id="day">0</span></div>
        <div class="row"><span>Monthly</span><span id="month">0</span></div>
      </div>

    </div>

    <div class="chartGrid">

      <div class="panel chartBox">
        <div class="chartTitle">PV POWER</div>
        <div class="chartCanvas"><canvas id="gauge1"></canvas></div>
      </div>

      <div class="panel chartBox">
        <div class="chartTitle">BATTERY SOC</div>
        <div class="chartCanvas"><canvas id="gauge2"></canvas></div>
      </div>

      <div class="panel chartBox">
        <div class="chartTitle">MPPT EFFICIENCY</div>
        <div class="chartCanvas"><canvas id="gauge3"></canvas></div>
      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
