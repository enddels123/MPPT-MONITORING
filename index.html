<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART ENERGY</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#010611,
#02142d
);

font-family:
'Orbitron',sans-serif;

color:white;

overflow-x:hidden;
}

/* ======================================
HEADER
====================================== */

.header{

text-align:center;

padding:20px 10px;
}

.header h1{

font-size:
clamp(22px,4vw,52px);

color:#00ffd5;

text-shadow:
0 0 25px #00ffd5;
}

/* ======================================
NETWORK
====================================== */

.network{

text-align:center;

margin-bottom:20px;

font-size:
clamp(12px,2vw,18px);
}

.online{
color:#00ff88;
}

.offline{
color:#ff5555;
}

/* ======================================
DEVICE
====================================== */

.status-widget{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

margin-bottom:35px;
}

.status-icon{

font-size:
clamp(50px,8vw,90px);

margin-bottom:10px;
}

.device-box{

width:
min(92%,700px);

padding:
clamp(18px,3vw,35px);

border-radius:30px;

background:
rgba(8,20,40,0.95);

border:
4px solid #00ff88;

text-align:center;

font-size:
clamp(20px,3vw,44px);

font-weight:bold;

box-shadow:
0 0 40px rgba(0,255,150,0.35);

backdrop-filter:blur(10px);
}

/* ======================================
POWER FLOW
====================================== */

.power-flow{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

padding:20px;

width:100%;
}

/* NODE */

.circle-node{

width:
clamp(95px,13vw,170px);

height:
clamp(95px,13vw,170px);

border-radius:50%;

background:
rgba(10,20,35,0.95);

border:
3px solid rgba(0,255,200,0.4);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

box-shadow:
0 0 30px rgba(0,255,200,0.3);

position:relative;

z-index:2;
}

.circle-node img{

width:
clamp(35px,5vw,70px);

height:
clamp(35px,5vw,70px);

object-fit:contain;

margin-bottom:6px;
}

/* TITLE */

.node-title{

margin-top:10px;

font-size:
clamp(12px,1.5vw,22px);

color:#00ffd5;

text-align:center;
}

/* VALUE */

.node-value{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:2px;

font-size:
clamp(9px,1vw,15px);

color:white;
}

/* LINES */

.line-v{

width:6px;

height:
clamp(70px,10vw,130px);

background:#355b8c;

position:relative;
}

.line-h{

width:
clamp(160px,22vw,360px);

height:6px;

background:#355b8c;

position:relative;
}

/* SPLIT */

.split-wrapper{

display:flex;

justify-content:center;

align-items:flex-start;

gap:
clamp(60px,14vw,280px);
}

/* FLOW DOT */

.flow-dot{

width:
clamp(10px,1.8vw,18px);

height:
clamp(10px,1.8vw,18px);

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:
0 0 20px #00ff88;
}

/* FLOW */

#pv_flow{

left:-4px;

animation:
flowVertical 1.1s linear infinite;
}

#bat_flow{

left:-4px;

animation:
flowVertical 1.1s linear infinite;
}

#load_flow{

left:-4px;

animation:
flowVertical 1.1s linear infinite;
}

#split_flow{

top:-5px;

animation:
flowHorizontal 1.1s linear infinite;
}

@keyframes flowVertical{

0%{
transform:translateY(0px);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:translateY(110px);
opacity:0;
}
}

@keyframes flowHorizontal{

0%{
transform:translateX(0px);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:translateX(300px);
opacity:0;
}
}

/* ======================================
WIDGET
====================================== */

.flow{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:20px;

padding:20px;

width:100%;

max-width:1500px;

margin:auto;
}

.box{

background:
rgba(16,25,43,0.9);

border-radius:20px;

padding:20px;

box-shadow:
0 0 25px rgba(0,255,200,0.12);

backdrop-filter:blur(10px);
}

.box h2{

text-align:center;

margin-bottom:15px;

color:#00ffd5;

font-size:
clamp(16px,2vw,26px);
}

.data{

display:flex;

justify-content:space-between;

padding:14px;

margin-top:12px;

background:#111b2d;

border-radius:12px;

font-size:
clamp(12px,1.3vw,16px);
}

/* SOC */

.soc-bar{

width:100%;

height:20px;

background:#1c2740;

border-radius:20px;

overflow:hidden;

margin-top:15px;
}

.soc-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

transition:1s;
}

/* ======================================
CHART
====================================== */

.chart-area{

width:min(96%,1500px);

margin:auto;

padding:20px;

background:
rgba(16,25,43,0.85);

border-radius:20px;

margin-bottom:30px;
}

.chart-box{

position:relative;

height:
clamp(240px,35vw,400px);

margin-bottom:40px;
}

/* ======================================
MOBILE
====================================== */

@media(max-width:768px){

.split-wrapper{

gap:60px;
}

.line-h{

width:170px;
}

.device-box{

font-size:28px;
}

}

</style>

</head>

<body>

<div class="header">

<h1>
ISOKUIKI SMART ENERGY
</h1>

</div>

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

<div class="status-widget">

<div class="status-icon">
⚡
</div>

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

<!-- =====================================
POWER FLOW
===================================== -->

<div class="power-flow">

<!-- PV -->

<div class="flow-col">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/2933/2933821.png">

<div class="node-value">

<span id="pv_v_circle">0V</span>
<span id="pv_i_circle">0A</span>
<span id="pv_p_circle">0W</span>

</div>

</div>

<div class="node-title">
PHOTOVOLTAIC
</div>

</div>

<div class="line-v">
<div class="flow-dot" id="pv_flow"></div>
</div>

<!-- MPPT -->

<div class="flow-col">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div class="node-value">

<span id="mppt_power_circle">0W</span>
<span id="mppt_eff_circle">0%</span>

</div>

</div>

<div class="node-title">
MPPT
</div>

</div>

<div class="line-h">
<div class="flow-dot" id="split_flow"></div>
</div>

<!-- SPLIT -->

<div class="split-wrapper">

<!-- BATTERY -->

<div class="flow-col">

<div class="line-v">
<div class="flow-dot" id="bat_flow"></div>
</div>

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">

<div class="node-value">

<span id="bat_v_circle">0V</span>
<span id="bat_i_circle">0A</span>
<span id="soc_circle">0%</span>

</div>

</div>

<div class="node-title">
BATTERY
</div>

</div>

<!-- ENERGY -->

<div class="flow-col">

<div class="line-v">
<div class="flow-dot" id="load_flow"></div>
</div>

<div class="circle-node">

<div style="font-size:40px;">
⚡
</div>

<div class="node-value">

<span id="energy_day_circle">0</span>
<span>KWH DAY</span>

</div>

</div>

<div class="node-title">
ENERGY
</div>

</div>

</div>

</div>

<!-- =====================================
WIDGET
===================================== -->

<div class="flow">

<div class="box">

<h2>
☀️ PHOTOVOLTAIC
</h2>

<div class="data">
<span>Voltage</span>
<span id="pv_v">0V</span>
</div>

<div class="data">
<span>Current</span>
<span id="pv_i">0A</span>
</div>

<div class="data">
<span>Power</span>
<span id="pv_p">0W</span>
</div>

</div>

<div class="box">

<h2>
⚙️ MPPT
</h2>

<div class="data">
<span>Charge Power</span>
<span id="charge_p">0W</span>
</div>

<div class="data">
<span>Efficiency</span>
<span id="mppt_eff">0%</span>
</div>

</div>

<div class="box">

<h2>
🔋 BATTERY
</h2>

<div class="data">
<span>Voltage</span>
<span id="bat_v">0V</span>
</div>

<div class="data">
<span>Current</span>
<span id="bat_i">0A</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0%</span>
</div>

<div class="soc-bar">

<div class="soc_fill"
id="soc_fill"></div>

</div>

<div style="
text-align:center;
margin-top:15px;
"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>
⚡ ENERGY
</h2>

<div class="data">
<span>Daily kWh</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>Monthly kWh</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<!-- =====================================
CHART
===================================== -->

<div class="chart-area">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyDayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyMonthChart"></canvas>
</div>

</div>

<script src="app.js"></script>

</body>

</html>
