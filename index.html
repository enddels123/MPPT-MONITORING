<!-- =========================================================
ISOKUIKI SMART ENERGY
FINAL INDEX.HTML
RAPAT ANTAR WIDGET + SCADA COMPACT FINAL
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ISOKUIKI SMART ENERGY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000f2c;
    font-family:'Orbitron',sans-serif;
    color:#fff;
    overflow-x:hidden;
}

/* =========================================================
MAIN LAYOUT
========================================================= */

.dashboard{

    width:100%;
    padding:12px;

    display:grid;

    grid-template-columns:
    320px
    1fr
    1fr
    1fr;

    grid-auto-rows:minmax(150px,auto);

    gap:10px;
}

/* =========================================================
PANEL
========================================================= */

.panel{

    background:#001a45;

    border-radius:22px;

    border:1px solid rgba(0,255,255,0.08);

    padding:14px;

    position:relative;

    overflow:hidden;

    box-shadow:
    inset 0 0 30px rgba(0,255,255,0.03);
}

.panel-title{

    text-align:center;

    color:#00ffff;

    font-size:16px;

    margin-bottom:10px;

    text-shadow:0 0 10px #00ffff;
}

/* =========================================================
TOP STATUS
========================================================= */

.status-panel{

    height:150px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.main-title{

    font-size:24px;

    color:#00ffff;

    text-align:center;

    line-height:1.15;

    text-shadow:
    0 0 10px #00ffff,
    0 0 22px #00ffff;

    margin-bottom:6px;
}

#onlineStatus{

    font-size:14px;

    font-weight:bold;

    margin-bottom:12px;
}

.device-box{

    width:92%;

    height:38px;

    border-radius:12px;

    border:2px solid #00ffee;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;

    color:#fff;

    box-shadow:0 0 12px rgba(0,255,255,0.45);
}

/* =========================================================
DATA PANEL
========================================================= */

.info-panel{

    height:150px;
}

.info-row{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:11px 0;

    border-bottom:1px solid rgba(255,255,255,0.08);

    font-size:14px;
}

/* =========================================================
ENERGY
========================================================= */

.energy-panel{

    height:150px;
}

/* =========================================================
GAUGE
========================================================= */

.gauge-panel{

    height:250px;

    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
}

.gauge-title{

    color:#00ffff;

    font-size:16px;

    margin-bottom:8px;

    text-shadow:0 0 10px #00ffff;
}

.gauge{

    width:240px;
    height:130px;

    border:18px solid #193a8f;
    border-bottom:none;

    border-radius:240px 240px 0 0;

    position:relative;

    margin-top:32px;
}

.gauge-center{

    position:absolute;

    width:100%;

    bottom:8px;

    left:0;

    text-align:center;
}

.gauge-value{

    font-size:20px;

    font-weight:bold;

    color:#fff;
}

.gauge-sub{

    font-size:12px;

    margin-top:4px;

    color:#00ffff;
}

.gauge-sub2{

    font-size:12px;

    color:#7CFF00;
}

/* =========================================================
SCADA PANEL
========================================================= */

.scada{

    grid-row:2 / span 2;

    height:430px;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:8px;
}

/* =========================================================
SVG
========================================================= */

.scada svg{

    width:100%;
    height:100%;
}

/* =========================================================
LINE
========================================================= */

.line{

    stroke:#36a8ff;
    stroke-width:5;
    fill:none;
}

/* =========================================================
NODE
========================================================= */

.node{

    fill:#00ff9d;

    filter:drop-shadow(0 0 10px #00ff9d);
}

/* =========================================================
CIRCLE
========================================================= */

.scada-circle{

    fill:#05214a;

    stroke:#00ffff;

    stroke-width:4;

    filter:drop-shadow(0 0 12px #00ffff);
}

/* =========================================================
SCADA TEXT
========================================================= */

.scada-label{

    fill:#00ffff;

    font-size:16px;

    font-weight:bold;

    text-anchor:middle;
}

.scada-value{

    fill:#ffffff;

    font-size:15px;

    font-weight:bold;

    text-anchor:middle;
}

.scada-sub{

    fill:#7CFF00;

    font-size:10px;

    text-anchor:middle;
}

/* =========================================================
MPPT BOX
========================================================= */

.mppt-box{

    fill:none;

    stroke:#36a8ff;

    stroke-width:5;
}

.mppt-text{

    fill:#00ffff;

    font-size:16px;

    font-weight:bold;

    text-anchor:middle;
}

/* =========================================================
RESPONSIVE HP
========================================================= */

@media(max-width:1000px){

.dashboard{

    grid-template-columns:1fr;
}

.scada{

    height:520px;
}

.gauge{

    width:220px;
    height:120px;
}

}

</style>
</head>

<body>

<div class="dashboard">

    <!-- =====================================================
    STATUS
    ====================================================== -->

    <div class="panel status-panel">

        <div class="main-title">
            ISOKUIKI SMART ENERGY
        </div>

        <div id="onlineStatus">
            OFFLINE
        </div>

        <div class="device-box">
            DEVICE ACTIVE
        </div>
    </div>

    <!-- =====================================================
    PV INFO
    ====================================================== -->

    <div class="panel info-panel">

        <div class="panel-title">PHOTOVOLTAIC</div>

        <div class="info-row">
            <span>Voltage</span>
            <span id="pvVoltage">0V</span>
        </div>

        <div class="info-row">
            <span>Current</span>
            <span id="pvCurrent">0A</span>
        </div>

        <div class="info-row">
            <span>Power</span>
            <span id="pvPower">0W</span>
        </div>
    </div>

    <!-- =====================================================
    MPPT INFO
    ====================================================== -->

    <div class="panel info-panel">

        <div class="panel-title">MPPT</div>

        <div class="info-row">
            <span>Charge</span>
            <span id="mpptCharge">0W</span>
        </div>

        <div class="info-row">
            <span>Efficiency</span>
            <span id="mpptEff">0%</span>
        </div>
    </div>

    <!-- =====================================================
    BATTERY INFO
    ====================================================== -->

    <div class="panel info-panel">

        <div class="panel-title">BATTERY</div>

        <div class="info-row">
            <span>Voltage</span>
            <span id="batVoltage">0V</span>
        </div>

        <div class="info-row">
            <span>Current</span>
            <span id="batCurrent">0A</span>
        </div>

        <div class="info-row">
            <span>SOC</span>
            <span id="batSoc">0%</span>
        </div>
    </div>

    <!-- =====================================================
    SCADA
    ====================================================== -->

    <div class="panel scada">

<svg viewBox="0 0 320 420">

    <!-- MAIN LINE -->
    <line class="line" x1="160" y1="80" x2="160" y2="255"/>

    <!-- MPPT BRANCH -->
    <line class="line" x1="110" y1="255" x2="210" y2="255"/>
    <line class="line" x1="110" y1="255" x2="110" y2="340"/>
    <line class="line" x1="210" y1="255" x2="210" y2="340"/>

    <!-- NODE -->
    <circle id="nodeMain" class="node" cx="160" cy="165" r="7"/>
    <circle id="nodeLeft" class="node" cx="110" cy="255" r="7"/>
    <circle id="nodeRight" class="node" cx="210" cy="255" r="7"/>

    <!-- PV -->
    <text class="scada-label" x="160" y="35">
        PV PANEL
    </text>

    <circle class="scada-circle" cx="160" cy="80" r="38"/>

    <text class="scada-value" id="scadaPvPower" x="160" y="78">
        0W
    </text>

    <text class="scada-sub" id="scadaPvVolt" x="148" y="98">
        0V
    </text>

    <text class="scada-sub" id="scadaPvAmp" x="176" y="98">
        0A
    </text>

    <!-- MPPT -->
    <circle class="scada-circle" cx="160" cy="190" r="38"/>

    <text class="scada-value" id="scadaMpptPower" x="160" y="188">
        0W
    </text>

    <text class="scada-sub" id="scadaMpptEff" x="160" y="208">
        0%
    </text>

    <!-- MPPT BOX -->
    <rect class="mppt-box"
          x="110"
          y="255"
          width="100"
          height="58"/>

    <text class="mppt-text"
          x="160"
          y="288">
          MPPT
    </text>

    <!-- BATTERY -->
    <circle class="scada-circle" cx="110" cy="360" r="32"/>

    <text class="scada-value"
          id="scadaBatSoc"
          x="110"
          y="357">
          0%
    </text>

    <text class="scada-sub"
          id="scadaBatVolt"
          x="98"
          y="376">
          0V
    </text>

    <text class="scada-sub"
          id="scadaBatAmp"
          x="122"
          y="376">
          0A
    </text>

    <text class="scada-label"
          x="110"
          y="410">
          BATTERY
    </text>

    <!-- LOAD -->
    <circle class="scada-circle" cx="210" cy="360" r="32"/>

    <text class="scada-value"
          id="scadaLoadPower"
          x="210"
          y="357">
          0W
    </text>

    <text class="scada-sub"
          id="scadaLoadVolt"
          x="198"
          y="376">
          0V
    </text>

    <text class="scada-sub"
          id="scadaLoadAmp"
          x="222"
          y="376">
          0A
    </text>

    <text class="scada-label"
          x="210"
          y="410">
          LOAD
    </text>

</svg>

    </div>

    <!-- =====================================================
    ENERGY
    ====================================================== -->

    <div class="panel energy-panel">

        <div class="panel-title">ENERGY</div>

        <div class="info-row">
            <span>Daily</span>
            <span id="energyDaily">0 kWh</span>
        </div>

        <div class="info-row">
            <span>Monthly</span>
            <span id="energyMonthly">0 kWh</span>
        </div>

    </div>

    <!-- =====================================================
    PV GAUGE
    ====================================================== -->

    <div class="panel gauge-panel">

        <div class="gauge-title">PV</div>

        <div class="gauge">

            <div class="gauge-center">

                <div class="gauge-value"
                     id="pvGaugeValue">
                     0W
                </div>

                <div class="gauge-sub"
                     id="pvGaugeVolt">
                     0V
                </div>

                <div class="gauge-sub2"
                     id="pvGaugeAmp">
                     0A
                </div>

            </div>
        </div>
    </div>

    <!-- =====================================================
    BATTERY SOC
    ====================================================== -->

    <div class="panel gauge-panel">

        <div class="gauge-title">
            BATTERY SOC
        </div>

        <div class="gauge">

            <div class="gauge-center">

                <div class="gauge-value"
                     id="batteryGaugeValue">
                     0%
                </div>

            </div>
        </div>
    </div>

    <!-- =====================================================
    MPPT EFFICIENCY
    ====================================================== -->

    <div class="panel gauge-panel">

        <div class="gauge-title">
            MPPT EFFICIENCY
        </div>

        <div class="gauge">

            <div class="gauge-center">

                <div class="gauge-value"
                     id="effGaugeValue">
                     0%
                </div>

            </div>
        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
