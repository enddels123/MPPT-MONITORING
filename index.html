<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

/* =========================
   ROOT
========================= */

:root{

--bg:#020b1d;
--panel:#03162d;
--cyan:#00ffe5;
--blue:#36a3ff;
--lime:#7CFC00;
--red:#ff3b3b;
--white:#ffffff;

}

/* =========================
   GLOBAL
========================= */

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);

font-family:'Orbitron',sans-serif;

color:var(--white);

overflow-x:hidden;

}

/* =========================
   MAIN
========================= */

.main{

width:100%;

max-width:1500px;

margin:auto;

display:grid;

grid-template-columns:
320px 1fr;

gap:14px;

padding:
14px 18px;

min-height:100vh;

}

/* =========================
   PANEL
========================= */

.panel{

background:var(--panel);

border-radius:22px;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 0 18px rgba(0,255,229,.08);

}

/* =========================
   LEFT PANEL
========================= */

.leftPanel{

display:flex;

flex-direction:column;

gap:12px;

}

/* =========================
   HEADER
========================= */

.header{

padding:14px;

text-align:center;

}

.title{

font-size:
clamp(1rem,1.5vw,1.7rem);

color:var(--cyan);

text-shadow:
0 0 10px var(--cyan);

line-height:1.3;

margin-bottom:6px;

}

.online{

font-size:
clamp(.7rem,.8vw,.9rem);

font-weight:bold;

margin-bottom:10px;

}

.online-status{

color:var(--lime);

}

.offline-status{

color:var(--red);

}

.device{

width:92%;

margin:auto;

padding:7px;

border-radius:12px;

border:
2px solid #00ffae;

font-size:
clamp(.65rem,.75vw,.85rem);

box-shadow:
0 0 10px rgba(0,255,174,.15);

}

/* =========================
   SCADA
========================= */

.scada{

height:560px;

display:flex;

align-items:center;

justify-content:center;

padding:6px;

overflow:hidden;

}

svg{

width:100%;

height:100%;

display:block;

}

/* =========================
   SCADA COMPONENT
========================= */

.scada-circle{

fill:#041933;

stroke:var(--cyan);

stroke-width:4;

filter:
drop-shadow(0 0 10px rgba(0,255,229,.6));

}

.scada-name{

fill:var(--cyan);

font-size:15px;

font-weight:700;

text-anchor:middle;

}

.scada-value{

fill:white;

font-size:22px;

font-weight:bold;

text-anchor:middle;

dominant-baseline:middle;

}

.scada-sub{

fill:var(--lime);

font-size:13px;

text-anchor:middle;

dominant-baseline:middle;

}

/* =========================
   FLOW NODE
========================= */

.flowNode{

filter:
drop-shadow(0 0 8px #00ffe5);

}

/* =========================
   RIGHT PANEL
========================= */

.rightPanel{

display:flex;

flex-direction:column;

gap:12px;

}

/* =========================
   DATA GRID
========================= */

.dataGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:12px;

}

.box{

padding:14px;

min-height:145px;

}

.boxTitle{

text-align:center;

color:var(--cyan);

font-size:
clamp(.85rem,.95vw,1rem);

margin-bottom:12px;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

padding:9px 0;

border-bottom:
1px solid rgba(255,255,255,.08);

font-size:
clamp(.72rem,.82vw,.92rem);

}

/* =========================
   ENERGY
========================= */

.energyBox{

grid-column:2/3;

}

/* =========================
   CHART GRID
========================= */

.chartGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:12px;

align-items:stretch;

}

.chartBox{

padding:10px;

height:240px;

}

.chartTitle{

text-align:center;

color:var(--cyan);

font-size:
clamp(.85rem,.95vw,1rem);

margin-bottom:8px;

}

.chartCanvas{

position:relative;

height:160px;

}

/* =========================
   MOBILE
========================= */

@media(max-width:1000px){

.main{

grid-template-columns:1fr;

padding:10px;

}

.leftPanel{

order:1;

}

.rightPanel{

order:2;

}

.dataGrid{

grid-template-columns:
1fr 1fr;

}

.chartGrid{

grid-template-columns:1fr;

}

.energyBox{

grid-column:auto;

}

.scada{

height:500px;

}

.chartBox{

height:220px;

}

}

@media(max-width:650px){

.dataGrid{

grid-template-columns:1fr;

}

.chartGrid{

grid-template-columns:1fr;

}

.scada{

height:460px;

}

}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:var(--cyan);

border-radius:10px;

}

</style>

</head>

<body>

<div class="main">

<!-- =========================
     LEFT PANEL
========================= -->

<div class="leftPanel">

<div class="panel header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online online-status"
id="onlineText">
ONLINE
</div>

<div class="device"
id="deviceStatus">
DEVICE SHUTDOWN
</div>

</div>

<!-- =========================
     SCADA
========================= -->

<div class="panel scada">

<svg viewBox="0 0 340 520">

<!-- MAIN LINE -->

<line x1="170"
y1="95"
x2="170"
y2="180"
stroke="#36a3ff"
stroke-width="5"/>

<!-- SPLIT -->

<line x1="170"
y1="255"
x2="120"
y2="255"
stroke="#36a3ff"
stroke-width="5"/>

<line x1="170"
y1="255"
x2="220"
y2="255"
stroke="#36a3ff"
stroke-width="5"/>

<line x1="120"
y1="255"
x2="120"
y2="360"
stroke="#36a3ff"
stroke-width="5"/>

<line x1="220"
y1="255"
x2="220"
y2="360"
stroke="#36a3ff"
stroke-width="5"/>

<!-- FLOW NODE -->

<circle id="n1"
class="flowNode"
cx="170"
cy="105"
r="6"
fill="#00ff88"/>

<circle id="n2"
class="flowNode"
cx="150"
cy="255"
r="6"
fill="#00ff88"/>

<circle id="n3"
class="flowNode"
cx="190"
cy="255"
r="6"
fill="#00ff88"/>

<!-- PV -->

<text x="170"
y="30"
class="scada-name">
PV PANEL
</text>

<circle cx="170"
cy="70"
r="34"
class="scada-circle"/>

<text x="170"
y="64"
class="scada-value"
id="pvPowerScada">
0W
</text>

<text x="170"
y="82"
class="scada-sub"
id="pvVoltScada">
0V | 0A
</text>

<!-- MPPT -->

<circle cx="170"
cy="210"
r="34"
class="scada-circle"/>

<text x="170"
y="204"
class="scada-value"
id="mpptPowerScada">
0W
</text>

<text x="170"
y="222"
class="scada-sub"
id="mpptEffScada">
0%
</text>

<text x="170"
y="300"
class="scada-name">
MPPT
</text>

<!-- BATTERY -->

<circle cx="120"
cy="390"
r="34"
class="scada-circle"/>

<text x="120"
y="384"
class="scada-value"
id="batSocScada">
0%
</text>

<text x="120"
y="402"
class="scada-sub"
id="batVoltScada">
0V | 0A
</text>

<text x="120"
y="460"
class="scada-name">
BATTERY
</text>

<!-- LOAD -->

<circle cx="220"
cy="390"
r="34"
class="scada-circle"/>

<text x="220"
y="384"
class="scada-value"
id="loadPowerScada">
0W
</text>

<text x="220"
y="402"
class="scada-sub"
id="loadVoltScada">
0V | 0A
</text>

<text x="220"
y="460"
class="scada-name">
LOAD
</text>

</svg>

</div>

</div>

<!-- =========================
     RIGHT PANEL
========================= -->

<div class="rightPanel">

<!-- DATA -->

<div class="dataGrid">

<div class="panel box">

<div class="boxTitle">
PHOTOVOLTAIC
</div>

<div class="row">
<span>Voltage</span>
<span id="pvVoltage">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvCurrent">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvPower">0W</span>
</div>

</div>

<div class="panel box">

<div class="boxTitle">
MPPT
</div>

<div class="row">
<span>Charge</span>
<span id="mpptCharge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpptEff">0%</span>
</div>

</div>

<div class="panel box">

<div class="boxTitle">
BATTERY
</div>

<div class="row">
<span>Voltage</span>
<span id="batVoltage">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="batCurrent">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="batSoc">0%</span>
</div>

</div>

<div class="panel box energyBox">

<div class="boxTitle">
ENERGY
</div>

<div class="row">
<span>Daily</span>
<span id="dailyEnergy">0 kWh</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthlyEnergy">0 kWh</span>
</div>

</div>

</div>

<!-- =========================
     GAUGE
========================= -->

<div class="chartGrid">

<div class="panel chartBox">

<div class="chartTitle">
PV
</div>

<div class="chartCanvas">
<canvas id="gauge1"></canvas>
</div>

</div>

<div class="panel chartBox">

<div class="chartTitle">
BATTERY SOC
</div>

<div class="chartCanvas">
<canvas id="gauge2"></canvas>
</div>

</div>

<div class="panel chartBox">

<div class="chartTitle">
MPPT EFFICIENCY
</div>

<div class="chartCanvas">
<canvas id="gauge3"></canvas>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
