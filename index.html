```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>
ISOKUIKI SMART MONITORING
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href=
"https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap"
rel="stylesheet">

<script src=
"https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src=
"https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src=
"https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src=
"https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#000814,
#00152d
);

font-family:
Orbitron,sans-serif;

overflow:hidden;

color:white;
}

/* ================================= */

.dashboard{

width:100vw;
height:100vh;

display:flex;
flex-direction:column;

padding:.5vw;

gap:.5vw;
}

/* ================================= */

.header{

height:9vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;
}

.title{

font-size:
clamp(20px,2vw,40px);

color:#00ffe1;

text-shadow:
0 0 12px #00ffe1;
}

.online{

font-size:
clamp(10px,.8vw,14px);

color:#00ff88;
}

/* ================================= */

.deviceBox{

height:4.5vh;

width:38vw;

margin:auto;

display:flex;
justify-content:center;
align-items:center;

border:
2px solid #00ffcc;

border-radius:20px;

background:
rgba(0,20,40,.5);

font-size:
clamp(12px,1vw,18px);

font-weight:bold;
}

/* ================================= */

.main{

flex:1;

display:grid;

grid-template-columns:
28% 72%;

gap:.6vw;

min-height:0;
}

/* ================================= */

.scada{

background:
rgba(0,20,40,.45);

border-radius:18px;

position:relative;

overflow:hidden;
}

/* ================================= */

.scada svg{

width:100%;
height:100%;
}

/* ================================= */

.widgetsArea{

display:grid;

grid-template-rows:
38% 28% 34%;

gap:.6vw;

min-height:0;
}

/* ================================= */

.widgets{

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

gap:.6vw;
}

/* ================================= */

.card{

background:
rgba(0,20,50,.55);

border-radius:16px;

padding:.6vw;

overflow:hidden;

box-shadow:
0 0 10px rgba(0,255,255,.08);
}

.card h2{

text-align:center;

color:#00ffe1;

font-size:
clamp(12px,1vw,18px);

margin-bottom:.5vw;
}

/* ================================= */

.row{

display:flex;
justify-content:space-between;

padding:.22vw 0;

font-size:
clamp(10px,.8vw,14px);

border-bottom:
1px solid rgba(255,255,255,.05);
}

/* ================================= */

.gauges{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:.6vw;
}

/* ================================= */

.gaugeCard{

background:
rgba(0,20,50,.55);

border-radius:16px;

padding:.5vw;

position:relative;
}

/* ================================= */

.gaugeCard canvas{

width:100% !important;
height:100% !important;
}

/* ================================= */

.chartRow{

display:grid;

grid-template-columns:
1fr 1fr;

gap:.6vw;
}

/* ================================= */

.chartCard{

background:
rgba(0,20,50,.55);

border-radius:16px;

padding:.5vw;
}

/* ================================= */

.chartCard canvas{

width:100% !important;
height:100% !important;
}

/* ================================= */

.flowLine{

stroke:#2d7dff;

stroke-width:5;

fill:none;

stroke-linecap:round;
}

/* ================================= */

.circle{

fill:#03152d;

stroke:#00ffe1;

stroke-width:3;

filter:
drop-shadow(0 0 10px #00ffe1);
}

/* ================================= */

.node{

fill:#00ff99;

filter:
drop-shadow(0 0 8px #00ff99);
}

/* ================================= */

.label{

fill:#00ffe1;

font-size:12px;

text-anchor:middle;
}

.dataTxt{

fill:white;

font-size:10px;

text-anchor:middle;
}

/* ================================= */

@media(max-width:900px){

.main{

grid-template-columns:
34% 66%;
}

.deviceBox{

width:70vw;
}

.title{

font-size:24px;
}

}

</style>

</head>

<body>

<div class="dashboard">

<!-- HEADER -->

<div class="header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online"
id="onlineText">
OFFLINE
</div>

</div>

<!-- DEVICE -->

<div class="deviceBox"
id="deviceStatus">

DEVICE SHUTDOWN

</div>

<!-- MAIN -->

<div class="main">

<!-- SCADA -->

<div class="scada">

<svg viewBox="0 0 300 520">

<!-- FLOW -->

<path class="flowLine"
d="M150 90 L150 190" />

<path class="flowLine"
d="M150 260 L80 260 L80 390" />

<path class="flowLine"
d="M150 260 L220 260 L220 390" />

<!-- NODES -->

<circle id="node1"
class="node"
cx="150"
cy="110"
r="5"/>

<circle id="node2"
class="node"
cx="120"
cy="260"
r="5"/>

<circle id="node3"
class="node"
cx="180"
cy="260"
r="5"/>

<!-- PV -->

<circle class="circle"
cx="150"
cy="60"
r="42"/>

<text class="label"
x="150"
y="132">

PHOTOVOLTAIC

</text>

<text class="dataTxt"
id="pvVolt"
x="150"
y="66">

0V

</text>

<text class="dataTxt"
id="pvAmp"
x="150"
y="82">

0A

</text>

<text class="dataTxt"
id="pvPower"
x="150"
y="98">

0W

</text>

<!-- MPPT -->

<circle class="circle"
cx="150"
cy="210"
r="42"/>

<text class="label"
x="150"
y="282">

MPPT

</text>

<text class="dataTxt"
id="mpptW"
x="150"
y="218">

0W

</text>

<text class="dataTxt"
id="mpptEff"
x="150"
y="236">

0%

</text>

<!-- BAT -->

<circle class="circle"
cx="80"
cy="430"
r="42"/>

<text class="label"
x="80"
y="502">

BATTERY

</text>

<text class="dataTxt"
id="batVolt"
x="80"
y="438">

0V

</text>

<text class="dataTxt"
id="batAmp"
x="80"
y="456">

0A

</text>

<text class="dataTxt"
id="batSoc"
x="80"
y="474">

0%

</text>

<!-- ENERGY -->

<circle class="circle"
cx="220"
cy="430"
r="42"/>

<text class="label"
x="220"
y="502">

ENERGY

</text>

<text class="dataTxt"
id="kwhDay"
x="220"
y="448">

0

</text>

<text class="dataTxt"
id="kwhMonth"
x="220"
y="468">

0

</text>

</svg>

</div>

<!-- RIGHT -->

<div class="widgetsArea">

<!-- WIDGETS -->

<div class="widgets">

<div class="card">

<h2>PHOTOVOLTAIC</h2>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="card">

<h2>MPPT</h2>

<div class="row">
<span>Charge</span>
<span id="charge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="eff">0%</span>
</div>

</div>

<div class="card">

<h2>BATTERY</h2>

<div class="row">
<span>Voltage</span>
<span id="bv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bi">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="soc">0%</span>
</div>

</div>

<div class="card">

<h2>ENERGY</h2>

<div class="row">
<span>Daily</span>
<span id="day">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="month">0</span>
</div>

</div>

</div>

<!-- GAUGES -->

<div class="gauges">

<div class="gaugeCard">
<canvas id="gaugePV"></canvas>
</div>

<div class="gaugeCard">
<canvas id="gaugeBattery"></canvas>
</div>

<div class="gaugeCard">
<canvas id="gaugeMPPT"></canvas>
</div>

</div>

<!-- CHARTS -->

<div class="chartRow">

<div class="chartCard">
<canvas id="chartPV"></canvas>
</div>

<div class="chartCard">
<canvas id="chartDay"></canvas>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
```
