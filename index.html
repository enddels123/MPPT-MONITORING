<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#065f73;

  color:white;

  font-family:Segoe UI,sans-serif;

  padding:12px;
}

/* ================= HEADER ================= */

.header{

  font-size:
  clamp(18px,2vw,34px);

  font-weight:bold;

  margin-bottom:20px;
}

/* ================= MAIN ================= */

.main{

  display:grid;

  grid-template-columns:
  1.1fr 1fr;

  gap:20px;
}

/* ================= LEFT PANEL ================= */

.left-panel{

  display:flex;

  flex-direction:column;

  gap:20px;
}

/* ================= CENTER ICON ================= */

.center-icons{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:20px;

  justify-items:center;
}

/* ================= CIRCLE BOX ================= */

.circle-box{

  width:
  clamp(100px,16vw,160px);

  height:
  clamp(100px,16vw,160px);

  border-radius:50%;

  background:#0b7285;

  border:4px solid
  rgba(255,255,255,0.15);

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  box-shadow:
  0 0 15px rgba(0,0,0,.3);
}

.circle-box h3{

  font-size:
  clamp(12px,1.5vw,20px);

  margin-bottom:8px;
}

.circle-box .value{

  font-size:
  clamp(16px,2vw,30px);

  font-weight:bold;
}

/* ================= RIGHT PANEL ================= */

.right-panel{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:15px;
}

.section{

  display:flex;

  flex-direction:column;

  gap:12px;
}

.section-title{

  font-size:
  clamp(18px,2vw,28px);

  font-weight:bold;
}

/* ================= CARD ================= */

.card{

  background:#118aa0;

  border-radius:12px;

  padding:
  clamp(10px,1.5vw,18px);

  min-height:90px;

  box-shadow:
  0 0 10px rgba(0,0,0,.25);
}

.card-title{

  font-size:
  clamp(11px,1.2vw,18px);

  opacity:.9;
}

.card-value{

  font-size:
  clamp(18px,2vw,34px);

  font-weight:bold;

  margin-top:8px;
}

/* ================= CHART ================= */

.chart-container{

  background:#118aa0;

  border-radius:12px;

  padding:10px;
}

canvas{

  width:100% !important;

  height:250px !important;
}

/* ================= ELECTRICITY STATS ================= */

.statistics{

  margin-top:20px;

  background:#0f7f93;

  border-radius:12px;

  padding:16px;
}

.stats-title{

  font-size:
  clamp(18px,2vw,28px);

  font-weight:bold;

  margin-bottom:15px;
}

.stats-grid{

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:15px;
}

.stats-card{

  background:#118aa0;

  border-radius:10px;

  padding:15px;
}

.stats-name{

  font-size:
  clamp(11px,1.2vw,18px);

  margin-bottom:10px;
}

.stats-value{

  font-size:
  clamp(16px,2vw,30px);

  font-weight:bold;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

  .main{

    grid-template-columns:1fr;
  }

  .right-panel{

    grid-template-columns:1fr;
  }

  .stats-grid{

    grid-template-columns:1fr;
  }

  canvas{

    height:180px !important;
  }
}

</style>

</head>

<body>

<div class="header">
ISOKUIKI Dashboard
</div>

<div class="main">

  <!-- LEFT -->
  <div class="left-panel">

    <div class="center-icons">

      <div class="circle-box">

        <h3>PV Power</h3>

        <div class="value"
        id="pv_p">

          0 W

        </div>

      </div>

      <div class="circle-box">

        <h3>Battery</h3>

        <div class="value"
        id="soc">

          0 %

        </div>

      </div>

      <div class="circle-box">

        <h3>Load</h3>

        <div class="value"
        id="load_p">

          0 W

        </div>

      </div>

      <div class="circle-box">

        <h3>Status</h3>

        <div class="value"
        id="status">

          IDLE

        </div>

      </div>

    </div>

    <!-- CHART -->
    <div class="chart-container">

      <canvas id="chart"></canvas>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- PV -->
    <div class="section">

      <div class="section-title">
        Photovoltaic
      </div>

      <div class="card">

        <div class="card-title">
          PV Voltage
        </div>

        <div class="card-value"
        id="pv_v">

          0 V

        </div>

      </div>

      <div class="card">

        <div class="card-title">
          PV Current
        </div>

        <div class="card-value"
        id="pv_i">

          0 A

        </div>

      </div>

    </div>

    <!-- BATTERY -->
    <div class="section">

      <div class="section-title">
        Battery
      </div>

      <div class="card">

        <div class="card-title">
          Battery Voltage
        </div>

        <div class="card-value"
        id="bat_v">

          0 V

        </div>

      </div>

      <div class="card">

        <div class="card-title">
          Battery Current
        </div>

        <div class="card-value"
        id="bat_i">

          0 A

        </div>

      </div>

      <div class="card">

        <div class="card-title">
          Charge Power
        </div>

        <div class="card-value"
        id="charge_p">

          0 W

        </div>

      </div>

    </div>

  </div>

</div>

<!-- ================= ELECTRICITY STATISTICS ================= -->

<div class="statistics">

  <div class="stats-title">
    Electricity Statistics
  </div>

  <div class="stats-grid">

    <div class="stats-card">

      <div class="stats-name">
        Today Energy
      </div>

      <div class="stats-value"
      id="kwh_day">

        0 kWh

      </div>

    </div>

    <div class="stats-card">

      <div class="stats-name">
        Month Energy
      </div>

      <div class="stats-value"
      id="kwh_month">

        0 kWh

      </div>

    </div>

    <div class="stats-card">

      <div class="stats-name">
        MPPT Efficiency
      </div>

      <div class="stats-value"
      id="mppt_eff">

        0 %

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
