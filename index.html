<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ISOKUIKI SCADA 2.0</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#020617;
overflow:hidden;
color:#fff;
height:100vh;
width:100vw;
}

.main{
height:100vh;
width:100vw;
display:grid;
grid-template-rows:
7vh
6vh
42vh
20vh
25vh;
gap:.6vh;
padding:.7vh;
}

/* HEADER */

.header{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.title{
font-size:clamp(16px,2vw,40px);
color:#00ffe1;
font-weight:800;
text-shadow:0 0 20px #00ffe1;
}

.online{
font-size:clamp(9px,.8vw,14px);
color:#00ff88;
}

/* DEVICE */

.device-box{
display:flex;
justify-content:center;
align-items:center;
}

.device-status{
width:min(50vw,500px);
height:5vh;
border:2px solid #00ffb3;
border-radius:50px;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(10px,1vw,18px);
font-weight:700;
background:#06152d;
box-shadow:0 0 20px #00ffb3;
}

/* CONTENT */

.content{
display:grid;
grid-template-columns:
26%
74%;
gap:.8vh;
height:100%;
}

/* SCADA */

.scada{
background:#031126;
border-radius:20px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

svg{
width:100%;
height:100%;
}

/* FLOW */

.flow-line{
stroke:#2b6cb0;
stroke-width:4;
fill:none;
}

.node{
fill:#00ff99;
filter:drop-shadow(0 0 8px #00ff99);
}

/* DATA GRID */

.data-grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:.7vh;
height:100%;
}

.card{
background:#06152d;
border-radius:18px;
padding:.8vh;
display:flex;
flex-direction:column;
justify-content:flex-start;
box-shadow:0 0 10px rgba(0,255,255,.15);
}

.card-title{
text-align:center;
color:#00ffe1;
font-size:clamp(11px,1vw,18px);
margin-bottom:.4vh;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:#0a1c3d;
padding:.45vh .6vw;
border-radius:8px;
margin-bottom:.35vh;
font-size:clamp(9px,.85vw,15px);
}

/* GAUGE */

.gauge-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:.7vh;
height:100%;
}

.gauge-card{
background:#06152d;
border-radius:18px;
padding:.4vh;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

/* CHART */

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:.7vh;
height:100%;
}

.chart-card{
background:#06152d;
border-radius:18px;
padding:.5vh;
position:relative;
}

/* RESPONSIVE */

@media(max-width:900px){

.main{
grid-template-rows:
6vh
5vh
35vh
24vh
30vh;
}

.content{
grid-template-columns:38% 62%;
}

.gauge-grid{
grid-template-columns:1fr;
grid-template-rows:1fr 1fr 1fr;
}

.chart-grid{
grid-template-columns:1fr;
grid-template-rows:1fr 1fr 1fr;
}

}

</style>
</head>

<body>

<div class="main">

<div class="header">
<div class="title">ISOKUIKI SMART ENERGY</div>
<div class="online" id="onlineText">OFFLINE</div>
</div>

<div class="device-box">
<div class="device-status" id="deviceStatus">
DEVICE SHUTDOWN
</div>
</div>

<div class="content">

<!-- SCADA -->

<div class="scada">

<svg viewBox="0 0 300 500">

<!-- LINES -->

<line class="flow-line" x1="150" y1="70" x2="150" y2="170"/>
<line class="flow-line" x1="150" y1="250" x2="150" y2="300"/>

<line class="flow-line" x1="150" y1="300" x2="70" y2="300"/>
<line class="flow-line" x1="70" y1="300" x2="70" y2="390"/>

<line class="flow-line" x1="150" y1="300" x2="230" y2="300"/>
<line class="flow-line" x1="230" y1="300" x2="230" y2="390"/>

<!-- NODES -->

<circle class="node" id="n1" r="6"/>
<circle class="node" id="n2" r="6"/>
<circle class="node" id="n3" r="6"/>

<!-- PV -->

<circle cx="150" cy="50" r="40"
stroke="#00ffe1"
stroke-width="3"
fill="#06213f"/>

<text x="150" y="40"
fill="#fff"
font-size="22"
text-anchor="middle">☀</text>

<text x="150" y="58"
fill="#fff"
font-size="8"
text-anchor="middle"
id="pvVolt">0V</text>

<text x="150" y="70"
fill="#fff"
font-size="8"
text-anchor="middle"
id="pvAmp">0A</text>

<text x="150" y="82"
fill="#fff"
font-size="8"
text-anchor="middle"
id="pvPower">0W</text>

<text x="150" y="105"
fill="#00ffe1"
font-size="10"
text-anchor="middle">
PHOTOVOLTAIC
</text>

<!-- MPPT -->

<circle cx="150" cy="210" r="40"
stroke="#00ffe1"
stroke-width="3"
fill="#06213f"/>

<text x="150" y="205"
fill="#fff"
font-size="22"
text-anchor="middle">⚙</text>

<text x="150" y="225"
fill="#fff"
font-size="8"
text-anchor="middle"
id="mpptW">0W</text>

<text x="150" y="237"
fill="#fff"
font-size="8"
text-anchor="middle"
id="mpptEff">0%</text>

<text x="150" y="265"
fill="#00ffe1"
font-size="10"
text-anchor="middle">
MPPT
</text>

<!-- BATTERY -->

<circle cx="70" cy="430" r="40"
stroke="#00ffe1"
stroke-width="3"
fill="#06213f"/>

<text x="70" y="420"
fill="#fff"
font-size="22"
text-anchor="middle">🔋</text>

<text x="70" y="440"
fill="#fff"
font-size="8"
text-anchor="middle"
id="batVolt">0V</text>

<text x="70" y="452"
fill="#fff"
font-size="8"
text-anchor="middle"
id="batAmp">0A</text>

<text x="70" y="464"
fill="#fff"
font-size="8"
text-anchor="middle"
id="batSoc">0%</text>

<text x="70" y="495"
fill="#00ffe1"
font-size="10"
text-anchor="middle">
BATTERY
</text>

<!-- ENERGY -->

<circle cx="230" cy="430" r="40"
stroke="#00ffe1"
stroke-width="3"
fill="#06213f"/>

<text x="230" y="425"
fill="#fff"
font-size="22"
text-anchor="middle">⚡</text>

<text x="230" y="445"
fill="#fff"
font-size="8"
text-anchor="middle"
id="kwhDay">0</text>

<text x="230" y="457"
fill="#fff"
font-size="8"
text-anchor="middle">kWh</text>

<text x="230" y="495"
fill="#00ffe1"
font-size="10"
text-anchor="middle">
ENERGY
</text>

</svg>

</div>

<!-- DATA -->

<div class="data-grid">

<div class="card">
<div class="card-title">PHOTOVOLTAIC</div>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="card">
<div class="card-title">MPPT</div>

<div class="row">
<span>Charge</span>
<span id="charge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="eff">0%</span>
</div>

</div>

<div class="card">
<div class="card-title">BATTERY</div>

<div class="row">
<span>Voltage</span>
<span id="bv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bi">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="soc">0%</span>
</div>

</div>

<div class="card">
<div class="card-title">ENERGY</div>

<div class="row">
<span>Daily</span>
<span id="day">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="month">0</span>
</div>

</div>

</div>

</div>

<!-- GAUGE -->

<div class="gauge-grid">

<div class="gauge-card">
<canvas id="gauge1"></canvas>
</div>

<div class="gauge-card">
<canvas id="gauge2"></canvas>
</div>

<div class="gauge-card">
<canvas id="gauge3"></canvas>
</div>

</div>

<!-- CHART -->

<div class="chart-grid">

<div class="chart-card">
<canvas id="chart1"></canvas>
</div>

<div class="chart-card">
<canvas id="chart2"></canvas>
</div>

<div class="chart-card">
<canvas id="chart3"></canvas>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
