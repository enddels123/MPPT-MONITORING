<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>ISOKUIKI SMART ENERGY</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
rel="stylesheet">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#000814,
#001233
);

color:#fff;

overflow:hidden;

height:100vh;
}

/* =========================================
MAIN
========================================= */

.dashboard{

width:100%;
height:100vh;

display:grid;

grid-template-rows:
auto auto 1fr auto;

gap:1vh;

padding:1vh;
}

/* =========================================
HEADER
========================================= */

.header{

text-align:center;
}

.title{

font-size:
clamp(22px,2vw,42px);

color:#00ffe1;

text-shadow:
0 0 10px #00ffe1,
0 0 20px #00ffe1;
}

#network{

font-size:
clamp(10px,1vw,16px);

margin-top:.3vh;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* =========================================
STATUS
========================================= */

.status-box{

width:min(60vw,500px);

margin:auto;

padding:1vh;

border-radius:40px;

border:
3px solid #00ff99;

text-align:center;

font-size:
clamp(14px,1.2vw,22px);

background:
rgba(0,20,40,.7);

box-shadow:
0 0 15px #00ff99;
}

/* =========================================
CONTENT
========================================= */

.content{

display:grid;

grid-template-columns:
1fr 1.4fr;

gap:1vh;

height:100%;
}

/* =========================================
SCADA
========================================= */

.scada-panel{

display:flex;
align-items:center;
justify-content:center;

background:
rgba(0,10,30,.55);

border-radius:20px;

position:relative;
}

svg{

width:100%;
height:100%;
}

/* =========================================
FLOW
========================================= */

.flow-line{

stroke:#3b82f6;
stroke-width:5;
fill:none;
}

.flow-dot{

fill:#00ff88;

filter:
drop-shadow(0 0 10px #00ff88);

animation:
pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:.2;
}

50%{
opacity:1;
}

100%{
opacity:.2;
}
}

/* =========================================
RIGHT
========================================= */

.right-panel{

display:grid;

grid-template-rows:
1fr auto;

gap:1vh;
}

/* =========================================
WIDGETS
========================================= */

.widgets{

display:grid;

grid-template-columns:
1fr 1fr;

gap:1vh;
}

.widget{

background:
rgba(0,15,40,.8);

border-radius:18px;

padding:1vh;

box-shadow:
0 0 10px rgba(0,255,255,.15);
}

.widget h3{

text-align:center;

margin-bottom:1vh;

font-size:
clamp(12px,1vw,20px);

color:#00ffe1;
}

.row{

display:flex;

justify-content:space-between;

padding:.5vh;

margin-bottom:.5vh;

background:
rgba(255,255,255,.03);

border-radius:10px;

font-size:
clamp(10px,.9vw,16px);
}

/* =========================================
SOC
========================================= */

.soc-bar{

height:12px;

background:#1e293b;

border-radius:20px;

overflow:hidden;

margin-top:1vh;
}

.soc-fill{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

transition:.5s;
}

/* =========================================
CHARTS
========================================= */

.charts{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:1vh;
}

.chart-box{

background:
rgba(0,15,40,.8);

border-radius:18px;

padding:1vh;

height:24vh;
}

/* =========================================
RESPONSIVE
========================================= */

@media(max-width:900px){

.content{

grid-template-columns:
1fr;

}

.scada-panel{

height:28vh;
}

.charts{

grid-template-columns:
1fr 1fr 1fr;
}

.chart-box{

height:18vh;
}
}

</style>
</head>

<body>

<div class="dashboard">

<div class="header">

<h1 class="title">
ISOKUIKI SMART ENERGY
</h1>

<div id="network"
class="offline">
OFFLINE
</div>

</div>

<div
id="deviceStatus"
class="status-box">

DEVICE SHUTDOWN

</div>

<div class="content">

<div class="scada-panel">

<svg viewBox="0 0 400 500">

<!-- LINE -->

<line
x1="200"
y1="90"
x2="200"
y2="180"
class="flow-line"
/>

<line
x1="200"
y1="240"
x2="100"
y2="240"
class="flow-line"
/>

<line
x1="100"
y1="240"
x2="100"
y2="340"
class="flow-line"
/>

<line
x1="200"
y1="240"
x2="300"
y2="240"
class="flow-line"
/>

<line
x1="300"
y1="240"
x2="300"
y2="340"
class="flow-line"
/>

<!-- NODE -->

<circle
cx="200"
cy="130"
r="6"
class="flow-dot"
/>

<circle
cx="150"
cy="240"
r="6"
class="flow-dot"
/>

<circle
cx="250"
cy="240"
r="6"
class="flow-dot"
/>

<!-- PV -->

<circle
cx="200"
cy="60"
r="55"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="200"
y="45"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

☀

</text>

<text
x="200"
y="70"
fill="#fff"
font-size="12"
text-anchor="middle"
id="pv_v">

0V

</text>

<text
x="200"
y="90"
fill="#fff"
font-size="12"
text-anchor="middle"
id="pv_i">

0A

</text>

<text
x="200"
y="110"
fill="#fff"
font-size="12"
text-anchor="middle"
id="pv_p">

0W

</text>

<text
x="200"
y="145"
fill="#00ffe1"
font-size="14"
text-anchor="middle">

PHOTOVOLTAIC

</text>

<!-- MPPT -->

<circle
cx="200"
cy="200"
r="55"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="200"
y="190"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

⚙

</text>

<text
x="200"
y="215"
fill="#fff"
font-size="12"
text-anchor="middle"
id="charge_p">

0W

</text>

<text
x="200"
y="235"
fill="#fff"
font-size="12"
text-anchor="middle"
id="mppt_eff">

0%

</text>

<text
x="200"
y="270"
fill="#00ffe1"
font-size="14"
text-anchor="middle">

MPPT

</text>

<!-- BAT -->

<circle
cx="100"
cy="390"
r="55"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="100"
y="375"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

🔋

</text>

<text
x="100"
y="395"
fill="#fff"
font-size="12"
text-anchor="middle"
id="bat_v">

0V

</text>

<text
x="100"
y="415"
fill="#fff"
font-size="12"
text-anchor="middle"
id="bat_i">

0A

</text>

<text
x="100"
y="435"
fill="#fff"
font-size="12"
text-anchor="middle"
id="soc">

0%

</text>

<text
x="100"
y="465"
fill="#00ffe1"
font-size="14"
text-anchor="middle">

BATTERY

</text>

<!-- ENERGY -->

<circle
cx="300"
cy="390"
r="55"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="300"
y="375"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

⚡

</text>

<text
x="300"
y="395"
fill="#fff"
font-size="12"
text-anchor="middle"
id="kwh_day">

0

</text>

<text
x="300"
y="415"
fill="#fff"
font-size="12"
text-anchor="middle"
id="kwh_month">

0

</text>

<text
x="300"
y="465"
fill="#00ffe1"
font-size="14"
text-anchor="middle">

ENERGY

</text>

</svg>

</div>

<div class="right-panel">

<div class="widgets">

<div class="widget">

<h3>PHOTOVOLTAIC</h3>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="widget">

<h3>MPPT</h3>

<div class="row">
<span>Charge</span>
<span id="cpp">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpe">0%</span>
</div>

</div>

<div class="widget">

<h3>BATTERY</h3>

<div class="row">
<span>Voltage</span>
<span id="bvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bii">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="socc">0%</span>
</div>

<div class="soc-bar">
<div
class="soc-fill"
id="soc_fill">
</div>
</div>

</div>

<div class="widget">

<h3>ENERGY</h3>

<div class="row">
<span>Daily</span>
<span id="dayy">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthh">0</span>
</div>

</div>

</div>

<div class="charts">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="dayChart"></canvas>
</div>

<div class="chart-box">

</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
