<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISOKUIKI SMART ENERGY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root{
--bg:#020b1d;
--panel:#041933;
--cyan:#00ffe5;
--blue:#36a3ff;
--green:#7CFC00;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Orbitron',sans-serif;
color:white;
overflow-x:hidden;
}

.main{
width:100%;
max-width:1500px;
margin:auto;
padding:14px;
display:grid;
grid-template-columns:300px 1fr;
gap:14px;
min-height:100vh;
}

.panel{
background:var(--panel);
border-radius:22px;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 0 18px rgba(0,255,229,.08);
}

.leftPanel,.rightPanel{
display:flex;
flex-direction:column;
gap:14px;
}

.header{
padding:18px;
text-align:center;
}

.title{
font-size:1.4rem;
color:var(--cyan);
margin-bottom:10px;
}

.online{
font-size:.9rem;
font-weight:bold;
margin-bottom:12px;
color:var(--green);
}

.device{
width:90%;
margin:auto;
padding:10px;
border-radius:12px;
border:2px solid var(--cyan);
font-size:.85rem;
}

.scada{
height:560px;
padding:10px;
overflow:hidden;
}

svg{
width:100%;
height:100%;
}

.scada-circle{
fill:#062041;
stroke:var(--cyan);
stroke-width:4;
}

.scada-name{
fill:var(--cyan);
font-size:13px;
font-weight:bold;
text-anchor:middle;
}

.scada-value{
fill:white;
font-size:16px;
font-weight:bold;
text-anchor:middle;
}

.scada-sub{
fill:var(--green);
font-size:10px;
text-anchor:middle;
}

.flow-line{
stroke:#36a3ff;
stroke-width:5;
stroke-linecap:round;
}

.dataGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.box{
padding:14px;
min-height:160px;
}

.boxTitle{
text-align:center;
color:var(--cyan);
font-size:1rem;
margin-bottom:14px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.07);
font-size:.88rem;
}

.chartGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.chartBox{
padding:12px;
height:240px;
}

.chartCanvas{
position:relative;
height:180px;
}

@media(max-width:1000px){
.main{
grid-template-columns:1fr;
}
.dataGrid{
grid-template-columns:1fr 1fr;
}
.chartGrid{
grid-template-columns:1fr;
}
}

@media(max-width:650px){
.dataGrid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="main">

<div class="leftPanel">

<div class="panel header">
<div class="title">ISOKUIKI SMART ENERGY</div>
<div class="online" id="onlineText">ONLINE</div>
<div class="device" id="deviceStatus">ESP32 + EW11 ACTIVE</div>
</div>

<div class="panel scada">

<svg id="scadaSvg" viewBox="0 0 340 500">

<line class="flow-line" x1="170" y1="90" x2="170" y2="180"/>
<line class="flow-line" x1="170" y1="250" x2="120" y2="250"/>
<line class="flow-line" x1="170" y1="250" x2="220" y2="250"/>
<line class="flow-line" x1="120" y1="250" x2="120" y2="360"/>
<line class="flow-line" x1="220" y1="250" x2="220" y2="360"/>

<text x="170" y="30" class="scada-name">PV PANEL</text>
<circle cx="170" cy="70" r="34" class="scada-circle"/>
<text x="170" y="66" class="scada-value" id="pvPowerScada">0W</text>
<text x="170" y="82" class="scada-sub" id="pvVoltScada">0V | 0A</text>

<text x="170" y="205" class="scada-name">MPPT</text>
<circle cx="170" cy="220" r="34" class="scada-circle"/>
<text x="170" y="216" class="scada-value" id="mpptPowerScada">0W</text>
<text x="170" y="232" class="scada-sub" id="mpptEffScada">0%</text>

<text x="120" y="445" class="scada-name">BATTERY</text>
<circle cx="120" cy="390" r="34" class="scada-circle"/>
<text x="120" y="386" class="scada-value" id="batSocScada">0%</text>
<text x="120" y="402" class="scada-sub" id="batVoltScada">0V | 0A</text>

<text x="220" y="445" class="scada-name">LOAD</text>
<circle cx="220" cy="390" r="34" class="scada-circle"/>
<text x="220" y="386" class="scada-value" id="loadPowerScada">0W</text>
<text x="220" y="402" class="scada-sub" id="loadVoltScada">0V | 0A</text>

</svg>
</div>
</div>

<div class="rightPanel">

<div class="dataGrid">

<div class="panel box">
<div class="boxTitle">PHOTOVOLTAIC</div>
<div class="row"><span>Voltage</span><span id="pvVoltage">0V</span></div>
<div class="row"><span>Current</span><span id="pvCurrent">0A</span></div>
<div class="row"><span>Power</span><span id="pvPower">0W</span></div>
</div>

<div class="panel box">
<div class="boxTitle">MPPT</div>
<div class="row"><span>Charge</span><span id="mpptCharge">0W</span></div>
<div class="row"><span>Efficiency</span><span id="mpptEff">0%</span></div>
</div>

<div class="panel box">
<div class="boxTitle">BATTERY</div>
<div class="row"><span>Voltage</span><span id="batVoltage">0V</span></div>
<div class="row"><span>Current</span><span id="batCurrent">0A</span></div>
<div class="row"><span>SOC</span><span id="batSoc">0%</span></div>
</div>

</div>

<div class="chartGrid">

<div class="panel chartBox">
<div class="boxTitle">PV POWER</div>
<div class="chartCanvas"><canvas id="gauge1"></canvas></div>
</div>

<div class="panel chartBox">
<div class="boxTitle">BATTERY SOC</div>
<div class="chartCanvas"><canvas id="gauge2"></canvas></div>
</div>

<div class="panel chartBox">
<div class="boxTitle">MPPT EFFICIENCY</div>
<div class="chartCanvas"><canvas id="gauge3"></canvas></div>
</div>

</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
