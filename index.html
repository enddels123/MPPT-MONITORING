<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Isokuiki Dashboard</title>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =====================================================
   GLOBAL
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#07171d;

  color:white;

  font-family:
  "Segoe UI",sans-serif;

  overflow-x:hidden;

  padding:12px;
}

/* =====================================================
   DASHBOARD
===================================================== */

.dashboard{

  display:flex;

  flex-direction:column;

  gap:16px;
}

/* =====================================================
   FLOW SECTION
===================================================== */

.flow-wrapper{

  position:relative;

  width:100%;

  min-height:560px;

  overflow:hidden;

  border-radius:20px;

  background:
  linear-gradient(
    180deg,
    #0a2027,
    #08151b
  );

  box-shadow:
  0 0 15px rgba(0,0,0,.4);
}

/* =====================================================
   SVG FLOW
===================================================== */

.flow-lines{

  position:absolute;

  inset:0;

  width:100%;
  height:100%;

  z-index:0;
}

.flow-lines path{

  fill:none;

  stroke:#ffe600;

  stroke-width:3;

  stroke-linecap:round;

  opacity:.95;

  filter:
  drop-shadow(
    0 0 6px rgba(255,230,0,.5)
  );
}

/* =====================================================
   MOVING NODE
===================================================== */

.energy-node{

  position:absolute;

  width:8px;

  height:8px;

  border-radius:50%;

  background:#ffee00;

  box-shadow:
  0 0 10px #ffee00;

  z-index:5;
}

/* =====================================================
   NODE ANIMATION
===================================================== */

/* PV */

#node-pv{

  top:145px;
  left:180px;

  animation:
  nodePV 2s linear infinite;
}

@keyframes nodePV{

  0%{
    left:180px;
    top:145px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  70%{
    left:50%;
    top:145px;
  }

  100%{
    left:50%;
    top:250px;
    opacity:0;
  }
}

/* LOAD */

#node-load{

  top:250px;
  left:53%;

  animation:
  nodeLOAD 2s linear infinite;
}

@keyframes nodeLOAD{

  0%{
    left:53%;
    top:250px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  70%{
    left:82%;
    top:250px;
  }

  100%{
    left:82%;
    top:145px;
    opacity:0;
  }
}

/* BATTERY */

#node-battery{

  left:49%;
  top:300px;

  animation:
  nodeBAT 2s linear infinite;
}

@keyframes nodeBAT{

  0%{
    top:300px;
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    top:450px;
    opacity:0;
  }
}

/* =====================================================
   CIRCLE WIDGET
===================================================== */

.circle-box{

  position:absolute;

  width:
  clamp(100px,10vw,150px);

  height:
  clamp(100px,10vw,150px);

  border-radius:50%;

  background:
  radial-gradient(
    circle at center,
    #0f9eb5 0%,
    #0a7082 60%,
    #06414f 100%
  );

  border:
  2px solid rgba(255,255,255,.1);

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  text-align:center;

  box-shadow:
  0 0 20px rgba(0,255,255,.12),
  inset 0 0 18px rgba(255,255,255,.05);

  z-index:2;
}

.circle-ring{

  position:absolute;

  width:84%;
  height:84%;

  border-radius:50%;

  border:
  2px solid rgba(255,255,255,.06);
}

.circle-icon{

  font-size:
  clamp(18px,2vw,30px);

  margin-bottom:4px;
}

.circle-title{

  font-size:
  clamp(10px,1vw,14px);

  opacity:.9;

  margin-bottom:4px;
}

.circle-data{

  font-size:
  clamp(10px,1vw,13px);

  line-height:1.45;
}

.circle-value{

  font-size:
  clamp(13px,1.4vw,18px);

  font-weight:bold;
}

/* =====================================================
   POSITION
===================================================== */

.pv-circle{

  top:90px;
  left:40px;
}

.load-circle{

  top:90px;
  right:40px;
}

.mppt-circle{

  top:210px;

  left:50%;

  transform:
  translateX(-50%);
}

.battery-circle{

  bottom:35px;

  left:35%;
}

.idle-circle{

  bottom:35px;

  right:35%;
}

/* =====================================================
   PANEL
===================================================== */

.panel-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));

  gap:14px;
}

.panel{

  background:#0d7b90;

  border-radius:14px;

  padding:14px;

  box-shadow:
  0 0 12px rgba(0,0,0,.25);
}

.panel-title{

  font-size:20px;

  margin-bottom:12px;

  font-weight:bold;
}

/* =====================================================
   CARD GRID
===================================================== */

.card-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(120px,1fr));

  gap:10px;
}

/* =====================================================
   CARD
===================================================== */

.card{

  background:#1491a8;

  border-radius:12px;

  min-height:100px;

  padding:10px;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  text-align:center;
}

.card-name{

  font-size:13px;

  opacity:.85;
}

.card-value{

  font-size:22px;

  font-weight:bold;

  margin-top:6px;
}

/* =====================================================
   ELECTRICITY STAT
===================================================== */

.stats-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(170px,1fr));

  gap:10px;
}

.stat-card{

  background:#1491a8;

  border-radius:12px;

  padding:15px;

  text-align:center;
}

.stat-name{

  font-size:13px;

  opacity:.85;
}

.stat-value{

  margin-top:6px;

  font-size:24px;

  font-weight:bold;
}

/* =====================================================
   CHART
===================================================== */

.chart-box{

  background:#0d7b90;

  border-radius:16px;

  padding:15px;

  height:320px;
}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:900px){

  .flow-wrapper{

    min-height:820px;
  }

  .pv-circle{

    top:30px;
    left:20px;
  }

  .load-circle{

    top:30px;
    right:20px;
  }

  .mppt-circle{

    top:300px;
  }

  .battery-circle{

    bottom:50px;
    left:18%;
  }

  .idle-circle{

    bottom:50px;
    right:18%;
  }
}

</style>

</head>

<body>

<div class="dashboard">

<!-- =====================================================
     FLOW VISUAL
===================================================== -->

<div class="flow-wrapper">

  <!-- SVG FLOW -->
  <svg class="flow-lines"
  viewBox="0 0 1000 600">

    <!-- PV -> MPPT -->
    <path
    d="
    M170 160
    L500 160
    L500 250
    " />

    <!-- MPPT -> LOAD -->
    <path
    d="
    M550 250
    L830 250
    L830 160
    " />

    <!-- MPPT -> BATTERY -->
    <path
    d="
    M500 300
    L500 450
    " />

  </svg>

  <!-- NODE -->
  <div class="energy-node"
  id="node-pv"></div>

  <div class="energy-node"
  id="node-load"></div>

  <div class="energy-node"
  id="node-battery"></div>

  <!-- =====================================================
       PV
  ===================================================== -->

  <div class="circle-box pv-circle">

    <div class="circle-ring"></div>

    <div class="circle-icon">
      <i class="fa-solid fa-solar-panel"></i>
    </div>

    <div class="circle-title">
      PV
    </div>

    <div class="circle-data">

      <div id="pv_v">
        0 V
      </div>

      <div id="pv_i">
        0 A
      </div>

      <div class="circle-value"
      id="pv_p">

        0 W

      </div>

    </div>

  </div>

  <!-- =====================================================
       LOAD
  ===================================================== -->

  <div class="circle-box load-circle">

    <div class="circle-ring"></div>

    <div class="circle-icon">
      <i class="fa-solid fa-house"></i>
    </div>

    <div class="circle-title">
      LOAD
    </div>

    <div class="circle-data">

      <div id="load_v">
        0 V
      </div>

      <div id="load_i">
        0 A
      </div>

      <div class="circle-value"
      id="load_p">

        0 W

      </div>

    </div>

  </div>

  <!-- =====================================================
       MPPT
  ===================================================== -->

  <div class="circle-box mppt-circle">

    <div class="circle-ring"></div>

    <div class="circle-icon">
      <i class="fa-solid fa-bolt"></i>
    </div>

    <div class="circle-title">
      MPPT
    </div>

    <div class="circle-data">

      <div id="mppt_v">
        0 V
      </div>

      <div id="mppt_i">
        0 A
      </div>

      <div class="circle-value"
      id="mppt_p">

        0 W

      </div>

    </div>

  </div>

  <!-- =====================================================
       BATTERY
  ===================================================== -->

  <div class="circle-box battery-circle">

    <div class="circle-ring"></div>

    <div class="circle-icon">
      <i class="fa-solid fa-battery-full"></i>
    </div>

    <div class="circle-title">
      BATTERY
    </div>

    <div class="circle-data">

      <div id="bat_v">
        0 V
      </div>

      <div id="bat_i">
        0 A
      </div>

      <div class="circle-value"
      id="bat_p">

        0 W

      </div>

      <div id="soc">
        0 %

      </div>

    </div>

  </div>

  <!-- =====================================================
       IDLE
  ===================================================== -->

  <div class="circle-box idle-circle">

    <div class="circle-ring"></div>

    <div class="circle-icon">
      <i class="fa-solid fa-power-off"></i>
    </div>

    <div class="circle-title">
      IDLE
    </div>

    <div class="circle-data">

      <div id="idle_v">
        0 V
      </div>

      <div id="idle_i">
        0 A
      </div>

      <div class="circle-value"
      id="idle_p">

        0 W

      </div>

    </div>

  </div>

</div>

<!-- =====================================================
     DETAIL PANEL
===================================================== -->

<div class="panel-grid">

  <!-- PV -->
  <div class="panel">

    <div class="panel-title">
      Photovoltaic
    </div>

    <div class="card-grid">

      <div class="card">

        <div class="card-name">
          PV Voltage
        </div>

        <div class="card-value"
        id="pv_voltage_card">

          0 V

        </div>

      </div>

      <div class="card">

        <div class="card-name">
          PV Current
        </div>

        <div class="card-value"
        id="pv_current_card">

          0 A

        </div>

      </div>

      <div class="card">

        <div class="card-name">
          PV Power
        </div>

        <div class="card-value"
        id="pv_power_card">

          0 W

        </div>

      </div>

    </div>

  </div>

  <!-- BATTERY -->
  <div class="panel">

    <div class="panel-title">
      Battery
    </div>

    <div class="card-grid">

      <div class="card">

        <div class="card-name">
          Battery Voltage
        </div>

        <div class="card-value"
        id="bat_voltage_card">

          0 V

        </div>

      </div>

      <div class="card">

        <div class="card-name">
          Battery Current
        </div>

        <div class="card-value"
        id="bat_current_card">

          0 A

        </div>

      </div>

      <div class="card">

        <div class="card-name">
          SOC
        </div>

        <div class="card-value"
        id="soc_card">

          0 %

        </div>

      </div>

    </div>

  </div>

</div>

<!-- =====================================================
     ELECTRICITY STATISTICS
===================================================== -->

<div class="panel">

  <div class="panel-title">
    Electricity Statistics
  </div>

  <div class="stats-grid">

    <div class="stat-card">

      <div class="stat-name">
        Today Energy
      </div>

      <div class="stat-value"
      id="today_energy">

        0 kWh

      </div>

    </div>

    <div class="stat-card">

      <div class="stat-name">
        Month Energy
      </div>

      <div class="stat-value"
      id="month_energy">

        0 kWh

      </div>

    </div>

    <div class="stat-card">

      <div class="stat-name">
        Load Consumption
      </div>

      <div class="stat-value"
      id="load_energy">

        0 kWh

      </div>

    </div>

  </div>

</div>

<!-- =====================================================
     CHART
===================================================== -->

<div class="chart-box">

  <canvas id="powerChart"></canvas>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
