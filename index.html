<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ISOKUIKI SMART ENERGY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000f2b;
    font-family:'Orbitron',sans-serif;
    color:#fff;
    overflow-x:hidden;
}

.container{
    width:100%;
    padding:18px;
}

/* =========================
GRID
========================= */

.dashboard{
    display:grid;
    grid-template-columns:
        minmax(280px,340px)
        repeat(3,minmax(260px,1fr));
    gap:14px;
    align-items:start;
}

/* =========================
PANEL
========================= */

.panel{
    background:#001736;
    border:1px solid rgba(0,255,255,.12);
    border-radius:22px;
    padding:16px;
    box-shadow:
        inset 0 0 20px rgba(0,255,255,.04),
        0 0 18px rgba(0,0,0,.4);
}

/* =========================
HEADER
========================= */

.header-panel{
    height:170px;
}

.main-title{
    text-align:center;
    color:#00ffff;
    font-size:clamp(22px,2vw,38px);
    font-weight:700;
    margin-top:4px;
    text-shadow:0 0 12px #00ffff;
}

.status-text{
    text-align:center;
    margin-top:8px;
    font-size:14px;
    font-weight:700;
}

.online{
    color:#7CFF00;
    text-shadow:0 0 10px #7CFF00;
}

.offline{
    color:#ff2b2b;
    text-shadow:0 0 10px #ff2b2b;
}

.device-box{
    margin-top:14px;
    border:2px solid #00ffd5;
    border-radius:14px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:13px;
    box-shadow:0 0 12px rgba(0,255,255,.25);
}

/* =========================
INFO PANEL
========================= */

.info-panel{
    min-height:170px;
}

.panel-title{
    text-align:center;
    color:#00ffff;
    font-size:clamp(16px,1.2vw,24px);
    margin-bottom:16px;
    text-shadow:0 0 10px #00ffff;
}

.data-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:clamp(12px,1vw,18px);
}

/* =========================
ENERGY
========================= */

.energy-panel{
    min-height:170px;
}

/* =========================
SCADA
========================= */

.scada-panel{
    height:520px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.scada-svg{
    width:100%;
    height:100%;
}

.scada-label{
    fill:#00ffff;
    font-size:14px;
    font-weight:700;
}

.scada-main{
    fill:#ffffff;
    font-size:22px;
    font-weight:700;
}

.scada-sub{
    fill:#7CFF00;
    font-size:11px;
    font-weight:700;
}

.line{
    stroke:#36a7ff;
    stroke-width:6;
    fill:none;
    stroke-linecap:round;
}

.node{
    fill:#00ff9d;
    filter:drop-shadow(0 0 8px #00ff9d);
}

.circle{
    fill:#001736;
    stroke:#00ffff;
    stroke-width:5;
    filter:drop-shadow(0 0 12px #00ffff);
}

/* =========================
GAUGE
========================= */

.gauge-panel{
    height:250px;
    position:relative;
}

.gauge-title{
    text-align:center;
    color:#00ffff;
    font-size:16px;
    margin-bottom:8px;
    text-shadow:0 0 8px #00ffff;
}

.gauge-wrap{
    position:absolute;
    inset:48px 20px 20px 20px;
}

.gauge-svg{
    width:100%;
    height:100%;
}

.gauge-bg{
    fill:none;
    stroke:#173784;
    stroke-width:22;
    stroke-linecap:round;
}

.gauge-fill{
    fill:none;
    stroke:#00ffff;
    stroke-width:22;
    stroke-linecap:round;
    stroke-dasharray:565;
    stroke-dashoffset:565;
    transition:.5s;
}

.gauge-value{
    fill:#ffffff;
    font-size:28px;
    font-weight:700;
}

.gauge-sub{
    fill:#00ffff;
    font-size:13px;
}

.gauge-sub2{
    fill:#7CFF00;
    font-size:13px;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1200px){

.dashboard{
    grid-template-columns:
        repeat(2,minmax(280px,1fr));
}

.scada-panel{
    height:500px;
}

}

@media(max-width:768px){

.container{
    padding:10px;
}

.dashboard{
    grid-template-columns:1fr;
    gap:12px;
}

.header-panel,
.info-panel,
.energy-panel,
.gauge-panel,
.scada-panel{
    width:100%;
}

.scada-panel{
    height:470px;
}

.gauge-panel{
    height:230px;
}

.main-title{
    font-size:28px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="dashboard">

<!-- ================= HEADER ================= -->

<div class="panel header-panel">

    <div class="main-title">
        ISOKUIKI SMART ENERGY
    </div>

    <div id="deviceStatus" class="status-text offline">
        OFFLINE
    </div>

    <div class="device-box">
        DEVICE ACTIVE
    </div>

</div>

<!-- ================= PHOTOVOLTAIC ================= -->

<div class="panel info-panel">

    <div class="panel-title">PHOTOVOLTAIC</div>

    <div class="data-row">
        <span>Voltage</span>
        <span id="pvVoltage">0V</span>
    </div>

    <div class="data-row">
        <span>Current</span>
        <span id="pvCurrent">0A</span>
    </div>

    <div class="data-row">
        <span>Power</span>
        <span id="pvPower">0W</span>
    </div>

</div>

<!-- ================= MPPT ================= -->

<div class="panel info-panel">

    <div class="panel-title">MPPT</div>

    <div class="data-row">
        <span>Charge</span>
        <span id="mpptPower">0W</span>
    </div>

    <div class="data-row">
        <span>Efficiency</span>
        <span id="mpptEff">0%</span>
    </div>

</div>

<!-- ================= BATTERY ================= -->

<div class="panel info-panel">

    <div class="panel-title">BATTERY</div>

    <div class="data-row">
        <span>Voltage</span>
        <span id="batVoltage">0V</span>
    </div>

    <div class="data-row">
        <span>Current</span>
        <span id="batCurrent">0A</span>
    </div>

    <div class="data-row">
        <span>SOC</span>
        <span id="batSoc">0%</span>
    </div>

</div>

<!-- ================= SCADA ================= -->

<div class="panel scada-panel">

<svg class="scada-svg" viewBox="0 0 320 520">

<!-- MAIN LINE -->
<line class="line" x1="160" y1="70" x2="160" y2="180"/>
<line class="line" x1="160" y1="250" x2="160" y2="330"/>

<!-- SPLIT -->
<line class="line" x1="110" y1="330" x2="210" y2="330"/>
<line class="line" x1="110" y1="330" x2="110" y2="410"/>
<line class="line" x1="210" y1="330" x2="210" y2="410"/>

<!-- NODE -->
<circle class="node" cx="160" cy="145" r="6">
<animateMotion dur="2s" repeatCount="indefinite"
path="M0 0 L0 110"/>
</circle>

<circle class="node" cx="160" cy="285" r="6">
<animateMotion dur="2s" repeatCount="indefinite"
path="M0 0 L-50 45"/>
</circle>

<circle class="node" cx="160" cy="285" r="6">
<animateMotion dur="2s" repeatCount="indefinite"
path="M0 0 L50 45"/>
</circle>

<!-- PV -->
<text x="160" y="35" text-anchor="middle" class="scada-label">
PV PANEL
</text>

<circle class="circle" cx="160" cy="95" r="40"/>

<text x="160" y="92" text-anchor="middle" class="scada-main" id="scadaPvPower">
0W
</text>

<text x="160" y="112" text-anchor="middle" class="scada-sub" id="scadaPvVI">
0V | 0A
</text>

<!-- MPPT -->
<circle class="circle" cx="160" cy="220" r="40"/>

<text x="160" y="217" text-anchor="middle" class="scada-main" id="scadaMpptPower">
0W
</text>

<text x="160" y="237" text-anchor="middle" class="scada-sub" id="scadaMpptEff">
0%
</text>

<text x="160" y="305" text-anchor="middle" class="scada-label">
MPPT
</text>

<!-- BATTERY -->
<circle class="circle" cx="110" cy="440" r="36"/>

<text x="110" y="437" text-anchor="middle" class="scada-main" id="scadaBatSoc">
0%
</text>

<text x="110" y="457" text-anchor="middle" class="scada-sub" id="scadaBatVI">
0V | 0A
</text>

<text x="110" y="500" text-anchor="middle" class="scada-label">
BATTERY
</text>

<!-- LOAD -->
<circle class="circle" cx="210" cy="440" r="36"/>

<text x="210" y="437" text-anchor="middle" class="scada-main" id="scadaLoadPower">
0W
</text>

<text x="210" y="457" text-anchor="middle" class="scada-sub" id="scadaLoadVI">
0V | 0A
</text>

<text x="210" y="500" text-anchor="middle" class="scada-label">
LOAD
</text>

</svg>

</div>

<!-- ================= ENERGY ================= -->

<div class="panel energy-panel">

    <div class="panel-title">ENERGY</div>

    <div class="data-row">
        <span>Daily</span>
        <span id="dailyEnergy">0 kWh</span>
    </div>

    <div class="data-row">
        <span>Monthly</span>
        <span id="monthlyEnergy">0 kWh</span>
    </div>

</div>

<!-- ================= PV GAUGE ================= -->

<div class="panel gauge-panel">

<div class="gauge-title">PV</div>

<div class="gauge-wrap">

<svg class="gauge-svg" viewBox="0 0 300 180">

<path class="gauge-bg"
d="M40 140 A110 110 0 0 1 260 140"/>

<path id="pvGauge"
class="gauge-fill"
d="M40 140 A110 110 0 0 1 260 140"/>

<text x="150" y="120"
text-anchor="middle"
class="gauge-value"
id="gaugePvPower">0W</text>

<text x="150" y="145"
text-anchor="middle"
class="gauge-sub"
id="gaugePvVoltage">0V</text>

<text x="150" y="165"
text-anchor="middle"
class="gauge-sub2"
id="gaugePvCurrent">0A</text>

</svg>

</div>
</div>

<!-- ================= BATTERY SOC ================= -->

<div class="panel gauge-panel">

<div class="gauge-title">BATTERY SOC</div>

<div class="gauge-wrap">

<svg class="gauge-svg" viewBox="0 0 300 180">

<path class="gauge-bg"
d="M40 140 A110 110 0 0 1 260 140"/>

<path id="socGauge"
class="gauge-fill"
d="M40 140 A110 110 0 0 1 260 140"/>

<text x="150" y="130"
text-anchor="middle"
class="gauge-value"
id="gaugeSoc">0%</text>

</svg>

</div>
</div>

<!-- ================= MPPT EFF ================= -->

<div class="panel gauge-panel">

<div class="gauge-title">MPPT EFFICIENCY</div>

<div class="gauge-wrap">

<svg class="gauge-svg" viewBox="0 0 300 180">

<path class="gauge-bg"
d="M40 140 A110 110 0 0 1 260 140"/>

<path id="effGauge"
class="gauge-fill"
d="M40 140 A110 110 0 0 1 260 140"/>

<text x="150" y="130"
text-anchor="middle"
class="gauge-value"
id="gaugeEff">0%</text>

</svg>

</div>
</div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
