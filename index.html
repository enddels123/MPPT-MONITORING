<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

:root{

--bg:#010b1d;
--card:#031326;
--accent:#00ffe1;
--lime:#7CFC00;
--red:#ff4040;
--text:#ffffff;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);
color:var(--text);
font-family:'Orbitron',sans-serif;
overflow-x:hidden;

}

/* =========================
   MAIN
========================= */

.main{

width:100%;
min-height:100vh;

display:grid;

grid-template-columns:
minmax(300px, 28%)
1fr;

gap:10px;

padding:10px;

}

/* =========================
   PANEL
========================= */

.panel{

background:var(--card);

border-radius:18px;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 0 14px rgba(0,255,225,.08);

}

/* =========================
   LEFT PANEL
========================= */

.leftPanel{

display:flex;
flex-direction:column;
gap:10px;
height:100%;

}

/* =========================
   HEADER
========================= */

.header{

padding:8px 10px;

text-align:center;

}

.title{

color:var(--accent);

font-size:
clamp(.9rem,1.3vw,1.35rem);

text-shadow:
0 0 8px var(--accent);

margin-bottom:2px;

line-height:1.2;

}

.online{

font-size:
clamp(.62rem,.72vw,.82rem);

font-weight:bold;

margin-bottom:5px;

}

.online.online-status{

color:var(--lime);

}

.online.offline-status{

color:var(--red);

}

.device{

margin:auto;

width:90%;

border:
2px solid #00ffb3;

border-radius:10px;

padding:5px;

font-size:
clamp(.58rem,.7vw,.8rem);

box-shadow:
0 0 8px rgba(0,255,136,.18);

}

/* =========================
   SCADA
========================= */

.scada{

padding:6px;

height:100%;

min-height:720px;

display:flex;

align-items:stretch;

justify-content:center;

overflow:hidden;

}

svg{

width:100%;
height:100%;

}

.scada-circle{

fill:#04152d;

stroke:var(--accent);

stroke-width:4;

filter:
drop-shadow(0 0 10px rgba(0,255,225,.5));

}

.scada-name{

fill:var(--accent);

font-size:14px;

font-weight:700;

text-anchor:middle;

}

.scada-value{

fill:#ffffff;

font-size:15px;

font-weight:bold;

text-anchor:middle;

dominant-baseline:middle;

}

.scada-sub{

fill:#7CFC00;

font-size:11px;

text-anchor:middle;

dominant-baseline:middle;

}

/* =========================
   RIGHT PANEL
========================= */

.rightPanel{

display:flex;

flex-direction:column;

gap:10px;

}

/* =========================
   DATA GRID
========================= */

.dataArea{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:10px;

}

.box{

padding:12px;

min-height:130px;

}

.boxTitle{

text-align:center;

color:var(--accent);

font-size:
clamp(.8rem,.9vw,1rem);

margin-bottom:10px;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

padding:8px 0;

border-bottom:
1px solid rgba(255,255,255,.08);

font-size:
clamp(.72rem,.82vw,.92rem);

}

/* =========================
   ENERGY
========================= */

.energyBox{

grid-column:2/3;

}

/* =========================
   CHART
========================= */

.chartGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:10px;

}

.chartBox{

padding:10px;

height:260px;

}

.chartTitle{

text-align:center;

color:var(--accent);

font-size:
clamp(.8rem,.9vw,1rem);

margin-bottom:6px;

}

.chartCanvas{

position:relative;

width:100%;

height:190px;

}

/* =========================
   FLOW NODE
========================= */

circle.flowNode{

filter:
drop-shadow(0 0 8px #00ffe1);

}

/* =========================
   MOBILE
========================= */

@media(max-width:980px){

.main{

grid-template-columns:1fr;

}

.dataArea{

grid-template-columns:
1fr 1fr;

}

.chartGrid{

grid-template-columns:
1fr;

}

.energyBox{

grid-column:auto;

}

.scada{

min-height:620px;

}

}

@media(max-width:640px){

.main{

padding:8px;

gap:8px;

}

.dataArea{

grid-template-columns:1fr;

}

.chartGrid{

grid-template-columns:1fr;

}

.chartBox{

height:230px;

}

.chartCanvas{

height:160px;

}

.scada{

min-height:560px;

}

}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:#00ffe1;
border-radius:10px;

}

</style>

</head>

<body>

<div class="main">

<!-- =========================
     LEFT PANEL
========================= -->

<div class="leftPanel">

<!-- HEADER -->

<div class="panel header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online online-status"
id="onlineText">
ONLINE
</div>

<div class="device"
id="deviceStatus">
DEVICE SHUTDOWN
</div>

</div>

<!-- =========================
     SCADA
========================= -->

<div class="panel scada">

<svg viewBox="0 0 400 700">

<!-- =========================
     LINE
========================= -->

<path d="
M200 135
L200 245
"

stroke="#36a3ff"
stroke-width="5"
fill="none"/>

<path d="
M200 335
L140 335
L140 520
"

stroke="#36a3ff"
stroke-width="5"
fill="none"/>

<path d="
M200 335
L260 335
L260 520
"

stroke="#36a3ff"
stroke-width="5"
fill="none"/>

<!-- =========================
     FLOW NODE
========================= -->

<circle id="n1"
class="flowNode"
cx="200"
cy="150"
r="7"
fill="#00ff88"/>

<circle id="n2"
class="flowNode"
cx="170"
cy="335"
r="7"
fill="#00ff88"/>

<circle id="n3"
class="flowNode"
cx="230"
cy="335"
r="7"
fill="#00ff88"/>

<!-- =========================
     PV
========================= -->

<text x="200"
y="32"
class="scada-name">
PV PANEL
</text>

<circle cx="200"
cy="95"
r="52"
class="scada-circle"/>

<text x="200"
y="88"
class="scada-value"
id="pvPowerScada">
0W
</text>

<text x="200"
y="112"
class="scada-sub"
id="pvVoltScada">
0V | 0A
</text>

<!-- =========================
     MPPT
========================= -->

<circle cx="200"
cy="280"
r="52"
class="scada-circle"/>

<text x="200"
y="273"
class="scada-value"
id="mpptPowerScada">
0W
</text>

<text x="200"
y="297"
class="scada-sub"
id="mpptEffScada">
0%
</text>

<text x="200"
y="365"
class="scada-name">
MPPT
</text>

<!-- =========================
     BATTERY
========================= -->

<circle cx="140"
cy="575"
r="52"
class="scada-circle"/>

<text x="140"
y="568"
class="scada-value"
id="batSocScada">
0%
</text>

<text x="140"
y="592"
class="scada-sub"
id="batVoltScada">
0V | 0A
</text>

<text x="140"
y="655"
class="scada-name">
BATTERY
</text>

<!-- =========================
     LOAD
========================= -->

<circle cx="260"
cy="575"
r="52"
class="scada-circle"/>

<text x="260"
y="568"
class="scada-value"
id="loadPowerScada">
0W
</text>

<text x="260"
y="592"
class="scada-sub"
id="loadVoltScada">
0V | 0A
</text>

<text x="260"
y="655"
class="scada-name">
LOAD
</text>

</svg>

</div>

</div>

<!-- =========================
     RIGHT PANEL
========================= -->

<div class="rightPanel">

<!-- DATA -->

<div class="dataArea">

<div class="panel box">

<div class="boxTitle">
PHOTOVOLTAIC
</div>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="panel box">

<div class="boxTitle">
MPPT
</div>

<div class="row">
<span>Charge</span>
<span id="charge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="eff">0%</span>
</div>

</div>

<div class="panel box">

<div class="boxTitle">
BATTERY
</div>

<div class="row">
<span>Voltage</span>
<span id="bv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bi">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="soc">0%</span>
</div>

</div>

<div class="panel box energyBox">

<div class="boxTitle">
ENERGY
</div>

<div class="row">
<span>Daily</span>
<span id="day">0 kWh</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="month">0 kWh</span>
</div>

</div>

</div>

<!-- =========================
     CHART
========================= -->

<div class="chartGrid">

<div class="panel chartBox">

<div class="chartTitle">
PV
</div>

<div class="chartCanvas">
<canvas id="gauge1"></canvas>
</div>

</div>

<div class="panel chartBox">

<div class="chartTitle">
BATTERY SOC
</div>

<div class="chartCanvas">
<canvas id="gauge2"></canvas>
</div>

</div>

<div class="panel chartBox">

<div class="chartTitle">
MPPT EFFICIENCY
</div>

<div class="chartCanvas">
<canvas id="gauge3"></canvas>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
