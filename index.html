<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#010611,
#02142d
);

color:white;

overflow:hidden;
}

/* =========================================
HEADER
========================================= */

.header{

text-align:center;

padding:8px;
}

.header h1{

font-size:
clamp(18px,2vw,34px);

color:#00ffd5;

text-shadow:
0 0 20px #00ffd5;
}

/* =========================================
NETWORK
========================================= */

.network{

text-align:center;

font-size:
clamp(10px,1vw,14px);

margin-bottom:5px;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* =========================================
CENTER DEVICE STATUS
========================================= */

.status-center{

display:flex;

justify-content:center;

align-items:center;

margin-bottom:10px;
}

.status-widget{

display:flex;

flex-direction:column;

align-items:center;
}

.status-icon{

font-size:
clamp(28px,3vw,55px);

margin-bottom:5px;
}

.device-box{

width:
min(90%,420px);

padding:
clamp(10px,1vw,18px);

border-radius:20px;

background:
rgba(10,20,40,0.95);

border:
3px solid #00ff88;

text-align:center;

font-size:
clamp(14px,1.5vw,24px);

font-weight:bold;

box-shadow:
0 0 25px rgba(0,255,140,0.3);
}

/* =========================================
LAYOUT
========================================= */

.dashboard-grid{

display:grid;

grid-template-columns:
0.8fr 1.2fr;

gap:10px;

height:
calc(100vh - 120px);

padding:10px;
}

/* =========================================
LEFT PANEL
========================================= */

.left-panel{

display:flex;

justify-content:center;

align-items:center;
}

/* =========================================
POWER FLOW
========================================= */

.power-wrapper{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;
}

.node-wrap{

display:flex;

flex-direction:column;

align-items:center;
}

.circle-node{

width:
clamp(70px,7vw,120px);

height:
clamp(70px,7vw,120px);

border-radius:50%;

background:
rgba(10,20,35,0.95);

border:
2px solid rgba(0,255,200,0.4);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

box-shadow:
0 0 20px rgba(0,255,200,0.25);
}

.circle-node img{

width:
clamp(22px,2vw,42px);

height:
clamp(22px,2vw,42px);

object-fit:contain;

margin-bottom:3px;
}

.node-title{

margin-top:5px;

font-size:
clamp(9px,0.8vw,14px);

color:#00ffd5;
}

.node-value{

display:flex;

flex-direction:column;

align-items:center;

font-size:
clamp(7px,0.7vw,11px);

line-height:1.2;
}

/* =========================================
LINE
========================================= */

.line-vertical{

width:3px;

height:
clamp(40px,4vw,70px);

background:#355b8c;

position:relative;
}

.split-system{

position:relative;

width:
clamp(130px,16vw,250px);

height:
clamp(50px,4vw,70px);
}

.line-horizontal{

position:absolute;

top:0;

left:0;

width:100%;

height:3px;

background:#355b8c;
}

.line-left{

position:absolute;

left:0;

top:0;

width:3px;

height:100%;

background:#355b8c;
}

.line-right{

position:absolute;

right:0;

top:0;

width:3px;

height:100%;

background:#355b8c;
}

.bottom-nodes{

display:flex;

justify-content:space-between;

width:
clamp(130px,16vw,250px);
}

/* =========================================
FLOW NODE
========================================= */

.flow-node{

width:
clamp(7px,0.7vw,12px);

height:
clamp(7px,0.7vw,12px);

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:
0 0 15px #00ff88;
}

.flow-pv{

left:-2px;

animation:
flowPV 1s linear infinite;
}

.flow-battery{

left:-2px;

animation:
flowBattery 1s linear infinite;
}

.flow-energy{

left:-2px;

animation:
flowEnergy 1s linear infinite;
}

@keyframes flowPV{

0%{
top:0;
opacity:0;
}

25%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowBattery{

0%{
top:0;
opacity:0;
}

25%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowEnergy{

0%{
top:0;
opacity:0;
}

25%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

/* =========================================
RIGHT PANEL
========================================= */

.right-panel{

display:flex;

flex-direction:column;

gap:8px;
}

/* =========================================
WIDGET
========================================= */

.flow{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:8px;
}

.box{

background:
rgba(16,25,43,0.88);

border-radius:14px;

padding:10px;

box-shadow:
0 0 14px rgba(0,255,200,0.08);
}

.box h2{

text-align:center;

margin-bottom:8px;

color:#00ffd5;

font-size:
clamp(11px,1vw,16px);
}

.data{

display:flex;

justify-content:space-between;

padding:7px;

margin-top:6px;

background:#111b2d;

border-radius:8px;

font-size:
clamp(9px,0.8vw,12px);
}

/* SOC */

.soc-bar{

width:100%;

height:10px;

background:#1c2740;

border-radius:10px;

overflow:hidden;

margin-top:10px;
}

.soc-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

transition:1s;
}

/* =========================================
CHART
========================================= */

.chart-grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:8px;
}

.chart-box{

height:
clamp(120px,12vw,180px);

background:
rgba(16,25,43,0.88);

border-radius:14px;

padding:8px;
}

/* =========================================
MOBILE
========================================= */

@media(max-width:900px){

body{
overflow:auto;
}

.dashboard-grid{

grid-template-columns:1fr;

height:auto;
}

.flow{

grid-template-columns:
1fr 1fr;
}

.chart-grid{

grid-template-columns:1fr;
}
}

@media(max-width:600px){

.flow{

grid-template-columns:1fr 1fr;
}

.chart-box{

height:140px;
}

.circle-node{

width:80px;
height:80px;
}

.bottom-nodes{

width:180px;
}

.split-system{

width:180px;
}
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>
ISOKUIKI SMART ENERGY
</h1>

</div>

<!-- NETWORK -->

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

<!-- DEVICE -->

<div class="status-center">

<div class="status-widget">

<div class="status-icon">
⚡
</div>

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard-grid">

<!-- LEFT -->

<div class="left-panel">

<div class="power-wrapper">

<!-- PV -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/2933/2933821.png">

<div class="node-value">

<span id="pv_v_circle">0V</span>
<span id="pv_i_circle">0A</span>
<span id="pv_p_circle">0W</span>

</div>

</div>

<div class="node-title">
PHOTOVOLTAIC
</div>

</div>

<!-- FLOW -->

<div class="line-vertical">

<div class="flow-node flow-pv"></div>

</div>

<!-- MPPT -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div class="node-value">

<span id="mppt_power_circle">0W</span>
<span id="mppt_eff_circle">0%</span>

</div>

</div>

<div class="node-title">
MPPT
</div>

</div>

<!-- SPLIT -->

<div class="split-system">

<div class="line-horizontal"></div>

<div class="line-left">

<div class="flow-node flow-battery"></div>

</div>

<div class="line-right">

<div class="flow-node flow-energy"></div>

</div>

</div>

<!-- BOTTOM -->

<div class="bottom-nodes">

<!-- BATTERY -->

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">

<div class="node-value">

<span id="bat_v_circle">0V</span>
<span id="bat_i_circle">0A</span>
<span id="soc_circle">0%</span>

</div>

</div>

<div class="node-title">
BATTERY
</div>

</div>

<!-- ENERGY -->

<div class="node-wrap">

<div class="circle-node">

<div style="
font-size:
clamp(20px,2vw,35px)
">
⚡
</div>

<div class="node-value">

<span id="energy_day_circle">
0
</span>

<span>
KWH DAY
</span>

</div>

</div>

<div class="node-title">
ENERGY
</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-panel">

<!-- WIDGET -->

<div class="flow">

<div class="box">

<h2>☀️ PHOTOVOLTAIC</h2>

<div class="data">
<span>Voltage</span>
<span id="pv_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="pv_i">0</span>
</div>

<div class="data">
<span>Power</span>
<span id="pv_p">0</span>
</div>

</div>

<div class="box">

<h2>⚙️ MPPT</h2>

<div class="data">
<span>Charge</span>
<span id="charge_p">0</span>
</div>

<div class="data">
<span>Efficiency</span>
<span id="mppt_eff">0</span>
</div>

</div>

<div class="box">

<h2>🔋 BATTERY</h2>

<div class="data">
<span>Voltage</span>
<span id="bat_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="bat_i">0</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0</span>
</div>

<div class="soc-bar">

<div class="soc_fill"
id="soc_fill"></div>

</div>

<div style="
text-align:center;
margin-top:8px;
font-size:11px;
"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>⚡ ENERGY</h2>

<div class="data">
<span>Daily</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>Monthly</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="chart-grid">

<div class="chart-box">

<canvas id="powerChart"></canvas>

</div>

<div class="chart-box">

<canvas id="energyDayChart"></canvas>

</div>

<div class="chart-box">

<canvas id="energyMonthChart"></canvas>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
