<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI PLTS</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{

  margin:0;

  background:#040b18;

  color:#00ffd5;

  font-family:'Orbitron',sans-serif;

  overflow-x:hidden;

  font-size:clamp(10px,1vw,16px);
}

/* ================= TITLE ================= */

h1{

  text-align:center;

  margin:8px;

  font-size:
  clamp(16px,2vw,28px);
}

/* ================= FLOW ================= */

.flow{

  display:flex;

  justify-content:center;

  align-items:center;

  flex-wrap:wrap;

  gap:6px;

  padding:6px;
}

/* ================= BOX ================= */

.box{

  flex:0 1 auto;

  width:fit-content;

  min-width:110px;

  max-width:170px;

  min-height:auto;

  background:#101b33;

  border-radius:12px;

  padding:10px;

  box-shadow:
  0 0 10px rgba(0,255,200,0.12);

  transition:0.3s;
}

.box:hover{

  transform:translateY(-2px);
}

.box h2{

  margin:0;

  margin-bottom:6px;

  font-size:
  clamp(12px,1.5vw,18px);
}

.box div{

  margin-top:4px;

  font-size:
  clamp(10px,1vw,15px);

  word-break:break-word;
}

/* ================= ARROW ================= */

.arrow-container{

  width:40px;

  height:30px;

  position:relative;

  overflow:hidden;
}

.arrow{

  position:absolute;

  left:-20px;

  top:0;

  font-size:
  clamp(16px,1.5vw,24px);

  animation:
  moveArrowHorizontal 1s linear infinite;
}

/* ================= PC ================= */

@keyframes moveArrowHorizontal{

  0%{

    left:-20px;

    opacity:0;
  }

  30%{

    opacity:1;
  }

  100%{

    left:40px;

    opacity:0;
  }
}

/* ================= MOBILE ================= */

@keyframes moveArrowVertical{

  0%{

    top:-20px;

    opacity:0;
  }

  30%{

    opacity:1;
  }

  100%{

    top:30px;

    opacity:0;
  }
}

/* ================= COLOR ================= */

.green{
  color:#00ff00;
}

.yellow{
  color:#ffd000;
}

.red{
  color:#ff0033;
}

/* ================= GRID ================= */

.grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(120px,1fr));

  gap:8px;

  padding:8px;
}

.card{

  background:#101b33;

  border-radius:12px;

  padding:10px;

  box-shadow:
  0 0 10px rgba(0,255,200,0.12);
}

.card-title{

  font-size:
  clamp(10px,1vw,15px);
}

.value{

  font-size:
  clamp(14px,1.5vw,22px);

  margin-top:6px;
}

/* ================= CHART ================= */

.chart-container{

  width:98%;

  margin:auto;

  margin-top:8px;

  background:#101b33;

  border-radius:12px;

  padding:8px;
}

canvas{

  width:100% !important;

  height:240px !important;
}

/* ================= TABLET ================= */

@media(max-width:1024px){

  .box{

    max-width:150px;
  }
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .flow{

    flex-direction:column;

    gap:4px;
  }

  .box{

    width:92%;

    max-width:320px;

    padding:8px;
  }

  .arrow-container{

    width:30px;

    height:40px;
  }

  .arrow{

    left:0;

    top:-20px;

    animation:
    moveArrowVertical 1s linear infinite;

    font-size:20px;
  }

  .grid{

    grid-template-columns:1fr;
  }

  canvas{

    height:180px !important;
  }
}

/* ================= SMALL MOBILE ================= */

@media(max-width:480px){

  h1{

    font-size:16px;
  }

  .box h2{

    font-size:13px;
  }

  .box div{

    font-size:11px;
  }

  .value{

    font-size:16px;
  }

  canvas{

    height:150px !important;
  }
}

</style>

</head>

<body>

<h1>
⚡ PLTS INDUSTRIAL MONITOR
</h1>

<!-- ================= FLOW ================= -->

<div class="flow">

  <!-- PV -->
  <div class="box">

    <h2>☀️ PV</h2>

    <div id="pv_v">0 V</div>

    <div id="pv_i">0 A</div>

    <div id="pv_p">0 W</div>

  </div>

  <!-- ARROW -->
  <div class="arrow-container">

    <div id="arrow1"
    class="arrow green">

      <span class="arrow-symbol">
        ➜
      </span>

    </div>

  </div>

  <!-- MPPT -->
  <div class="box">

    <h2>⚙️ MPPT</h2>

    <div id="charge_p">0 W</div>

    <div id="mppt_eff">0 %</div>

  </div>

  <!-- ARROW -->
  <div class="arrow-container">

    <div id="arrow2"
    class="arrow green">

      <span class="arrow-symbol">
        ➜
      </span>

    </div>

  </div>

  <!-- BATTERY -->
  <div class="box">

    <h2>🔋 BATTERY</h2>

    <div id="bat_v">0 V</div>

    <div id="bat_i">0 A</div>

    <div id="soc">0 %</div>

  </div>

  <!-- ARROW -->
  <div class="arrow-container">

    <div id="arrow3"
    class="arrow green">

      <span class="arrow-symbol">
        ➜
      </span>

    </div>

  </div>

  <!-- LOAD -->
  <div class="box">

    <h2>⚡ LOAD</h2>

    <div id="load_p">0 W</div>

    <div id="status">IDLE</div>

  </div>

</div>

<!-- ================= GRID ================= -->

<div class="grid">

  <div class="card">

    <div class="card-title">
      TODAY
    </div>

    <div class="value"
    id="kwh_day">

      0 kWh

    </div>

  </div>

  <div class="card">

    <div class="card-title">
      MONTH
    </div>

    <div class="value"
    id="kwh_month">

      0 kWh

    </div>

  </div>

  <div class="card">

    <div class="card-title">
      EFFICIENCY
    </div>

    <div class="value"
    id="mppt_eff2">

      0 %

    </div>

  </div>

</div>

<!-- ================= CHART ================= -->

<div class="chart-container">

  <canvas id="chart"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
