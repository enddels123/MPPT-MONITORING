<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>ISOKUIKI SMART ENERGY</title>

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
rel="stylesheet"
/>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#000814,
#001233
);

overflow:hidden;

height:100vh;

color:white;
}

/* ======================================
MAIN
====================================== */

.dashboard{

width:100vw;
height:100vh;

display:grid;

grid-template-rows:
7vh 7vh 24vh 1fr;

gap:.8vh;

padding:.8vh;
}

/* ======================================
HEADER
====================================== */

.header{

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;
}

.title{

font-size:
clamp(18px,2vw,40px);

color:#00ffe1;

text-shadow:
0 0 10px #00ffe1,
0 0 20px #00ffe1;
}

#network{

font-size:
clamp(10px,.8vw,14px);

margin-top:.2vh;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* ======================================
DEVICE STATUS
====================================== */

.status-box{

width:min(55vw,520px);

margin:auto;

display:flex;
align-items:center;
justify-content:center;

border-radius:40px;

border:
3px solid #00ff99;

background:
rgba(0,20,40,.7);

box-shadow:
0 0 18px #00ff99;

font-size:
clamp(12px,1vw,22px);
}

/* ======================================
CHART TOP
====================================== */

.top-charts{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:1vh;
}

.chart-box{

background:
rgba(0,15,40,.85);

border-radius:18px;

padding:.5vh;

height:100%;
}

/* ======================================
BOTTOM
====================================== */

.bottom{

display:grid;

grid-template-columns:
28% 72%;

gap:1vh;

height:100%;
}

/* ======================================
SCADA
====================================== */

.scada{

background:
rgba(0,10,30,.65);

border-radius:20px;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;
}

svg{

width:100%;
height:100%;
}

/* ======================================
FLOW
====================================== */

.flow-line{

stroke:#3b82f6;
stroke-width:5;
fill:none;
}

.node{

fill:#00ff88;

filter:
drop-shadow(0 0 10px #00ff88);
}

/* ======================================
NODE ANIMATION
====================================== */

.node1{

animation:
flow1 2s linear infinite;
}

.node2{

animation:
flow2 2s linear infinite;
}

.node3{

animation:
flow3 2s linear infinite;
}

@keyframes flow1{

0%{
transform:
translateY(-40px);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:
translateY(50px);
opacity:0;
}
}

@keyframes flow2{

0%{
transform:
translate(0px,0px);
opacity:0;
}

100%{
transform:
translate(-80px,90px);
opacity:1;
}
}

@keyframes flow3{

0%{
transform:
translate(0px,0px);
opacity:0;
}

100%{
transform:
translate(80px,90px);
opacity:1;
}
}

/* ======================================
RIGHT
====================================== */

.right{

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

gap:1vh;
}

/* ======================================
WIDGET
====================================== */

.widget{

background:
rgba(0,15,40,.85);

border-radius:20px;

padding:1vh;

box-shadow:
0 0 12px rgba(0,255,255,.15);
}

.widget h3{

text-align:center;

color:#00ffe1;

font-size:
clamp(11px,1vw,18px);

margin-bottom:.8vh;
}

.row{

display:flex;

justify-content:space-between;

padding:.45vh;

margin-bottom:.45vh;

background:
rgba(255,255,255,.04);

border-radius:10px;

font-size:
clamp(9px,.9vw,15px);
}

/* ======================================
SOC
====================================== */

.socbar{

height:10px;

background:#1e293b;

border-radius:20px;

overflow:hidden;

margin-top:1vh;
}

.socfill{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffe1
);

transition:.5s;
}

/* ======================================
RESPONSIVE
====================================== */

@media(max-width:900px){

.dashboard{

grid-template-rows:
6vh 6vh 18vh 1fr;
}

.bottom{

grid-template-columns:
35% 65%;
}

.right{

gap:.5vh;
}

.chart-box{

height:100%;
}

}

</style>
</head>

<body>

<div class="dashboard">

<!-- HEADER -->

<div class="header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div id="network"
class="offline">

OFFLINE

</div>

</div>

<!-- STATUS -->

<div
id="deviceStatus"
class="status-box">

DEVICE SHUTDOWN

</div>

<!-- TOP CHART -->

<div class="top-charts">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="dayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="monthChart"></canvas>
</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<!-- SCADA -->

<div class="scada">

<svg viewBox="0 0 400 500">

<!-- FLOW -->

<line
x1="200"
y1="100"
x2="200"
y2="190"
class="flow-line"
/>

<line
x1="200"
y1="250"
x2="110"
y2="250"
class="flow-line"
/>

<line
x1="110"
y1="250"
x2="110"
y2="360"
class="flow-line"
/>

<line
x1="200"
y1="250"
x2="290"
y2="250"
class="flow-line"
/>

<line
x1="290"
y1="250"
x2="290"
y2="360"
class="flow-line"
/>

<!-- NODE -->

<circle
cx="200"
cy="140"
r="7"
class="node node1"
/>

<circle
cx="180"
cy="250"
r="7"
class="node node2"
/>

<circle
cx="220"
cy="250"
r="7"
class="node node3"
/>

<!-- PV -->

<circle
cx="200"
cy="60"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="200"
y="48"
fill="#00ffe1"
font-size="20"
text-anchor="middle">

☀

</text>

<text
x="200"
y="70"
fill="#fff"
font-size="12"
text-anchor="middle"
id="pv_v">

0V

</text>

<text
x="200"
y="88"
fill="#fff"
font-size="12"
text-anchor="middle"
id="pv_i">

0A

</text>

<text
x="200"
y="106"
fill="#fff"
font-size="12"
text-anchor="middle"
id="pv_p">

0W

</text>

<!-- MPPT -->

<circle
cx="200"
cy="200"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="200"
y="190"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

⚙

</text>

<text
x="200"
y="215"
fill="#fff"
font-size="12"
text-anchor="middle"
id="charge_p">

0W

</text>

<text
x="200"
y="233"
fill="#fff"
font-size="12"
text-anchor="middle"
id="mppt_eff">

0%

</text>

<!-- BAT -->

<circle
cx="110"
cy="400"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="110"
y="390"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

🔋

</text>

<text
x="110"
y="410"
fill="#fff"
font-size="12"
text-anchor="middle"
id="bat_v">

0V

</text>

<text
x="110"
y="428"
fill="#fff"
font-size="12"
text-anchor="middle"
id="bat_i">

0A

</text>

<text
x="110"
y="446"
fill="#fff"
font-size="12"
text-anchor="middle"
id="soc">

0%

text>

<!-- ENERGY -->

<circle
cx="290"
cy="400"
r="50"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="290"
y="390"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

⚡

</text>

<text
x="290"
y="410"
fill="#fff"
font-size="12"
text-anchor="middle"
id="kwh_day">

0

</text>

<text
x="290"
y="428"
fill="#fff"
font-size="12"
text-anchor="middle"
id="kwh_month">

0

</text>

</svg>

</div>

<!-- RIGHT -->

<div class="right">

<div class="widget">

<h3>PHOTOVOLTAIC</h3>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="widget">

<h3>MPPT</h3>

<div class="row">
<span>Charge</span>
<span id="cpp">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpe">0%</span>
</div>

</div>

<div class="widget">

<h3>BATTERY</h3>

<div class="row">
<span>Voltage</span>
<span id="bvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bii">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="socc">0%</span>
</div>

<div class="socbar">
<div
id="socfill"
class="socfill">
</div>
</div>

</div>

<div class="widget">

<h3>ENERGY</h3>

<div class="row">
<span>Daily</span>
<span id="dayy">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthh">0</span>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
