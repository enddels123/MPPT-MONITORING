<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#010611,
#02142d
);

color:white;
}

/* ========================================= */

.main{

width:100vw;
height:100vh;

display:flex;
flex-direction:column;
}

/* ========================================= */

.header{

height:8vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;
}

.header h1{

font-size:
clamp(14px,1.5vw,30px);

color:#00ffd5;

text-shadow:
0 0 15px #00ffd5;
}

.network{

font-size:
clamp(9px,0.7vw,12px);
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* ========================================= */

.status-center{

height:9vh;

display:flex;

justify-content:center;
align-items:center;
}

.device-box{

width:
min(70vw,420px);

padding:
clamp(6px,0.7vw,14px);

border-radius:20px;

background:
rgba(10,20,40,0.95);

border:
2px solid #00ff88;

text-align:center;

font-size:
clamp(12px,1vw,22px);

font-weight:bold;

box-shadow:
0 0 20px rgba(0,255,140,0.3);
}

/* ========================================= */

.content{

flex:1;

display:grid;

grid-template-rows:
48% 52%;

gap:10px;

padding:10px;

overflow:hidden;
}

/* ========================================= */

.top-layout{

display:grid;

grid-template-columns:
32% 68%;

gap:12px;

height:100%;
}

/* ========================================= */

.left-panel{

display:flex;

justify-content:center;
align-items:center;

background:
rgba(8,15,30,0.55);

border-radius:18px;

overflow:hidden;
}

/* ========================================= */

.power-wrapper{

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

scale:1.1;
}

/* ========================================= */

.node-wrap{

display:flex;
flex-direction:column;

align-items:center;
}

/* ========================================= */

.circle-node{

width:
clamp(75px,5vw,115px);

height:
clamp(75px,5vw,115px);

border-radius:50%;

background:
rgba(10,20,35,0.95);

border:
2px solid rgba(0,255,200,0.4);

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

box-shadow:
0 0 20px rgba(0,255,200,0.22);
}

.circle-node img{

width:
clamp(22px,2vw,40px);

height:
clamp(22px,2vw,40px);

margin-bottom:4px;
}

.node-title{

margin-top:5px;

font-size:
clamp(8px,0.7vw,13px);

color:#00ffd5;
}

.node-value{

font-size:
clamp(7px,0.6vw,11px);

display:flex;
flex-direction:column;

align-items:center;
}

/* ========================================= */

.line-vertical{

width:3px;

height:65px;

background:#355b8c;

position:relative;
}

.split-system{

position:relative;

width:180px;

height:70px;
}

.line-horizontal{

position:absolute;

top:0;

left:0;

width:100%;
height:3px;

background:#355b8c;
}

.line-left{

position:absolute;

left:0;
top:0;

width:3px;
height:100%;

background:#355b8c;
}

.line-right{

position:absolute;

right:0;
top:0;

width:3px;
height:100%;

background:#355b8c;
}

/* ========================================= */

.bottom-nodes{

display:flex;

justify-content:space-between;

width:180px;
}

/* ========================================= */

.flow-node{

width:8px;
height:8px;

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:
0 0 12px #00ff88;
}

.flow-pv{

left:-2px;

animation:
flowPV 1s linear infinite;
}

.flow-battery{

left:-2px;

animation:
flowBattery 1s linear infinite;
}

.flow-energy{

left:-2px;

animation:
flowEnergy 1s linear infinite;
}

/* ========================================= */

@keyframes flowPV{

0%{
top:0;
opacity:0;
}

20%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowBattery{

0%{
top:0;
opacity:0;
}

20%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

@keyframes flowEnergy{

0%{
top:0;
opacity:0;
}

20%{
opacity:1;
}

100%{
top:100%;
opacity:0;
}
}

/* ========================================= */

.right-panel{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:10px;
}

/* ========================================= */

.box{

background:
rgba(16,25,43,0.88);

border-radius:14px;

padding:10px;

box-shadow:
0 0 10px rgba(0,255,200,0.08);
}

.box h2{

text-align:center;

margin-bottom:8px;

color:#00ffd5;

font-size:
clamp(10px,0.8vw,14px);
}

/* ========================================= */

.data{

display:flex;

justify-content:space-between;

padding:6px;

margin-top:5px;

background:#111b2d;

border-radius:6px;

font-size:
clamp(8px,0.7vw,12px);
}

/* ========================================= */

.soc-bar{

width:100%;
height:8px;

background:#1c2740;

border-radius:10px;

overflow:hidden;

margin-top:8px;
}

.soc-fill{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);
}

/* ========================================= */

.chart-grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:10px;

height:100%;
}

/* ========================================= */

.chart-box{

background:
rgba(16,25,43,0.88);

border-radius:14px;

padding:10px;
}

/* ========================================= */

@media(max-width:900px){

.top-layout{

grid-template-columns:
34% 66%;
}

.power-wrapper{

scale:0.85;
}
}

/* ========================================= */

@media(max-width:700px){

.content{

gap:6px;

padding:6px;
}

.top-layout{

grid-template-columns:
36% 64%;

gap:6px;
}

.right-panel{

gap:6px;
}

.power-wrapper{

scale:0.68;
}

.chart-grid{

gap:6px;
}

.chart-box{

padding:5px;
}
}

/* ========================================= */

@media(max-width:430px){

.power-wrapper{

scale:0.58;
}

.box{

padding:5px;
}

.chart-box{

padding:3px;
}
}

</style>

</head>

<body>

<div class="main">

<div class="header">

<h1>
ISOKUIKI SMART ENERGY
</h1>

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

</div>

<div class="status-center">

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

<div class="content">

<!-- TOP -->

<div class="top-layout">

<!-- LEFT -->

<div class="left-panel">

<div class="power-wrapper">

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/2933/2933821.png">

<div class="node-value">

<span id="pv_v_circle">0V</span>
<span id="pv_i_circle">0A</span>
<span id="pv_p_circle">0W</span>

</div>

</div>

<div class="node-title">
PHOTOVOLTAIC
</div>

</div>

<div class="line-vertical">

<div class="flow-node flow-pv"></div>

</div>

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div class="node-value">

<span id="mppt_power_circle">0W</span>
<span id="mppt_eff_circle">0%</span>

</div>

</div>

<div class="node-title">
MPPT
</div>

</div>

<div class="split-system">

<div class="line-horizontal"></div>

<div class="line-left">

<div class="flow-node flow-battery"></div>

</div>

<div class="line-right">

<div class="flow-node flow-energy"></div>

</div>

</div>

<div class="bottom-nodes">

<div class="node-wrap">

<div class="circle-node">

<img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png">

<div class="node-value">

<span id="bat_v_circle">0V</span>
<span id="bat_i_circle">0A</span>
<span id="soc_circle">0%</span>

</div>

</div>

<div class="node-title">
BATTERY
</div>

</div>

<div class="node-wrap">

<div class="circle-node">

<div style="font-size:26px">
⚡
</div>

<div class="node-value">

<span id="energy_day_circle">
0
</span>

<span>
KWH
</span>

</div>

</div>

<div class="node-title">
ENERGY
</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-panel">

<div class="box">

<h2>PHOTOVOLTAIC</h2>

<div class="data">
<span>Voltage</span>
<span id="pv_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="pv_i">0</span>
</div>

<div class="data">
<span>Power</span>
<span id="pv_p">0</span>
</div>

</div>

<div class="box">

<h2>MPPT</h2>

<div class="data">
<span>Charge</span>
<span id="charge_p">0</span>
</div>

<div class="data">
<span>Efficiency</span>
<span id="mppt_eff">0</span>
</div>

</div>

<div class="box">

<h2>BATTERY</h2>

<div class="data">
<span>Voltage</span>
<span id="bat_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="bat_i">0</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0</span>
</div>

<div class="soc-bar">

<div class="soc-fill"
id="soc_fill"></div>

</div>

<div style="
text-align:center;
margin-top:6px;
font-size:10px;
"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>ENERGY</h2>

<div class="data">
<span>Daily</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>Monthly</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="chart-grid">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyDayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyMonthChart"></canvas>
</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
