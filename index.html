```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>ISOKUIKI SMART ENERGY</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:
linear-gradient(180deg,#020617,#001233);
color:#fff;
height:100vh;
overflow:hidden;
}

.dashboard{
height:100vh;
display:flex;
flex-direction:column;
padding:8px;
gap:8px;
}

/* =========================
HEADER
========================= */

.header{
text-align:center;
}

.title{
font-size:clamp(20px,2vw,42px);
color:#00ffe5;
text-shadow:0 0 15px #00ffe5;
}

.online{
font-size:12px;
color:#00ff88;
}

.device-box{
margin:auto;
margin-top:6px;
width:min(500px,92%);
padding:10px;
border-radius:18px;
border:3px solid #00ff99;
box-shadow:
0 0 15px #00ff99;
background:#06142b;
font-size:clamp(12px,1vw,20px);
font-weight:700;
}

/* =========================
MAIN GRID
========================= */

.main{
flex:1;
display:grid;
grid-template-columns:
36% 64%;
gap:10px;
min-height:0;
}

/* =========================
SCADA
========================= */

.scada-panel{
background:#06142b;
border-radius:18px;
padding:8px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.scada{
position:relative;
width:100%;
height:100%;
}

.line{
position:absolute;
background:#3b82f6;
box-shadow:0 0 10px #3b82f6;
}

.vertical{
width:4px;
}

.horizontal{
height:4px;
}

.node{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
background:#00ff88;
box-shadow:
0 0 15px #00ff88;
}

/* FLOW ANIMATION */

.flow1{
animation:flow1 3s linear infinite;
}

.flow2{
animation:flow2 3s linear infinite;
}

.flow3{
animation:flow3 3s linear infinite;
}

@keyframes flow1{
0%{top:18%;left:50%;}
100%{top:42%;left:50%;}
}

@keyframes flow2{
0%{top:58%;left:50%;}
100%{top:82%;left:26%;}
}

@keyframes flow3{
0%{top:58%;left:50%;}
100%{top:82%;left:74%;}
}

/* =========================
CIRCLE
========================= */

.circle{
position:absolute;
width:92px;
height:92px;
border-radius:50%;
border:3px solid #00ffe5;
background:#071a35;
box-shadow:
0 0 18px #00ffe5;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.circle .icon{
font-size:22px;
}

.circle .mini{
font-size:9px;
line-height:1.4;
}

.label{
position:absolute;
font-size:11px;
color:#00ffe5;
}

/* =========================
RIGHT PANEL
========================= */

.right{
display:flex;
flex-direction:column;
gap:8px;
min-height:0;
}

/* =========================
WIDGETS
========================= */

.widgets{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:8px;
}

.widget{
background:#06142b;
border-radius:16px;
padding:10px;
min-height:110px;
box-shadow:
0 0 12px rgba(0,255,255,.15);
}

.widget h3{
text-align:center;
color:#00ffe5;
font-size:18px;
margin-bottom:8px;
}

.row{
display:flex;
justify-content:space-between;
padding:4px 0;
border-bottom:
1px solid rgba(255,255,255,.08);
font-size:13px;
}

/* =========================
GAUGE
========================= */

.gauges{
display:grid;
grid-template-columns:
repeat(3,1fr);
gap:8px;
flex:1;
min-height:0;
}

.gauge{
background:#06142b;
border-radius:16px;
padding:8px;
height:170px;
display:flex;
flex-direction:column;
}

.gauge canvas{
flex:1;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:900px){

body{
overflow:auto;
height:auto;
}

.dashboard{
height:auto;
}

.main{
grid-template-columns:1fr;
}

.scada-panel{
height:260px;
}

.widgets{
grid-template-columns:1fr 1fr;
}

.gauges{
grid-template-columns:1fr;
}

.gauge{
height:150px;
}

.circle{
width:78px;
height:78px;
}

}

</style>
</head>

<body>

<div class="dashboard">

<div class="header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online"
id="onlineStatus">
ONLINE
</div>

<div class="device-box"
id="deviceStatus">
DEVICE WORKING
</div>

</div>

<div class="main">

<!-- SCADA -->

<div class="scada-panel">

<div class="scada">

<!-- LINES -->

<div class="line vertical"
style="top:15%;left:50%;height:18%;">
</div>

<div class="line horizontal"
style="top:58%;left:26%;width:48%;">
</div>

<div class="line vertical"
style="top:58%;left:26%;height:22%;">
</div>

<div class="line vertical"
style="top:58%;left:74%;height:22%;">
</div>

<!-- NODES -->

<div class="node flow1"></div>
<div class="node flow2"></div>
<div class="node flow3"></div>

<!-- PV -->

<div class="circle"
style="top:2%;left:38%;">

<div class="icon">☀</div>

<div class="mini">
<div id="pvV">0V</div>
<div id="pvI">0A</div>
<div id="pvP">0W</div>
</div>

</div>

<div class="label"
style="top:28%;left:37%;">
PHOTOVOLTAIC
</div>

<!-- MPPT -->

<div class="circle"
style="top:34%;left:38%;">

<div class="icon">⚙</div>

<div class="mini">
<div id="mpptP">0W</div>
<div id="mpptEff">0%</div>
</div>

</div>

<div class="label"
style="top:60%;left:46%;">
MPPT
</div>

<!-- BATTERY -->

<div class="circle"
style="top:76%;left:12%;">

<div class="icon">🔋</div>

<div class="mini">
<div id="batV">0V</div>
<div id="batI">0A</div>
<div id="socText">0%</div>
</div>

</div>

<div class="label"
style="top:98%;left:13%;">
BATTERY
</div>

<!-- ENERGY -->

<div class="circle"
style="top:76%;left:62%;">

<div class="icon">⚡</div>

<div class="mini">
<div id="dayKwh">0</div>
<div>KWH</div>
</div>

</div>

<div class="label"
style="top:98%;left:66%;">
ENERGY
</div>

</div>
</div>

<!-- RIGHT -->

<div class="right">

<div class="widgets">

<div class="widget">
<h3>PHOTOVOLTAIC</h3>

<div class="row">
<span>Voltage</span>
<span id="pvv2">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi2">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp2">0W</span>
</div>

</div>

<div class="widget">
<h3>MPPT</h3>

<div class="row">
<span>Charge</span>
<span id="chg2">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="eff2">0%</span>
</div>

</div>

<div class="widget">
<h3>BATTERY</h3>

<div class="row">
<span>Voltage</span>
<span id="bv2">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bi2">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="soc2">0%</span>
</div>

</div>

<div class="widget">
<h3>ENERGY</h3>

<div class="row">
<span>Daily</span>
<span id="day2">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="month2">0</span>
</div>

</div>

</div>

<div class="gauges">

<div class="gauge">
<canvas id="g1"></canvas>
</div>

<div class="gauge">
<canvas id="g2"></canvas>
</div>

<div class="gauge">
<canvas id="g3"></canvas>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
```
