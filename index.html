<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<!-- FONT -->

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap"
rel="stylesheet">

<!-- CHART -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* =========================
ROOT
========================= */

:root{

--bg:#020b1d;
--panel:#041933;
--cyan:#00ffe5;
--blue:#36a3ff;
--green:#7CFC00;
--red:#ff3b3b;
--white:#ffffff;

}

/* =========================
GLOBAL
========================= */

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);

font-family:'Orbitron',sans-serif;

color:var(--white);

overflow-x:hidden;

}

/* =========================
MAIN
========================= */

.main{

width:100%;

max-width:1500px;

margin:auto;

display:grid;

grid-template-columns:
300px 1fr;

gap:14px;

padding:14px;

min-height:100vh;

}

/* =========================
PANEL
========================= */

.panel{

background:var(--panel);

border-radius:22px;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 0 18px rgba(0,255,229,.08);

}

/* =========================
LEFT PANEL
========================= */

.leftPanel{

display:flex;

flex-direction:column;

gap:14px;

}

/* =========================
HEADER
========================= */

.header{

padding:18px;

text-align:center;

}

.title{

font-size:1.4rem;

color:var(--cyan);

text-shadow:
0 0 10px var(--cyan);

margin-bottom:10px;

line-height:1.3;

}

.online{

font-size:.9rem;

font-weight:bold;

margin-bottom:12px;

color:var(--green);

}

.device{

width:90%;

margin:auto;

padding:10px;

border-radius:12px;

border:
2px solid var(--cyan);

font-size:.85rem;

}

/* =========================
SCADA
========================= */

.scada{

height:560px;

padding:10px;

overflow:hidden;

}

/* =========================
SVG
========================= */

svg{

width:100%;
height:100%;

}

/* =========================
SCADA STYLE
========================= */

.scada-circle{

fill:#062041;

stroke:var(--cyan);

stroke-width:4;

filter:
drop-shadow(0 0 10px rgba(0,255,229,.7));

}

.scada-name{

fill:var(--cyan);

font-size:13px;

font-weight:bold;

text-anchor:middle;

}

.scada-value{

fill:white;

font-size:16px;

font-weight:bold;

text-anchor:middle;

}

.scada-sub{

fill:var(--green);

font-size:10px;

text-anchor:middle;

}

.flow-line{

stroke:#36a3ff;

stroke-width:5;

stroke-linecap:round;

}

/* =========================
FLOW NODE
========================= */

.flowNode{

fill:#00ff88;

filter:
drop-shadow(0 0 8px #00ffe5);

transition:
all .3s ease;

}

/* =========================
RIGHT PANEL
========================= */

.rightPanel{

display:flex;

flex-direction:column;

gap:14px;

}

/* =========================
DATA GRID
========================= */

.dataGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:14px;

}

.box{

padding:14px;

min-height:160px;

}

.boxTitle{

text-align:center;

color:var(--cyan);

font-size:1rem;

margin-bottom:14px;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

padding:10px 0;

border-bottom:
1px solid rgba(255,255,255,.07);

font-size:.88rem;

}

/* =========================
CHART GRID
========================= */

.chartGrid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:14px;

}

.chartBox{

padding:12px;

height:240px;

}

.chartTitle{

text-align:center;

color:var(--cyan);

margin-bottom:10px;

}

.chartCanvas{

position:relative;

height:180px;

}

/* =========================
MOBILE
========================= */

@media(max-width:1000px){

.main{

grid-template-columns:1fr;

}

.dataGrid{

grid-template-columns:
1fr 1fr;

}

.chartGrid{

grid-template-columns:1fr;

}

.scada{

height:520px;

}

}

@media(max-width:650px){

.dataGrid{

grid-template-columns:1fr;

}

.chartBox{

height:220px;

}

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{

width:6px;

}

::-webkit-scrollbar-thumb{

background:var(--cyan);

border-radius:10px;

}

</style>

</head>

<body>

<div class="main">

<!-- =========================
LEFT PANEL
========================= -->

<div class="leftPanel">

<!-- HEADER -->

<div class="panel header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="online"
id="onlineText">
ONLINE
</div>

<div class="device"
id="deviceStatus">
DEVICE ACTIVE
</div>

</div>

<!-- SCADA -->

<div class="panel scada">

<svg viewBox="0 0 340 500">

<!-- FLOW LINE -->

<line class="flow-line"
x1="170"
y1="90"
x2="170"
y2="180"/>

<line class="flow-line"
x1="170"
y1="250"
x2="120"
y2="250"/>

<line class="flow-line"
x1="170"
y1="250"
x2="220"
y2="250"/>

<line class="flow-line"
x1="120"
y1="250"
x2="120"
y2="360"/>

<line class="flow-line"
x1="220"
y1="250"
x2="220"
y2="360"/>

<!-- NODE -->

<circle id="n1"
class="flowNode"
cx="170"
cy="130"
r="6"/>

<circle id="n2"
class="flowNode"
cx="145"
cy="250"
r="6"/>

<circle id="n3"
class="flowNode"
cx="195"
cy="250"
r="6"/>

<!-- PV -->

<text x="170"
y="30"
class="scada-name">
PV PANEL
</text>

<circle cx="170"
cy="70"
r="34"
class="scada-circle"/>

<text x="170"
y="66"
class="scada-value"
id="pvPowerScada">
0W
</text>

<text x="170"
y="82"
class="scada-sub"
id="pvVoltScada">
0V | 0A
</text>

<!-- MPPT -->

<text x="170"
y="205"
class="scada-name">
MPPT
</text>

<circle cx="170"
cy="220"
r="34"
class="scada-circle"/>

<text x="170"
y="216"
class="scada-value"
id="mpptPowerScada">
0W
</text>

<text x="170"
y="232"
class="scada-sub"
id="mpptEffScada">
0%
</text>

<!-- BATTERY -->

<text x="120"
y="445"
class="scada-name">
BATTERY
</text>

<circle cx="120"
cy="390"
r="34"
class="scada-circle"/>

<text x="120"
y="386"
class="scada-value"
id="batSocScada">
0%
</text>

<text x="120"
y="402"
class="scada-sub"
id="batVoltScada">
0V | 0A
</text>

<!-- LOAD -->

<text x="220"
y="445"
class="scada-name">
LOAD
</text>

<circle cx="220"
cy="390"
r="34"
class="scada-circle"/>

<text x="220"
y="386"
class="scada-value"
id="loadPowerScada">
0W
</text>

<text x="220"
y="402"
class="scada-sub"
id="loadVoltScada">
0V | 0A
</text>

</svg>

</div>

</div>

<!-- =========================
RIGHT PANEL
========================= -->

<div class="rightPanel">

<!-- DATA -->

<div class="dataGrid">

<!-- PV -->

<div class="panel box">

<div class="boxTitle">
PHOTOVOLTAIC
</div>

<div class="row">
<span>Voltage</span>
<span id="pvVoltage">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvCurrent">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvPower">0W</span>
</div>

</div>

<!-- MPPT -->

<div class="panel box">

<div class="boxTitle">
MPPT
</div>

<div class="row">
<span>Charge</span>
<span id="mpptCharge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpptEff">0%</span>
</div>

</div>

<!-- BATTERY -->

<div class="panel box">

<div class="boxTitle">
BATTERY
</div>

<div class="row">
<span>Voltage</span>
<span id="batVoltage">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="batCurrent">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="batSoc">0%</span>
</div>

</div>

</div>

<!-- ENERGY -->

<div class="dataGrid">

<div class="panel box">

<div class="boxTitle">
ENERGY
</div>

<div class="row">
<span>Daily</span>
<span id="dailyEnergy">0 kWh</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthlyEnergy">0 kWh</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="chartGrid">

<!-- PV -->

<div class="panel chartBox">

<div class="chartTitle">
PV POWER
</div>

<div class="chartCanvas">
<canvas id="gauge1"></canvas>
</div>

</div>

<!-- BATTERY -->

<div class="panel chartBox">

<div class="chartTitle">
BATTERY SOC
</div>

<div class="chartCanvas">
<canvas id="gauge2"></canvas>
</div>

</div>

<!-- MPPT -->

<div class="panel chartBox">

<div class="chartTitle">
MPPT EFFICIENCY
</div>

<div class="chartCanvas">
<canvas id="gauge3"></canvas>
</div>

</div>

</div>

</div>

</div>

<!-- APP -->

<script src="app.js"></script>

</body>
</html>
