<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI PLTS</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{

  margin:0;

  background:#040b18;

  color:#00ffd5;

  font-family:'Orbitron',sans-serif;

  overflow-x:hidden;
}

h1{

  text-align:center;

  margin:15px;

  font-size:32px;
}

/* ================= FLOW ================= */

.flow{

  display:flex;

  justify-content:center;

  align-items:center;

  flex-wrap:wrap;

  gap:10px;

  padding:10px;
}

.box{

  width:200px;

  min-height:180px;

  background:#101b33;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 0 20px rgba(0,255,200,0.15);

  transition:0.3s;
}

.box:hover{

  transform:translateY(-3px);
}

.box h2{

  margin:0;

  margin-bottom:15px;
}

.box div{

  margin-top:10px;

  font-size:20px;
}

/* ================= ARROW ================= */

.arrow-container{

  width:80px;

  height:40px;

  position:relative;

  overflow:hidden;
}

.arrow{

  position:absolute;

  left:-30px;

  top:0;

  font-size:34px;

  animation:
  moveArrowHorizontal 1s linear infinite;
}

/* ================= PC ================= */

@keyframes moveArrowHorizontal{

  0%{

    left:-30px;

    opacity:0;
  }

  30%{

    opacity:1;
  }

  100%{

    left:80px;

    opacity:0;
  }
}

/* ================= MOBILE ================= */

@keyframes moveArrowVertical{

  0%{

    top:-30px;

    opacity:0;
  }

  30%{

    opacity:1;
  }

  100%{

    top:40px;

    opacity:0;
  }
}

/* ================= COLOR ================= */

.green{
  color:#00ff00;
}

.yellow{
  color:#ffd000;
}

.red{
  color:#ff0033;
}

/* ================= GRID ================= */

.grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(200px,1fr));

  gap:15px;

  padding:15px;
}

.card{

  background:#101b33;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 0 20px rgba(0,255,200,0.15);
}

.card-title{

  font-size:18px;
}

.value{

  font-size:28px;

  margin-top:10px;
}

/* ================= CHART ================= */

.chart-container{

  width:95%;

  margin:auto;

  margin-top:20px;

  background:#101b33;

  border-radius:20px;

  padding:20px;
}

canvas{

  width:100% !important;

  height:420px !important;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  h1{

    font-size:24px;
  }

  .flow{

    flex-direction:column;
  }

  .box{

    width:95%;

    min-height:auto;
  }

  .arrow-container{

    width:40px;

    height:60px;
  }

  .arrow{

    left:0;

    top:-30px;

    animation:
    moveArrowVertical 1s linear infinite;

    font-size:28px;
  }

  .grid{

    grid-template-columns:1fr;
  }

  canvas{

    height:260px !important;
  }
}

</style>

</head>

<body>

<h1>
⚡ PLTS INDUSTRIAL MONITOR
</h1>

<!-- ================= FLOW ================= -->

<div class="flow">

  <!-- PV -->
  <div class="box">

    <h2>☀️ PV</h2>

    <div id="pv_v">0 V</div>

    <div id="pv_i">0 A</div>

    <div id="pv_p">0 W</div>

  </div>

  <!-- ARROW -->
  <div class="arrow-container">

    <div id="arrow1"
    class="arrow green">

      <span class="arrow-symbol">
        ➜
      </span>

    </div>

  </div>

  <!-- MPPT -->
  <div class="box">

    <h2>⚙️ MPPT</h2>

    <div id="charge_p">0 W</div>

    <div id="mppt_eff">0 %</div>

  </div>

  <!-- ARROW -->
  <div class="arrow-container">

    <div id="arrow2"
    class="arrow green">

      <span class="arrow-symbol">
        ➜
      </span>

    </div>

  </div>

  <!-- BATTERY -->
  <div class="box">

    <h2>🔋 BATTERY</h2>

    <div id="bat_v">0 V</div>

    <div id="bat_i">0 A</div>

    <div id="soc">0 %</div>

  </div>

  <!-- ARROW -->
  <div class="arrow-container">

    <div id="arrow3"
    class="arrow green">

      <span class="arrow-symbol">
        ➜
      </span>

    </div>

  </div>

  <!-- LOAD -->
  <div class="box">

    <h2>⚡ LOAD</h2>

    <div id="load_p">0 W</div>

    <div id="status">IDLE</div>

  </div>

</div>

<!-- ================= GRID ================= -->

<div class="grid">

  <div class="card">

    <div class="card-title">
      TODAY
    </div>

    <div class="value"
    id="kwh_day">

      0 kWh

    </div>

  </div>

  <div class="card">

    <div class="card-title">
      MONTH
    </div>

    <div class="value"
    id="kwh_month">

      0 kWh

    </div>

  </div>

  <div class="card">

    <div class="card-title">
      EFFICIENCY
    </div>

    <div class="value"
    id="mppt_eff2">

      0 %

    </div>

  </div>

</div>

<!-- ================= CHART ================= -->

<div class="chart-container">

  <canvas id="chart"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
