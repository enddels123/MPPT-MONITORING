<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SMART ENERGY MONITOR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#050b18;

  color:white;

  font-family:'Orbitron',sans-serif;

  overflow-x:hidden;
}

/* =====================================================
   HEADER
===================================================== */

.header{

  text-align:center;

  padding:20px;
}

.header h1{

  color:#00ffd5;

  font-size:32px;

  text-shadow:
  0 0 20px #00ffd5;
}

/* =====================================================
   DEVICE STATUS
===================================================== */

.status-widget{

  width:100%;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  margin-top:10px;

  margin-bottom:25px;
}

.status-icon{

  font-size:90px;

  color:#00ff88;

  margin-bottom:15px;

  text-shadow:
  0 0 30px #00ff88;
}

.device-box{

  background:#10192b;

  padding:15px 40px;

  border-radius:15px;

  font-size:24px;

  font-weight:bold;

  border:
  2px solid #00ff88;

  box-shadow:
  0 0 25px rgba(0,255,150,0.4);

  transition:0.5s;
}

/* =====================================================
   FLOW
===================================================== */

.flow{

  display:flex;

  justify-content:center;

  align-items:flex-start;

  flex-wrap:wrap;

  gap:20px;

  padding:20px;
}

/* =====================================================
   BOX
===================================================== */

.box{

  width:260px;

  background:#10192b;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 0 20px rgba(0,255,200,0.15);

  transition:0.3s;
}

.box:hover{

  transform:translateY(-5px);

  box-shadow:
  0 0 30px rgba(0,255,200,0.3);
}

.box h2{

  text-align:center;

  margin-bottom:20px;

  color:#00ffd5;
}

/* =====================================================
   DATA
===================================================== */

.data{

  display:flex;

  justify-content:space-between;

  background:#151f34;

  padding:12px;

  border-radius:12px;

  margin-top:10px;
}

.label{

  color:#00ffd5;
}

.value{

  font-weight:bold;
}

/* =====================================================
   SOC
===================================================== */

.soc-container{

  margin-top:15px;
}

.soc-bar{

  width:100%;

  height:24px;

  background:#1c2740;

  border-radius:20px;

  overflow:hidden;
}

.soc-fill{

  width:0%;

  height:100%;

  background:
  linear-gradient(
  90deg,
  #00ff88,
  #00ffd5
  );

  transition:1s;
}

/* =====================================================
   BATTERY STATUS
===================================================== */

.status{

  text-align:center;

  margin-top:15px;

  font-size:18px;

  font-weight:bold;

  color:#00ff88;
}

/* =====================================================
   CHART
===================================================== */

.chart-area{

  width:95%;

  margin:auto;

  margin-top:20px;

  background:#10192b;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 0 20px rgba(0,255,200,0.15);
}

.chart-title{

  text-align:center;

  color:#00ffd5;

  margin-bottom:20px;
}

.chart-box{

  height:300px;

  margin-bottom:40px;
}

/* =====================================================
   MOBILE
===================================================== */

@media(max-width:900px){

  .flow{

    flex-direction:column;

    align-items:center;
  }

  .box{

    width:95%;
  }

  .device-box{

    font-size:20px;
  }
}

</style>

</head>

<body>

<!-- =====================================================
     HEADER
===================================================== -->

<div class="header">

  <h1>
    ⚡ SMART ENERGY MONITOR ⚡
  </h1>

</div>

<!-- =====================================================
     DEVICE STATUS
===================================================== -->

<div class="status-widget">

  <div class="status-icon"
  id="status_icon">

    ⚡

  </div>

  <div class="device-box"
  id="device_box">

    DEVICE SHUTDOWN

  </div>

</div>

<!-- =====================================================
     MAIN FLOW
===================================================== -->

<div class="flow">

  <!-- PHOTOVOLTAIC -->

  <div class="box">

    <h2>☀️ PHOTOVOLTAIC</h2>

    <div class="data">

      <span class="label">
        Voltage
      </span>

      <span class="value"
      id="pv_v">

        0 V

      </span>

    </div>

    <div class="data">

      <span class="label">
        Current
      </span>

      <span class="value"
      id="pv_i">

        0 A

      </span>

    </div>

    <div class="data">

      <span class="label">
        Power
      </span>

      <span class="value"
      id="pv_p">

        0 W

      </span>

    </div>

  </div>

  <!-- MPPT -->

  <div class="box">

    <h2>⚙️ MPPT</h2>

    <div class="data">

      <span class="label">
        Charge Power
      </span>

      <span class="value"
      id="charge_p">

        0 W

      </span>

    </div>

    <div class="data">

      <span class="label">
        Efficiency
      </span>

      <span class="value"
      id="mppt_eff">

        0 %

      </span>

    </div>

  </div>

  <!-- BATTERY -->

  <div class="box">

    <h2>🔋 BATTERY</h2>

    <div class="data">

      <span class="label">
        Voltage
      </span>

      <span class="value"
      id="bat_v">

        0 V

      </span>

    </div>

    <div class="data">

      <span class="label">
        Current
      </span>

      <span class="value"
      id="bat_i">

        0 A

      </span>

    </div>

    <div class="data">

      <span class="label">
        SOC
      </span>

      <span class="value"
      id="soc">

        0 %

      </span>

    </div>

    <!-- SOC BAR -->

    <div class="soc-container">

      <div class="soc-bar">

        <div
        class="soc-fill"
        id="soc_fill">

        </div>

      </div>

    </div>

    <!-- BATTERY STATUS -->

    <div class="status"
    id="battery_status">

      STANDBY

    </div>

  </div>

  <!-- ENERGY -->

  <div class="box">

    <h2>⚡ ENERGY</h2>

    <div class="data">

      <span class="label">
        Total Power
      </span>

      <span class="value"
      id="total_power">

        0 W

      </span>

    </div>

    <div class="data">

      <span class="label">
        Daily kWh
      </span>

      <span class="value"
      id="kwh_day">

        0 kWh

      </span>

    </div>

    <div class="data">

      <span class="label">
        Monthly kWh
      </span>

      <span class="value"
      id="kwh_month">

        0 kWh

      </span>

    </div>

  </div>

</div>

<!-- =====================================================
     CHART
===================================================== -->

<div class="chart-area">

  <h2 class="chart-title">

    ENERGY ANALYTICS

  </h2>

  <div class="chart-box">

    <canvas id="powerChart"></canvas>

  </div>

  <div class="chart-box">

    <canvas id="energyDayChart"></canvas>

  </div>

  <div class="chart-box">

    <canvas id="energyMonthChart"></canvas>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
