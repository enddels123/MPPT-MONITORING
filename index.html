<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART ENERGY</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#06131f;
color:white;
padding:15px;
}

.topbar{
background:#08213a;
padding:18px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.title{
font-size:20px;
font-weight:bold;
}

.status{
text-align:right;
font-size:14px;
}

.scada{
background:#08213a;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}

.flow{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
flex-wrap:wrap;
}

.node{
width:180px;
background:#102d4c;
border-radius:15px;
padding:15px;
text-align:center;
}

.node h3{
margin-bottom:10px;
}

.big{
font-size:32px;
font-weight:bold;
}

.line{
flex:1;
height:4px;
background:#173f67;
border-radius:10px;
position:relative;
overflow:hidden;
min-width:80px;
}

.line::before{
content:"";
position:absolute;
left:-50%;
top:0;
width:50%;
height:100%;
background:#00fff2;
animation:flow 2s linear infinite;
}

@keyframes flow{
0%{left:-50%;}
100%{left:120%;}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
}

.card{
background:#08213a;
border-radius:18px;
padding:15px;
}

.card h2{
margin-bottom:10px;
}

.gauge{
height:180px;
}

.value{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.sub{
font-size:14px;
margin-top:5px;
}

.health{
margin-top:15px;
background:#08213a;
padding:15px;
border-radius:18px;
}

.health h2{
margin-bottom:10px;
}

.chartBox{
margin-top:15px;
background:#08213a;
padding:15px;
border-radius:18px;
}

canvas{
width:100% !important;
}

@media(max-width:900px){

.flow{
flex-direction:column;
}

.line{
width:4px;
height:50px;
min-width:auto;
}

.line::before{
width:100%;
height:40%;
left:0;
top:-40%;
animation:flowVertical 2s linear infinite;
}

@keyframes flowVertical{
0%{top:-40%;}
100%{top:120%;}
}

.node{
width:100%;
}

}

</style>

</head>
<body>

<div class="topbar">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div class="status">
STATUS :
<span id="onlineText" style="color:red">OFFLINE</span>
<br>
<span id="deviceStatus">NO DATA</span>
</div>

</div>

<!-- SCADA FLOW DI ATAS -->

<div class="scada">

<div class="flow">

<div class="node">
<h3>Photovoltaic</h3>
<div class="big" id="pvPowerScada">0W</div>
<div id="pvVoltScada">0V | 0A</div>
</div>

<div class="line"></div>

<div class="node">
<h3>MPPT</h3>
<div class="big" id="mpptPowerScada">0W</div>
<div id="mpptEffScada">0%</div>
</div>

<div class="line"></div>

<div class="node">
<h3>Battery</h3>
<div class="big" id="batSocScada">0%</div>
<div id="batVoltScada">0V | 0A</div>
</div>

<div class="line"></div>

<div class="node">
<h3>Load</h3>
<div class="big" id="loadPowerScada">0W</div>
<div id="loadVoltScada">0V | 0A</div>
</div>

</div>

</div>

<!-- GAUGE -->

<div class="grid">

<div class="card">

<h2>Photovoltaic</h2>

<div class="gauge">
<canvas id="gauge1"></canvas>
</div>

<div class="value" id="pvPower">0W</div>

<div class="sub" id="pvVoltage">0V</div>

<div class="sub" id="pvCurrent">0A</div>

</div>

<div class="card">

<h2>Battery</h2>

<div class="gauge">
<canvas id="gauge2"></canvas>
</div>

<div class="value" id="batSoc">0%</div>

<div class="sub" id="batVoltage">0V</div>

<div class="sub" id="batCurrent">0A</div>

</div>

<div class="card">

<h2>MPPT Efficiency</h2>

<div class="gauge">
<canvas id="gauge3"></canvas>
</div>

<div class="value" id="mpptEff">0%</div>

<div class="sub" id="mpptCharge">0W</div>

</div>

</div>

<!-- SYSTEM HEALTH -->

<div class="health">

<h2>System Health</h2>

<div style="font-size:36px;font-weight:bold;">
NORMAL
</div>

<div style="margin-top:5px;color:#8fc9ff;">
Monitoring Active
</div>

</div>

<!-- HISTORY -->

<div class="chartBox">

<canvas id="historyChart"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
