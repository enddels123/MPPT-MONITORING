<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>PLTS INDUSTRIAL</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
  background:#040b18;
  color:#00ffd5;
  font-family:'Orbitron',sans-serif;
  margin:0;
  text-align:center;
}

h1{
  margin:20px;
}

.flow{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.box{
  width:180px;
  background:#101b33;
  border-radius:20px;
  padding:20px;
  margin:10px;
  box-shadow:0 0 15px rgba(0,255,200,0.2);
}

.arrow-container{
  width:100px;
  height:20px;
  position:relative;
  overflow:hidden;
}

.arrow{
  position:absolute;
  font-size:26px;
  animation:moveArrow 1s linear infinite;
}

@keyframes moveArrow{

  0%{
    left:-30px;
    opacity:0;
  }

  50%{
    opacity:1;
  }

  100%{
    left:100px;
    opacity:0;
  }
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  padding:15px;
}

.card{
  background:#101b33;
  padding:20px;
  border-radius:15px;
}

.value{
  font-size:24px;
  margin-top:10px;
}

canvas{
  background:#101b33;
  margin:20px;
  border-radius:20px;
}

.green{
  color:#00ff00;
}

.yellow{
  color:#ffd000;
}

.red{
  color:#ff0033;
}

</style>

</head>

<body>

<h1>⚡ PLTS INDUSTRIAL MONITOR</h1>

<div class="flow">

<div class="box">

☀️ PV

<div id="pv_v">0 V</div>
<div id="pv_i">0 A</div>
<div id="pv_p">0 W</div>

</div>

<div class="arrow-container">

<div id="arrow1" class="arrow green">
➜➜➜
</div>

</div>

<div class="box">

⚙️ MPPT

<div id="charge_p">0 W</div>
<div id="mppt_eff">0 %</div>

</div>

<div class="arrow-container">

<div id="arrow2" class="arrow green">
➜➜➜
</div>

</div>

<div class="box">

🔋 BATTERY

<div id="bat_v">0 V</div>
<div id="bat_i">0 A</div>
<div id="soc">0 %</div>

</div>

<div class="arrow-container">

<div id="arrow3" class="arrow green">
➜➜➜
</div>

</div>

<div class="box">

⚡ LOAD

<div id="load_p">0 W</div>
<div id="status">IDLE</div>

</div>

</div>

<div class="grid">

<div class="card">
TODAY
<div class="value" id="kwh_day">0</div>
</div>

<div class="card">
MONTH
<div class="value" id="kwh_month">0</div>
</div>

<div class="card">
EFFICIENCY
<div class="value" id="eff2">0</div>
</div>

</div>

<canvas id="chart"></canvas>

<script src="app.js"></script>

</body>
</html>
