<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI PLTS</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{

  margin:0;

  background:#040b18;

  color:#00ffd5;

  font-family:'Orbitron',sans-serif;

  overflow-x:hidden;

  font-size:clamp(10px,1vw,16px);
}

/* ================= TITLE ================= */

h1{

  text-align:center;

  margin:10px;

  font-size:
  clamp(18px,3vw,34px);
}

/* ================= FLOW ================= */

.flow{

  display:flex;

  justify-content:center;

  align-items:center;

  flex-wrap:wrap;

  gap:8px;

  padding:8px;
}

/* ================= BOX ================= */

.box{

  flex:1 1 180px;

  max-width:220px;

  min-width:140px;

  min-height:130px;

  background:#101b33;

  border-radius:16px;

  padding:12px;

  box-shadow:
  0 0 12px rgba(0,255,200,0.15);

  transition:0.3s;
}

.box:hover{

  transform:translateY(-2px);
}

.box h2{

  margin:0;

  margin-bottom:10px;

  font-size:
  clamp(14px,2vw,22px);
}

.box div{

  margin-top:6px;

  font-size:
  clamp(11px,1.5vw,18px);
}

/* ================= ARROW ================= */

.arrow-container{

  width:50px;

  height:35px;

  position:relative;

  overflow:hidden;
}

.arrow{

  position:absolute;

  left:-20px;

  top:0;

  font-size:
  clamp(18px,2vw,30px);

  animation:
  moveArrowHorizontal 1s linear infinite;
}

/* ================= PC ================= */

@keyframes moveArrowHorizontal{

  0%{

    left:-20px;

    opacity:0;
  }

  30%{

    opacity:1;
  }

  100%{

    left:50px;

    opacity:0;
  }
}

/* ================= MOBILE ================= */

@keyframes moveArrowVertical{

  0%{

    top:-20px;

    opacity:0;
  }

  30%{

    opacity:1;
  }

  100%{

    top:35px;

    opacity:0;
  }
}

/* ================= COLOR ================= */

.green{
  color:#00ff00;
}

.yellow{
  color:#ffd000;
}

.red{
  color:#ff0033;
}

/* ================= GRID ================= */

.grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(140px,1fr));

  gap:10px;

  padding:10px;
}

.card{

  background:#101b33;

  border-radius:16px;

  padding:14px;

  box-shadow:
  0 0 12px rgba(0,255,200,0.15);
}

.card-title{

  font-size:
  clamp(12px,1.5vw,18px);
}

.value{

  font-size:
  clamp(16px,2vw,28px);

  margin
