<!-- =========================================================
INDEX.HTML
ISOKUIKI SMART ENERGY
FINAL INDUSTRIAL SCADA UI
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
ISOKUIKI SMART ENERGY
</title>

<!-- MQTT -->

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- CHART -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FONT -->

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================================================
GLOBAL
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#01091a,
#00142f
);

color:#fff;
}

/* =========================================================
APP
========================================================= */

.app{

width:100vw;
height:100vh;

display:flex;
flex-direction:column;

padding:8px;
gap:8px;
}

/* =========================================================
HEADER
========================================================= */

.header{

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

gap:2px;
}

.title{

font-size:clamp(18px,2vw,38px);

font-weight:700;

color:#00ffe1;

text-shadow:
0 0 10px #00ffe1,
0 0 25px #00ffe1;
}

.online{

color:#00ff88;
font-size:12px;
}

.offline{

color:#ff4444;
font-size:12px;
}

/* =========================================================
DEVICE STATUS
========================================================= */

.device-box{

width:min(500px,90vw);

height:48px;

border-radius:50px;

border:3px solid #00ff99;

display:flex;

justify-content:center;
align-items:center;

font-size:clamp(14px,1.2vw,22px);

font-weight:700;

margin:auto;

background:
rgba(0,20,40,.7);

box-shadow:
0 0 10px #00ff99,
0 0 25px #00ff99;
}

/* =========================================================
CONTENT
========================================================= */

.content{

flex:1;

display:grid;

grid-template-rows:
52% 48%;

gap:8px;

overflow:hidden;
}

/* =========================================================
TOP
========================================================= */

.top{

display:grid;

grid-template-columns:
34% 66%;

gap:8px;

overflow:hidden;
}

/* =========================================================
SCADA
========================================================= */

.scada{

position:relative;

background:
rgba(0,10,25,.8);

border-radius:18px;

overflow:hidden;

display:flex;

justify-content:center;
align-items:center;
}

/* =========================================================
FLOW SVG
========================================================= */

svg{

width:100%;
height:100%;
}

/* =========================================================
NODE
========================================================= */

.flow-dot{

fill:#00ff99;

filter:
drop-shadow(0 0 8px #00ff99);

animation:
pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:.3;
}

50%{
opacity:1;
}

100%{
opacity:.3;
}
}

/* =========================================================
FLOW MOVE
========================================================= */

.move1{

animation:
move1 3s linear infinite;
}

.move2{

animation:
move2 3s linear infinite;
}

.move3{

animation:
move3 3s linear infinite;
}

@keyframes move1{

0%{
transform:translateY(-120px);
}

100%{
transform:translateY(0px);
}
}

@keyframes move2{

0%{
transform:translate(0,0);
}

100%{
transform:translate(-70px,120px);
}
}

@keyframes move3{

0%{
transform:translate(0,0);
}

100%{
transform:translate(70px,120px);
}
}

/* =========================================================
RIGHT PANEL
========================================================= */

.right{

display:grid;

grid-template-columns:
repeat(2,1fr);

grid-template-rows:
repeat(2,1fr);

gap:8px;
}

/* =========================================================
CARD
========================================================= */

.card{

background:
rgba(8,20,45,.9);

border-radius:18px;

padding:10px;

display:flex;
flex-direction:column;

justify-content:flex-start;

overflow:hidden;

box-shadow:
0 0 10px rgba(0,255,200,.15);
}

/* =========================================================
CARD TITLE
========================================================= */

.card-title{

text-align:center;

font-size:clamp(12px,.9vw,18px);

font-weight:700;

margin-bottom:8px;

color:#00ffe1;
}

/* =========================================================
STAT
========================================================= */

.stat{

display:flex;

justify-content:space-between;
align-items:center;

padding:6px 8px;

margin-bottom:6px;

background:
rgba(255,255,255,.03);

border-radius:10px;

font-size:
clamp(10px,.9vw,15px);
}

/* =========================================================
GAUGE
========================================================= */

.gauge{

width:100%;
height:14px;

background:
rgba(255,255,255,.08);

border-radius:20px;

overflow:hidden;

margin-top:6px;
}

.gauge-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

box-shadow:
0 0 10px #00ff88;
}

/* =========================================================
BOTTOM
========================================================= */

.bottom{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:8px;

overflow:hidden;
}

/* =========================================================
CHART
========================================================= */

.chart-card{

background:
rgba(8,20,45,.9);

border-radius:18px;

padding:8px;

overflow:hidden;
}

.chart-card canvas{

width:100% !important;
height:100% !important;
}

/* =========================================================
RESPONSIVE
========================================================= */

@media(max-width:900px){

.content{

grid-template-rows:
48% 52%;
}

.top{

grid-template-columns:
38% 62%;
}
}

@media(max-width:700px){

.app{

padding:5px;
gap:5px;
}

.top{

grid-template-columns:
40% 60%;

gap:5px;
}

.right{

gap:5px;
}

.bottom{

gap:5px;
}

.card{

padding:5px;
}

.chart-card{

padding:4px;
}
}

@media(max-width:500px){

.content{

grid-template-rows:
50% 50%;
}

.top{

grid-template-columns:
42% 58%;
}

.device-box{

height:42px;

font-size:14px;
}

.title{

font-size:22px;
}
}

</style>

</head>

<body>

<div class="app">

<!-- =========================================================
HEADER
========================================================= -->

<div class="title">
ISOKUIKI SMART ENERGY

<!-- MOVING NODES -->

<circle cx="150" cy="260"
r="5"

<circle cx="150" cy="260"

<!-- PV -->

<text x="150"

PHOTOVOLTAIC

<!-- MPPT -->

<circle cx="150"

<text x="150"
y="205"

text-anchor="middle"

</text>

<text x="150"
y="238"

text-anchor="middle"

fill="#00ffd5"

font-size="11">

MPPT

<!-- BATTERY -->

<circle cx="80"
cy="420"

fill="#062038"

stroke-width="3"/>

<text x="80"
y="415"

text-anchor="middle"

font-size="20">

</text>

<text x="80"
y="448"

<!-- ENERGY -->

</text>

<text x="220"
y="448"

text-anchor="middle"

fill="#00ffd5"

font-size="11">

ENERGY

</text>

</svg>

</div>

<!-- =========================================================
RIGHT PANEL
========================================================= -->

<div class="right">

<!-- PV -->

<div class="card">

<div class="card-title">
PHOTOVOLTAIC
</div>

<div class="stat">
<span>Voltage</span>
<span id="pv_v">0V</span>
</div>

<div class="stat">

</div>

<div class="stat">

</div>

</div>

<!-- MPPT -->

<div class="card">

MPPT
</div>

<div class="stat">

<span id="charge_p">0W</span>
</div>

<div class="stat">
<span>Efficiency</span>
<span id="mppt_eff">0%</span>
</div>

</div>

<!-- BATTERY -->

<div class="card">

<div class="card-title">
BATTERY
</div>

<div class="stat">

</div>

<!-- ENERGY -->

ENERGY

<!-- =========================================================

</div>

<script src="app.js"></script>

</body>
</html>
