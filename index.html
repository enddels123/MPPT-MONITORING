<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ISOKUIKI SMART ENERGY</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#010b24;
    font-family:'Orbitron',sans-serif;
    color:#fff;
    overflow-x:hidden;
}

/* ======================================================
   MAIN LAYOUT
====================================================== */

.dashboard{
    width:100%;
    padding:10px;
}

.grid{
    display:grid;
    grid-template-columns: 320px repeat(3, 1fr);
    grid-template-rows:auto auto auto;
    gap:10px;
    align-items:start;
}

/* ======================================================
   PANEL
====================================================== */

.panel{
    background:#021635;
    border:1px solid rgba(0,255,255,0.12);
    border-radius:22px;
    padding:14px;
    position:relative;
    overflow:hidden;
    box-shadow:
        inset 0 0 20px rgba(0,255,255,.03),
        0 0 10px rgba(0,255,255,.03);
}

/* ======================================================
   HEADER
====================================================== */

.header-panel{
    height:145px;
}

.brand{
    text-align:center;
    font-size:22px;
    font-weight:700;
    line-height:1.15;
    color:#00f7ff;

    text-shadow:
        0 0 8px #00f7ff,
        0 0 16px rgba(0,255,255,.5);
}

.status{
    margin-top:6px;
    text-align:center;
    font-size:14px;
    font-weight:700;
}

.offline{
    color:#ff2d55;
    text-shadow:0 0 10px #ff2d55;
}

.online{
    color:#5cff00;
    text-shadow:0 0 10px #5cff00;
}

.device-btn{
    width:100%;
    margin-top:12px;
    height:38px;

    border-radius:14px;
    border:2px solid #00ffee;

    background:transparent;

    color:#fff;
    font-size:14px;
    font-family:'Orbitron',sans-serif;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
        0 0 10px rgba(0,255,255,.5),
        inset 0 0 10px rgba(0,255,255,.12);
}

/* ======================================================
   INFO BOX
====================================================== */

.info-box{
    height:150px;
}

.box-title{
    text-align:center;
    font-size:16px;
    color:#00ffee;
    margin-bottom:18px;

    text-shadow:0 0 10px rgba(0,255,255,.8);
}

.info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,.08);

    font-size:13px;
}

.info-value{
    color:#fff;
}

/* ======================================================
   ENERGY
====================================================== */

.energy-panel{
    height:150px;
}

/* ======================================================
   GAUGE
====================================================== */

.gauge-panel{
    height:270px;
}

.gauge-title{
    text-align:center;
    color:#00ffee;
    font-size:16px;
    margin-bottom:10px;

    text-shadow:0 0 10px rgba(0,255,255,.8);
}

.gauge-wrap{
    position:relative;
    width:100%;
    height:190px;
}

.gauge-svg{
    width:100%;
    height:100%;
}

.gauge-value{
    position:absolute;
    left:50%;
    top:58%;

    transform:translate(-50%,-50%);

    text-align:center;
}

.gauge-main{
    font-size:24px;
    font-weight:700;
}

.gauge-sub{
    margin-top:4px;
    font-size:12px;
    line-height:1.5;
}

.gauge-sub .v{
    color:#00ffee;
}

.gauge-sub .a{
    color:#7CFF00;
}

/* ======================================================
   SCADA
====================================================== */

.scada-panel{
    grid-row:2 / span 2;
    height:570px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.scada-svg{
    width:100%;
    height:100%;
}

/* ======================================================
   SCADA TEXT
====================================================== */

.scada-label{
    fill:#00ffee;
    font-size:12px;
    font-weight:700;
}

.scada-value{
    fill:#ffffff;
    font-size:18px;
    font-weight:700;
}

.scada-small{
    fill:#7CFF00;
    font-size:9px;
    font-weight:700;
}

/* ======================================================
   NODE ANIMATION
====================================================== */

.flow-node{
    fill:#22ff99;

    filter:
        drop-shadow(0 0 6px #22ff99)
        drop-shadow(0 0 10px #22ff99);

    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:.5;}
    50%{opacity:1;}
    100%{opacity:.5;}
}

/* ======================================================
   MOBILE
====================================================== */

@media(max-width:1100px){

.grid{
    grid-template-columns:1fr;
}

.scada-panel{
    grid-row:auto;
    height:520px;
}

.gauge-panel{
    height:240px;
}

}

</style>
</head>

<body>

<div class="dashboard">

<div class="grid">

<!-- ======================================================
     HEADER
====================================================== -->

<div class="panel header-panel">

    <div class="brand">
        ISOKUIKI SMART<br>ENERGY
    </div>

    <div id="deviceStatus" class="status offline">
        OFFLINE
    </div>

    <div class="device-btn">
        DEVICE ACTIVE
    </div>

</div>

<!-- ======================================================
     PV
====================================================== -->

<div class="panel info-box">

    <div class="box-title">PHOTOVOLTAIC</div>

    <div class="info-row">
        <span>Voltage</span>
        <span class="info-value" id="pvVoltage">0V</span>
    </div>

    <div class="info-row">
        <span>Current</span>
        <span class="info-value" id="pvCurrent">0A</span>
    </div>

    <div class="info-row">
        <span>Power</span>
        <span class="info-value" id="pvPower">0W</span>
    </div>

</div>

<!-- ======================================================
     MPPT
====================================================== -->

<div class="panel info-box">

    <div class="box-title">MPPT</div>

    <div class="info-row">
        <span>Charge</span>
        <span class="info-value" id="mpptPower">0W</span>
    </div>

    <div class="info-row">
        <span>Efficiency</span>
        <span class="info-value" id="mpptEff">0%</span>
    </div>

</div>

<!-- ======================================================
     BATTERY
====================================================== -->

<div class="panel info-box">

    <div class="box-title">BATTERY</div>

    <div class="info-row">
        <span>Voltage</span>
        <span class="info-value" id="batVoltage">0V</span>
    </div>

    <div class="info-row">
        <span>Current</span>
        <span class="info-value" id="batCurrent">0A</span>
    </div>

    <div class="info-row">
        <span>SOC</span>
        <span class="info-value" id="batSoc">0%</span>
    </div>

</div>

<!-- ======================================================
     SCADA
====================================================== -->

<div class="panel scada-panel">

<svg class="scada-svg" viewBox="0 0 320 560">

    <!-- MAIN LINE -->
    <line x1="160" y1="90" x2="160" y2="340"
          stroke="#33aaff"
          stroke-width="5"/>

    <!-- MPPT BOX -->
    <rect x="110" y="280"
          width="100"
          height="70"

          fill="none"
          stroke="#33aaff"
          stroke-width="5"/>

    <!-- BRANCH -->
    <line x1="110" y1="350" x2="110" y2="420"
          stroke="#33aaff"
          stroke-width="5"/>

    <line x1="210" y1="350" x2="210" y2="420"
          stroke="#33aaff"
          stroke-width="5"/>

    <!-- PV -->
    <circle cx="160" cy="70" r="38"
            fill="#021635"
            stroke="#00ffee"
            stroke-width="5"/>

    <text x="160" y="16"
          text-anchor="middle"
          class="scada-label">
          PV PANEL
    </text>

    <text x="160" y="70"
          text-anchor="middle"
          class="scada-value">
          0W
    </text>

    <text x="160" y="92"
          text-anchor="middle"
          class="scada-small">
          0V | 0A
    </text>

    <!-- MPPT -->
    <circle cx="160" cy="220" r="38"
            fill="#021635"
            stroke="#00ffee"
            stroke-width="5"/>

    <text x="160" y="220"
          text-anchor="middle"
          class="scada-value">
          0W
    </text>

    <text x="160" y="242"
          text-anchor="middle"
          class="scada-small">
          0%
    </text>

    <!-- MPPT LABEL -->
    <text x="160" y="322"
          text-anchor="middle"
          class="scada-label"
          style="font-size:16px;">
          MPPT
    </text>

    <!-- BATTERY -->
    <circle cx="110" cy="460" r="36"
            fill="#021635"
            stroke="#00ffee"
            stroke-width="5"/>

    <text x="110" y="460"
          text-anchor="middle"
          class="scada-value">
          0%
    </text>

    <text x="110" y="482"
          text-anchor="middle"
          class="scada-small">
          0V | 0A
    </text>

    <text x="110" y="535"
          text-anchor="middle"
          class="scada-label">
          BATTERY
    </text>

    <!-- LOAD -->
    <circle cx="210" cy="460" r="36"
            fill="#021635"
            stroke="#00ffee"
            stroke-width="5"/>

    <text x="210" y="460"
          text-anchor="middle"
          class="scada-value">
          0W
    </text>

    <text x="210" y="482"
          text-anchor="middle"
          class="scada-small">
          0V | 0A
    </text>

    <text x="210" y="535"
          text-anchor="middle"
          class="scada-label">
          LOAD
    </text>

    <!-- MOVING NODE -->
    <circle id="nodeMain"
            class="flow-node"
            r="7"
            cx="160"
            cy="110"/>

    <circle id="nodeLeft"
            class="flow-node"
            r="7"
            cx="110"
            cy="350"/>

    <circle id="nodeRight"
            class="flow-node"
            r="7"
            cx="210"
            cy="350"/>

</svg>

</div>

<!-- ======================================================
     ENERGY
====================================================== -->

<div class="panel energy-panel">

    <div class="box-title">ENERGY</div>

    <div class="info-row">
        <span>Daily</span>
        <span class="info-value" id="dailyKwh">0 kWh</span>
    </div>

    <div class="info-row">
        <span>Monthly</span>
        <span class="info-value" id="monthlyKwh">0 kWh</span>
    </div>

</div>

<!-- ======================================================
     GAUGE PV
====================================================== -->

<div class="panel gauge-panel">

    <div class="gauge-title">PV</div>

    <div class="gauge-wrap">

        <svg class="gauge-svg" viewBox="0 0 300 180">

            <path d="M40 150 A110 110 0 0 1 260 150"
                  fill="none"
                  stroke="#17398f"
                  stroke-width="22"
                  stroke-linecap="round"/>

        </svg>

        <div class="gauge-value">

            <div class="gauge-main" id="pvGaugePower">
                0W
            </div>

            <div class="gauge-sub">
                <div class="v" id="pvGaugeVolt">0V</div>
                <div class="a" id="pvGaugeAmp">0A</div>
            </div>

        </div>

    </div>

</div>

<!-- ======================================================
     GAUGE BATTERY
====================================================== -->

<div class="panel gauge-panel">

    <div class="gauge-title">BATTERY SOC</div>

    <div class="gauge-wrap">

        <svg class="gauge-svg" viewBox="0 0 300 180">

            <path d="M40 150 A110 110 0 0 1 260 150"
                  fill="none"
                  stroke="#17398f"
                  stroke-width="22"
                  stroke-linecap="round"/>

        </svg>

        <div class="gauge-value">

            <div class="gauge-main" id="batteryGauge">
                0%
            </div>

        </div>

    </div>

</div>

<!-- ======================================================
     GAUGE MPPT
====================================================== -->

<div class="panel gauge-panel">

    <div class="gauge-title">MPPT EFFICIENCY</div>

    <div class="gauge-wrap">

        <svg class="gauge-svg" viewBox="0 0 300 180">

            <path d="M40 150 A110 110 0 0 1 260 150"
                  fill="none"
                  stroke="#17398f"
                  stroke-width="22"
                  stroke-linecap="round"/>

        </svg>

        <div class="gauge-value">

            <div class="gauge-main" id="mpptGauge">
                0%
            </div>

        </div>

    </div>

</div>

</div>
</div>

<script>

/* =========================================
   NODE ANIMATION
========================================= */

let mainY = 110;
let dir = 1;

setInterval(() => {

    mainY += dir * 3;

    if(mainY >= 260) dir = -1;
    if(mainY <= 110) dir = 1;

    document.getElementById("nodeMain")
        .setAttribute("cy", mainY);

}, 40);

let side = 0;

setInterval(() => {

    side += 4;

    if(side > 70) side = 0;

    document.getElementById("nodeLeft")
        .setAttribute("cy", 350 + side);

    document.getElementById("nodeRight")
        .setAttribute("cy", 350 + side);

}, 50);

</script>

</body>
</html>
