<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
/>

<title>ISOKUIKI SMART MONITORING</title>

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:#020b1f;
color:#fff;
overflow:hidden;
height:100vh;
width:100vw;
}

/* MAIN */

.dashboard{
height:100vh;
width:100vw;
display:flex;
flex-direction:column;
padding:.4vw;
gap:.4vw;
overflow:hidden;
}

/* HEADER */

.header{
text-align:center;
height:10vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.title{
font-size:clamp(18px,2vw,38px);
font-weight:800;
color:#00ffe1;
text-shadow:
0 0 8px #00ffe1,
0 0 20px #00ffe1;
}

.online{
font-size:clamp(8px,.7vw,14px);
color:#00ff88;
margin-top:.2vh;
}

.device{
margin-top:.5vh;
width:min(40vw,500px);
height:4vh;
min-height:34px;
border:2px solid #00ffae;
border-radius:30px;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(11px,.9vw,18px);
font-weight:700;
background:#03132e;
box-shadow:
0 0 8px #00ffae,
0 0 20px rgba(0,255,174,.4);
}

/* BODY */

.main{
flex:1;
display:grid;
grid-template-columns:22% 78%;
gap:.5vw;
height:90vh;
overflow:hidden;
}

/* SCADA */

.scada-panel{
background:#04132c;
border-radius:16px;
padding:.5vw;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.scada-svg{
width:100%;
height:100%;
max-height:58vh;
}

/* FLOW */

.flow-line{
stroke:#2b7cff;
stroke-width:4;
fill:none;
stroke-linecap:round;
}

.node{
fill:#00ff88;
filter:drop-shadow(0 0 6px #00ff88);
}

/* DEVICE */

.device-circle{
fill:#071d3d;
stroke:#00ffe1;
stroke-width:3;
filter:drop-shadow(0 0 10px #00ffe1);
}

.circle-label{
fill:#00ffe1;
font-size:10px;
font-weight:700;
text-anchor:middle;
}

.circle-data{
fill:#ffffff;
font-size:8px;
text-anchor:middle;
}

/* RIGHT */

.right-panel{
display:flex;
flex-direction:column;
gap:.5vw;
overflow:hidden;
}

/* WIDGET */

.widgets{
display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(2,1fr);
gap:.4vw;
height:34%;
}

.card{
background:#04132c;
border-radius:14px;
padding:.45vw;
display:flex;
flex-direction:column;
justify-content:flex-start;
overflow:hidden;
box-shadow:
0 0 10px rgba(0,255,255,.08);
}

.card-title{
text-align:center;
color:#00ffe1;
font-size:clamp(11px,.8vw,18px);
font-weight:700;
margin-bottom:.3vh;
}

.row{
display:flex;
justify-content:space-between;
padding:.22vw 0;
font-size:clamp(9px,.72vw,15px);
border-bottom:1px solid rgba(255,255,255,.08);
}

/* CHARTS */

.charts{
height:66%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:.4vw;
}

.chart-card{
background:#04132c;
border-radius:14px;
padding:.4vw;
display:flex;
flex-direction:column;
overflow:hidden;
}

.chart-title{
text-align:center;
font-size:clamp(10px,.8vw,16px);
color:#00ffe1;
margin-bottom:.2vh;
}

.chart-wrap{
flex:1;
position:relative;
}

/* MOBILE */

@media(max-width:900px){

.dashboard{
padding:1vw;
gap:1vw;
}

.main{
grid-template-columns:34% 66%;
gap:1vw;
}

.widgets{
gap:1vw;
}

.charts{
gap:1vw;
}

.scada-svg{
max-height:48vh;
}

.device{
width:75vw;
font-size:12px;
}

}

</style>
</head>

<body>

<div class="dashboard">

<!-- HEADER -->

<div class="header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div
class="online"
id="onlineText"
>
ONLINE
</div>

<div
class="device"
id="deviceStatus"
>
DEVICE WORKING
</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- SCADA -->

<div class="scada-panel">

<svg
viewBox="0 0 300 500"
class="scada-svg"
>

<!-- LINE -->

<path
class="flow-line"
d="
M150 60
L150 150
M150 230
L150 310
M150 310
L80 310
L80 410
M150 310
L220 310
L220 410
"
/>

<!-- NODE -->

<circle id="node1" class="node" r="5"/>
<circle id="node2" class="node" r="5"/>
<circle id="node3" class="node" r="5"/>

<!-- PV -->

<circle
cx="150"
cy="50"
r="42"
class="device-circle"
/>

<text
x="150"
y="30"
class="circle-data"
id="pvVolt"
>0V</text>

<text
x="150"
y="46"
class="circle-data"
id="pvAmp"
>0A</text>

<text
x="150"
y="62"
class="circle-data"
id="pvPower"
>0W</text>

<text
x="150"
y="110"
class="circle-label"
>
PHOTOVOLTAIC
</text>

<!-- MPPT -->

<circle
cx="150"
cy="190"
r="42"
class="device-circle"
/>

<text
x="150"
y="180"
class="circle-data"
id="mpptW"
>0W</text>

<text
x="150"
y="200"
class="circle-data"
id="mpptEff"
>0%</text>

<text
x="150"
y="250"
class="circle-label"
>
MPPT
</text>

<!-- BATTERY -->

<circle
cx="80"
cy="450"
r="42"
class="device-circle"
/>

<text
x="80"
y="440"
class="circle-data"
id="batVolt"
>0V</text>

<text
x="80"
y="458"
class="circle-data"
id="batAmp"
>0A</text>

<text
x="80"
y="474"
class="circle-data"
id="batSoc"
>0%</text>

<text
x="80"
y="505"
class="circle-label"
>
BATTERY
</text>

<!-- ENERGY -->

<circle
cx="220"
cy="450"
r="42"
class="device-circle"
/>

<text
x="220"
y="450"
class="circle-data"
id="kwhDay"
>0</text>

<text
x="220"
y="468"
class="circle-data"
>
KWH
</text>

<text
x="220"
y="505"
class="circle-label"
>
ENERGY
</text>

</svg>

</div>

<!-- RIGHT -->

<div class="right-panel">

<!-- BOX -->

<div class="widgets">

<div class="card">
<div class="card-title">PHOTOVOLTAIC</div>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="card">

<div class="card-title">MPPT</div>

<div class="row">
<span>Charge</span>
<span id="charge">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="eff">0%</span>
</div>

</div>

<div class="card">

<div class="card-title">BATTERY</div>

<div class="row">
<span>Voltage</span>
<span id="bv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bi">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="soc">0%</span>
</div>

</div>

<div class="card">

<div class="card-title">ENERGY</div>

<div class="row">
<span>Daily</span>
<span id="day">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="month">0</span>
</div>

</div>

</div>

<!-- CHART -->

<div class="charts">

<div class="chart-card">
<div class="chart-title">
PV V / A / W
</div>
<div class="chart-wrap">
<canvas id="chart1"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">
Daily kWh
</div>
<div class="chart-wrap">
<canvas id="chart2"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">
Monthly kWh
</div>
<div class="chart-wrap">
<canvas id="chart3"></canvas>
</div>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
