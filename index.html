<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solar Hybrid Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0a0f1c;
  color:#00ffcc;
  font-family:Arial;
}
.card{
  display:inline-block;
  margin:10px;
  padding:15px;
  background:#111a2e;
  border-radius:10px;
  width:180px;
}
h1{color:#00ffcc;}
</style>
</head>

<body>

<h1>⚡ SOLAR HYBRID MONITOR JNGE</h1>

<div class="card">PV Volt<br><span id="pvv">0</span> V</div>
<div class="card">PV Amp<br><span id="pvi">0</span> A</div>
<div class="card">PV Power<br><span id="pvp">0</span> W</div>

<div class="card">Battery V<br><span id="bv">0</span> V</div>
<div class="card">Battery A<br><span id="ba">0</span> A</div>

<div class="card">kWh Day<br><span id="kd">0</span></div>
<div class="card">kWh Month<br><span id="km">0</span></div>

<canvas id="chart" height="120"></canvas>

<script>
let chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:[],
    datasets:[
      {label:"PV Power", data:[], borderColor:"#00ffcc"},
      {label:"Battery Power", data:[], borderColor:"#ffcc00"}
    ]
  }
});

async function load(){
  const res = await fetch("data.json");
  const d = await res.json();

  document.getElementById("pvv").innerText = d.pv_v;
  document.getElementById("pvi").innerText = d.pv_i;
  document.getElementById("pvp").innerText = d.pv_p;

  document.getElementById("bv").innerText = d.bat_v;
  document.getElementById("ba").innerText = d.bat_i;

  document.getElementById("kd").innerText = d.kwh_day;
  document.getElementById("km").innerText = d.kwh_month;

  let t = new Date().toLocaleTimeString();

  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(d.pv_p);
  chart.data.datasets[1].data.push(d.bat_p);

  if(chart.data.labels.length > 20){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }

  chart.update();
}

setInterval(load,3000);
load();
</script>

</body>
</html>
