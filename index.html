```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART ENERGY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000f2b;
font-family:'Orbitron',sans-serif;
color:#00ffff;
padding:14px;
overflow-x:hidden;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:14px;
max-width:1600px;
margin:auto;
}

.panel{
background:#001538;
border-radius:22px;
border:1px solid rgba(0,255,255,.12);
padding:14px;
box-shadow:
0 0 18px rgba(0,255,255,.05),
inset 0 0 15px rgba(0,255,255,.02);
}

.title-panel{
text-align:center;
font-size:15px;
margin-bottom:12px;
color:#00ffff;
}

.top-title{
text-align:center;
font-size:17px;
font-weight:700;
margin-bottom:5px;
text-shadow:0 0 10px #00ffff;
}

.status{
text-align:center;
font-size:11px;
font-weight:700;
margin-bottom:10px;
}

.online{
color:#7CFF00;
}

.offline{
color:#ff3b3b;
}

.device-box{
border:2px solid #00ffaa;
border-radius:14px;
padding:7px;
text-align:center;
font-size:11px;
color:#fff;
}

.data-row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:12px;
}

.scada-panel{
height:445px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.scada-svg{
width:100%;
height:100%;
}

.line{
stroke:#2aa3ff;
stroke-width:5;
fill:none;
}

.node{
fill:#00ff88;
filter:drop-shadow(0 0 8px #00ff88);
}

.circle{
fill:#021b40;
stroke:#00ffff;
stroke-width:4;
filter:drop-shadow(0 0 10px #00ffff);
}

.scada-label{
fill:#00ffff;
font-size:13px;
font-weight:700;
text-anchor:middle;
}

.scada-value{
fill:#ffffff;
font-size:18px;
font-weight:700;
text-anchor:middle;
}

.scada-sub{
fill:#7CFF00;
font-size:10px;
text-anchor:middle;
}

.gauge-box{
height:180px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.gauge-title{
font-size:13px;
margin-bottom:10px;
}

.gauge{
width:220px;
height:110px;
border-top-left-radius:220px;
border-top-right-radius:220px;
border:14px solid #19357a;
border-bottom:none;
position:relative;
overflow:hidden;
}

.gauge-value{
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
text-align:center;
}

.gauge-main{
font-size:17px;
font-weight:700;
color:#ffffff;
}

.gauge-sub{
font-size:10px;
line-height:15px;
}

.volt{
color:#00ffff;
}

.amp{
color:#7CFF00;
}

.watt{
color:#ffd000;
}

@media(max-width:768px){

.dashboard{
grid-template-columns:1fr;
}

.scada-panel{
height:390px;
}

.gauge{
width:180px;
height:90px;
border-width:12px;
}

.gauge-main{
font-size:15px;
}

.top-title{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="dashboard">

<div class="panel">

<div class="top-title">
ISOKUIKI SMART ENERGY
</div>

<div id="statusText" class="status online">
ONLINE
</div>

<div class="device-box">
DEVICE ACTIVE
</div>

</div>

<div class="panel">
<div class="title-panel">PHOTOVOLTAIC</div>

<div class="data-row">
<span>Voltage</span>
<span id="pvVoltageText">0V</span>
</div>

<div class="data-row">
<span>Current</span>
<span id="pvCurrentText">0A</span>
</div>

<div class="data-row">
<span>Power</span>
<span id="pvPowerText">0W</span>
</div>

</div>

<div class="panel">
<div class="title-panel">MPPT</div>

<div class="data-row">
<span>Charge</span>
<span id="mpptPowerText">0W</span>
</div>

<div class="data-row">
<span>Efficiency</span>
<span id="mpptEffText">0%</span>
</div>

</div>

<div class="panel">
<div class="title-panel">BATTERY</div>

<div class="data-row">
<span>Voltage</span>
<span id="batVoltageText">0V</span>
</div>

<div class="data-row">
<span>Current</span>
<span id="batCurrentText">0A</span>
</div>

<div class="data-row">
<span>SOC</span>
<span id="socText">0%</span>
</div>

</div>

<div class="panel scada-panel">

<svg class="scada-svg" viewBox="0 0 320 430">

<line class="line" x1="160" y1="80" x2="160" y2="155"/>
<line class="line" x1="160" y1="205" x2="160" y2="255"/>

<line class="line" x1="110" y1="255" x2="210" y2="255"/>
<line class="line" x1="110" y1="255" x2="110" y2="340"/>
<line class="line" x1="210" y1="255" x2="210" y2="340"/>

<circle class="circle" cx="160" cy="60" r="36"/>
<circle class="circle" cx="160" cy="185" r="36"/>
<circle class="circle" cx="110" cy="365" r="32"/>
<circle class="circle" cx="210" cy="365" r="32"/>

<text class="scada-label" x="160" y="20">PV PANEL</text>
<text class="scada-label" x="160" y="302">MPPT</text>
<text class="scada-label" x="110" y="418">BATTERY</text>
<text class="scada-label" x="210" y="418">LOAD</text>

<text class="scada-value" x="160" y="58" id="pvScadaPower">0W</text>
<text class="scada-sub" x="160" y="76" id="pvScadaVA">0V | 0A</text>

<text class="scada-value" x="160" y="183" id="mpptScadaPower">0W</text>
<text class="scada-sub" x="160" y="201" id="mpptScadaEff">0%</text>

<text class="scada-value" x="110" y="363" id="batScadaSoc">0%</text>
<text class="scada-sub" x="110" y="381" id="batScadaVA">0V | 0A</text>

<text class="scada-value" x="210" y="363" id="loadScadaPower">0W</text>
<text class="scada-sub" x="210" y="381" id="loadScadaVA">0V | 0A</text>

<circle class="node" r="5">
<animateMotion dur="3s" repeatCount="indefinite"
path="M160 80 L160 155"/>
</circle>

<circle class="node" r="5">
<animateMotion dur="4s" repeatCount="indefinite"
path="M160 205 L160 255 L110 255 L110 340"/>
</circle>

<circle class="node" r="5">
<animateMotion dur="4s" repeatCount="indefinite"
path="M160 205 L160 255 L210 255 L210 340"/>
</circle>

</svg>

</div>

<div class="panel">
<div class="title-panel">ENERGY</div>

<div class="data-row">
<span>Daily</span>
<span id="dailyEnergy">0 kWh</span>
</div>

<div class="data-row">
<span>Monthly</span>
<span id="monthlyEnergy">0 kWh</span>
</div>

</div>

<div class="panel gauge-box">

<div class="gauge-title">PV</div>

<div class="gauge">
<div class="gauge-value">

<div class="gauge-main" id="pvGaugePower">
0W
</div>

<div class="gauge-sub volt" id="pvGaugeVolt">
0V
</div>

<div class="gauge-sub amp" id="pvGaugeAmp">
0A
</div>

</div>
</div>

</div>

<div class="panel gauge-box">

<div class="gauge-title">BATTERY SOC</div>

<div class="gauge">
<div class="gauge-value">

<div class="gauge-main" id="socGauge">
0%
</div>

</div>
</div>

</div>

<div class="panel gauge-box">

<div class="gauge-title">MPPT EFFICIENCY</div>

<div class="gauge">
<div class="gauge-value">

<div class="gauge-main" id="effGauge">
0%
</div>

</div>
</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
```
