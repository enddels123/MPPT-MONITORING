<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLTS KERE HORE</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0a0f1c;
  color:#00ffcc;
  font-family:Arial;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111a2e;
  padding:15px;
  border-radius:12px;
}

.flow{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:20px;
}

.box{
  width:120px;
  height:80px;
  background:#111a2e;
  margin:0 10px;
  border-radius:10px;
}

.arrow{
  width:60px;
  height:4px;
  background:linear-gradient(90deg,#00ffcc,#00ff00);
  animation:move 1s infinite linear;
}

@keyframes move{
  0%{transform:translateX(-10px);opacity:0.2;}
  50%{opacity:1;}
  100%{transform:translateX(10px);opacity:0.2;}
}
</style>
</head>

<body>

<h2>⚡ JNGE SOLAR SCADA</h2>

<div class="flow">

  <div class="box">☀️ PV<br><span id="pv_p">0</span> W</div>
  <div class="arrow"></div>
  <div class="box">🔋 BAT<br><span id="bat_v">0</span> V</div>
  <div class="arrow"></div>
  <div class="box">⚡ LOAD</div>

</div>

<div class="grid">

  <div class="card">PV V <div id="pv_v"></div></div>
  <div class="card">PV I <div id="pv_i"></div></div>
  <div class="card">BAT I <div id="bat_i"></div></div>

  <div class="card">SOC <div id="soc"></div>%</div>
  <div class="card">kWh Day <div id="kwh_day"></div></div>
  <div class="card">kWh Month <div id="kwh_month"></div></div>

</div>

<canvas id="chart"></canvas>

<script src="app.js"></script>

</body>
</html>
