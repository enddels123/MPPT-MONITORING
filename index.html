
<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>ISOKUIKI SMART ENERGY</title>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
background:#021529;
font-family:Arial;
color:#fff;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#06233f;
padding:20px;
border-radius:15px;
}

h2{
color:#00ffff;
margin-bottom:15px;
}

.value{
font-size:24px;
font-weight:bold;
}

canvas{
width:100%;
max-width:220px;
height:140px;
}

</style>

</head>

<body>

<h1>ISOKUIKI SMART ENERGY</h1>

<h2 id="statusText">OFFLINE</h2>

<div class="grid">

<div class="card">
<h2>PV</h2>
<div id="pvVoltage">0V</div>
<div id="pvCurrent">0A</div>
<div id="pvPower">0W</div>
</div>

<div class="card">
<h2>BATTERY</h2>
<div id="batVoltage">0V</div>
<div id="batCurrent">0A</div>
<div id="batPower">0W</div>
<div id="batSoc">0%</div>
</div>

<div class="card">
<h2>LOAD</h2>
<div id="loadVoltage">0V</div>
<div id="loadCurrent">0A</div>
<div id="loadPower">0W</div>
</div>

<div class="card">
<h2>ENERGY</h2>
<div id="todayKwh">0</div>
<div id="monthKwh">0</div>
<div id="totalKwh">0</div>
</div>

<div class="card">
<h2>INCOME</h2>
<div id="todayRp">0</div>
<div id="monthRp">0</div>
<div id="totalRp">0</div>
</div>

<div class="card">
<h2>BATTERY SOC</h2>
<canvas id="socGauge"
width="220"
height="140">
</canvas>
</div>

<div class="card">
<h2>MPPT EFFICIENCY</h2>
<canvas id="effGauge"
width="220"
height="140">
</canvas>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
