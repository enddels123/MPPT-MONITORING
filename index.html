<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART MONITOR</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#050b18;

  color:white;

  font-family:'Orbitron',sans-serif;

  overflow-x:hidden;
}

.header{

  text-align:center;

  padding:20px;
}

.header h1{

  color:#00ffd5;

  font-size:32px;

  text-shadow:
  0 0 20px #00ffd5;
}

/* =====================================================
   FLOW
===================================================== */

.flow{

  display:flex;

  justify-content:center;

  align-items:center;

  flex-wrap:wrap;

  gap:15px;

  padding:20px;
}

/* =====================================================
   BOX
===================================================== */

.box{

  width:250px;

  background:#10192b;

  border-radius:20px;

  padding:20px;

  position:relative;

  overflow:hidden;

  box-shadow:
  0 0 25px rgba(0,255,200,0.15);

  transition:0.3s;
}

.box:hover{

  transform:translateY(-5px);
}

.box h2{

  text-align:center;

  margin-bottom:20px;

  color:#00ffd5;
}

/* =====================================================
   ANIMATION
===================================================== */

.energy-flow{

  position:absolute;

  width:100%;

  height:100%;

  top:0;
  left:0;

  pointer-events:none;
}

.dot{

  width:8px;

  height:8px;

  background:#00ff88;

  border-radius:50%;

  position:absolute;

  animation:moveDot 3s linear infinite;
}

.dot:nth-child(1){

  top:20%;
  animation-delay:0s;
}

.dot:nth-child(2){

  top:50%;
  animation-delay:1s;
}

.dot:nth-child(3){

  top:80%;
  animation-delay:2s;
}

@keyframes moveDot{

  0%{
    left:-10%;
    opacity:0;
  }

  20%{
    opacity:1;
  }

  100%{
    left:110%;
    opacity:0;
  }
}

/* =====================================================
   DATA
===================================================== */

.data{

  display:flex;

  justify-content:space-between;

  background:#151f34;

  padding:12px;

  border-radius:12px;

  margin-top:10px;
}

.label{

  color:#00ffd5;
}

.value{

  font-weight:bold;
}

/* =====================================================
   SOC
===================================================== */

.soc-container{

  margin-top:15px;
}

.soc-bar{

  width:100%;

  height:20px;

  background:#1b2436;

  border-radius:20px;

  overflow:hidden;
}

.soc-fill{

  width:0%;

  height:100%;

  background:
  linear-gradient(
  90deg,
  #00ff88,
  #00ffd5
  );

  transition:1s;
}

/* =====================================================
   STATUS
===================================================== */

.status{

  margin-top:15px;

  text-align:center;

  font-size:18px;

  font-weight:bold;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    opacity:0.5;
  }

  50%{
    opacity:1;
  }

  100%{
    opacity:0.5;
  }
}

/* =====================================================
   CHART
===================================================== */

.chart-area{

  width:95%;

  margin:auto;

  margin-top:20px;

  background:#10192b;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 0 25px rgba(0,255,200,0.15);
}

.chart-title{

  text-align:center;

  margin-bottom:20px;

  color:#00ffd5;
}

.chart-box{

  margin-bottom:30px;
}

/* =====================================================
   MOBILE
===================================================== */

@media(max-width:900px){

  .flow{

    flex-direction:column;
  }

  .box{

    width:95%;
  }
}

</style>

</head>

<body>

<div class="header">

  <h1>
    ISOKUIKI SMART MONITOR ⚡
  </h1>

</div>

<div class="flow">

  <!-- PV -->

  <div class="box">

    <div class="energy-flow">

      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <h2>☀️ PV PANEL</h2>

    <div class="data">

      <span class="label">
        Voltage
      </span>

      <span class="value"
      id="pv_v">

        0 V

      </span>

    </div>

    <div class="data">

      <span class="label">
        Current
      </span>

      <span class="value"
      id="pv_i">

        0 A

      </span>

    </div>

    <div class="data">

      <span class="label">
        Power
      </span>

      <span class="value"
      id="pv_p">

        0 W

      </span>

    </div>

  </div>

  <!-- MPPT -->

  <div class="box">

    <div class="energy-flow">

      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <h2>⚙️ MPPT</h2>

    <div class="data">

      <span class="label">
        Charge Power
      </span>

      <span class="value"
      id="charge_p">

        0 W

      </span>

    </div>

    <div class="data">

      <span class="label">
        Efficiency
      </span>

      <span class="value"
      id="mppt_eff">

        0 %

      </span>

    </div>

  </div>

  <!-- BATTERY -->

  <div class="box">

    <div class="energy-flow">

      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <h2>🔋 BATTERY</h2>

    <div class="data">

      <span class="label">
        Voltage
      </span>

      <span class="value"
      id="bat_v">

        0 V

      </span>

    </div>

    <div class="data">

      <span class="label">
        Current
      </span>

      <span class="value"
      id="bat_i">

        0 A

      </span>

    </div>

    <div class="data">

      <span class="label">
        SOC
      </span>

      <span class="value"
      id="soc">

        0 %

      </span>

    </div>

    <div class="soc-container">

      <div class="soc-bar">

        <div class="soc-fill"
        id="soc_fill">

        </div>

      </div>

    </div>

    <div class="status"
    id="battery_status">

      IDLE

    </div>

  </div>

  <!-- LOAD -->

  <div class="box">

    <div class="energy-flow">

      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <h2>⚡ LOAD</h2>

    <div class="data">

      <span class="label">
        Power
      </span>

      <span class="value"
      id="load_p">

        0 W

      </span>

    </div>

    <div class="data">

      <span class="label">
        Daily
      </span>

      <span class="value"
      id="kwh_day">

        0 kWh

      </span>

    </div>

    <div class="data">

      <span class="label">
        Monthly
      </span>

      <span class="value"
      id="kwh_month">

        0 kWh

      </span>

    </div>

  </div>

</div>

<div class="chart-area">

  <h2 class="chart-title">

    Hourly / Daily / Monthly Consumption

  </h2>

  <div class="chart-box">

    <canvas id="hourChart"></canvas>

  </div>

  <div class="chart-box">

    <canvas id="dayChart"></canvas>

  </div>

  <div class="chart-box">

    <canvas id="monthChart"></canvas>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
