<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>ISOKUIKI SMART ENERGY</title>

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
rel="stylesheet"
/>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(
180deg,
#000814,
#001233
);

height:100vh;

overflow:hidden;

color:white;
}

/* ====================================
MAIN
==================================== */

.dashboard{

width:100vw;
height:100vh;

display:grid;

grid-template-rows:
7vh 6vh 22vh 1fr;

gap:.7vh;

padding:.7vh;
}

/* ====================================
HEADER
==================================== */

.header{

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;
}

.title{

font-size:
clamp(18px,2vw,34px);

color:#00ffe1;

text-shadow:
0 0 10px #00ffe1,
0 0 20px #00ffe1;
}

#network{

font-size:
clamp(10px,.8vw,14px);

margin-top:.3vh;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4444;
}

/* ====================================
STATUS
==================================== */

.status-box{

width:min(60vw,520px);

margin:auto;

display:flex;

justify-content:center;
align-items:center;

border-radius:40px;

border:
3px solid #00ff99;

background:
rgba(0,20,40,.8);

box-shadow:
0 0 15px #00ff99;

font-size:
clamp(12px,1vw,20px);
}

/* ====================================
CHART
==================================== */

.top-charts{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:.7vh;
}

.chart-box{

background:
rgba(0,15,40,.85);

border-radius:16px;

padding:.5vh;

height:100%;
}

/* ====================================
BOTTOM
==================================== */

.bottom{

display:grid;

grid-template-columns:
24% 76%;

gap:.7vh;

height:100%;
}

/* ====================================
SCADA
==================================== */

.scada{

background:
rgba(0,10,30,.7);

border-radius:20px;

display:flex;

align-items:center;
justify-content:center;

overflow:hidden;
}

svg{

width:100%;
height:100%;
}

/* ====================================
FLOW
==================================== */

.flow{

stroke:#3b82f6;
stroke-width:5;
fill:none;
}

.node{

fill:#00ff88;

filter:
drop-shadow(0 0 8px #00ff88);
}

/* ====================================
NODE ANIMATION
==================================== */

#nodePV{

animation:
pvFlow 2s linear infinite;
}

#nodeBAT{

animation:
batFlow 2s linear infinite;
}

#nodeENERGY{

animation:
energyFlow 2s linear infinite;
}

@keyframes pvFlow{

0%{
transform:
translateY(-45px);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:
translateY(55px);
opacity:0;
}
}

@keyframes batFlow{

0%{
transform:
translate(0px,0px);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:
translate(-82px,102px);
opacity:0;
}
}

@keyframes energyFlow{

0%{
transform:
translate(0px,0px);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:
translate(82px,102px);
opacity:0;
}
}

/* ====================================
RIGHT
==================================== */

.right{

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

gap:.7vh;
}

/* ====================================
WIDGET
==================================== */

.widget{

background:
rgba(0,15,40,.85);

border-radius:18px;

padding:.8vh;

box-shadow:
0 0 10px rgba(0,255,255,.12);
}

.widget h3{

text-align:center;

color:#00ffe1;

font-size:
clamp(10px,.9vw,18px);

margin-bottom:.5vh;
}

.row{

display:flex;

justify-content:space-between;

padding:.4vh;

margin-bottom:.4vh;

background:
rgba(255,255,255,.04);

border-radius:8px;

font-size:
clamp(9px,.75vw,14px);
}

/* ====================================
SOC
==================================== */

.socbar{

height:9px;

background:#1e293b;

border-radius:20px;

overflow:hidden;

margin-top:.7vh;
}

.socfill{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffe1
);

transition:.5s;
}

/* ====================================
RESPONSIVE
==================================== */

@media(max-width:900px){

.dashboard{

grid-template-rows:
6vh 5vh 18vh 1fr;
}

.bottom{

grid-template-columns:
32% 68%;
}

.top-charts{

gap:.5vh;
}

.right{

gap:.5vh;
}

.widget{

padding:.6vh;
}

}

</style>
</head>

<body>

<div class="dashboard">

<!-- HEADER -->

<div class="header">

<div class="title">
ISOKUIKI SMART ENERGY
</div>

<div id="network"
class="offline">
OFFLINE
</div>

</div>

<!-- STATUS -->

<div
id="deviceStatus"
class="status-box">

DEVICE SHUTDOWN

</div>

<!-- CHART -->

<div class="top-charts">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="dayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="monthChart"></canvas>
</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<!-- SCADA -->

<div class="scada">

<svg viewBox="0 0 400 500">

<!-- FLOW -->

<path
d="
M200 100
L200 200
"
class="flow"
/>

<path
d="
M200 250
L110 250
L110 360
"
class="flow"
/>

<path
d="
M200 250
L290 250
L290 360
"
class="flow"
/>

<!-- NODE -->

<circle
id="nodePV"
cx="200"
cy="140"
r="6"
class="node"
/>

<circle
id="nodeBAT"
cx="200"
cy="250"
r="6"
class="node"
/>

<circle
id="nodeENERGY"
cx="200"
cy="250"
r="6"
class="node"
/>

<!-- PV -->

<circle
cx="200"
cy="60"
r="48"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="200"
y="45"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

☀

</text>

<text
x="200"
y="67"
fill="#fff"
font-size="11"
text-anchor="middle"
id="pv_v">

0V

</text>

<text
x="200"
y="84"
fill="#fff"
font-size="11"
text-anchor="middle"
id="pv_i">

0A

</text>

<text
x="200"
y="101"
fill="#fff"
font-size="11"
text-anchor="middle"
id="pv_p">

0W

</text>

<!-- MPPT -->

<circle
cx="200"
cy="200"
r="48"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="200"
y="190"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

⚙

</text>

<text
x="200"
y="214"
fill="#fff"
font-size="11"
text-anchor="middle"
id="charge_p">

0W

</text>

<text
x="200"
y="230"
fill="#fff"
font-size="11"
text-anchor="middle"
id="mppt_eff">

0%

</text>

<!-- BAT -->

<circle
cx="110"
cy="400"
r="48"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="110"
y="390"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

🔋

</text>

<text
x="110"
y="410"
fill="#fff"
font-size="11"
text-anchor="middle"
id="bat_v">

0V

</text>

<text
x="110"
y="426"
fill="#fff"
font-size="11"
text-anchor="middle"
id="bat_i">

0A

</text>

<text
x="110"
y="442"
fill="#fff"
font-size="11"
text-anchor="middle"
id="soc">

0%

</text>

<!-- ENERGY -->

<circle
cx="290"
cy="400"
r="48"
fill="#001b33"
stroke="#00ffe1"
stroke-width="3"
/>

<text
x="290"
y="392"
fill="#00ffe1"
font-size="18"
text-anchor="middle">

⚡

</text>

<text
x="290"
y="412"
fill="#fff"
font-size="11"
text-anchor="middle"
id="kwh_day">

0

</text>

<text
x="290"
y="428"
fill="#fff"
font-size="11"
text-anchor="middle"
id="kwh_month">

0

</text>

</svg>

</div>

<!-- RIGHT -->

<div class="right">

<div class="widget">

<h3>PHOTOVOLTAIC</h3>

<div class="row">
<span>Voltage</span>
<span id="pvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="pvi">0A</span>
</div>

<div class="row">
<span>Power</span>
<span id="pvp">0W</span>
</div>

</div>

<div class="widget">

<h3>MPPT</h3>

<div class="row">
<span>Charge</span>
<span id="cpp">0W</span>
</div>

<div class="row">
<span>Efficiency</span>
<span id="mpe">0%</span>
</div>

</div>

<div class="widget">

<h3>BATTERY</h3>

<div class="row">
<span>Voltage</span>
<span id="bvv">0V</span>
</div>

<div class="row">
<span>Current</span>
<span id="bii">0A</span>
</div>

<div class="row">
<span>SOC</span>
<span id="socc">0%</span>
</div>

<div class="socbar">
<div
id="socfill"
class="socfill">
</div>
</div>

</div>

<div class="widget">

<h3>ENERGY</h3>

<div class="row">
<span>Daily</span>
<span id="dayy">0</span>
</div>

<div class="row">
<span>Monthly</span>
<span id="monthh">0</span>
</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
