<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>ISOKUIKI</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
  background:#050b18;
  color:#00ffd5;
  font-family:'Orbitron',sans-serif;
  margin:0;
  padding:0;
  text-align:center;
}

h1{
  margin:20px;
}

.flow{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

.box{
  background:#101b33;
  width:170px;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 15px #00ffd533;
}

.arrow{
  width:60px;
  height:5px;
  background:linear-gradient(90deg,#00ffd5,#00ff00);
  animation:move 1s infinite linear;
}

@keyframes move{

  0%{
    transform:translateX(-10px);
  }

  100%{
    transform:translateX(10px);
  }
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#101b33;
  border-radius:15px;
  padding:20px;
}

.value{
  font-size:24px;
  margin-top:10px;
}

.status{
  font-size:26px;
  color:#00ff00;
}

canvas{
  margin:20px;
  background:#101b33;
  border-radius:20px;
}

</style>

</head>

<body>

<h1>⚡ISOKUIKI⚡</h1>

<div class="flow">

<div class="box">
☀️ PV<br><br>
<div id="pv_v">0 V</div>
<div id="pv_i">0 A</div>
<div id="pv_p">0 W</div>
</div>

<div class="arrow"></div>

<div class="box">
⚙️ MPPT<br><br>
<div id="charge_p">0 W</div>
<div id="mppt_eff">0 %</div>
</div>

<div class="arrow"></div>

<div class="box">
🔋 BATTERY<br><br>
<div id="bat_v">0 V</div>
<div id="bat_i">0 A</div>
<div id="soc">0 %</div>
</div>

<div class="arrow"></div>

<div class="box">
⚡ LOAD<br><br>
<div id="load_p">0 W</div>
<div id="status">IDLE</div>
</div>

</div>

<div class="grid">

<div class="card">
TODAY
<div class="value" id="kwh_day">0</div>
</div>

<div class="card">
MONTH
<div class="value" id="kwh_month">0</div>
</div>

<div class="card">
EFFICIENCY
<div class="value" id="eff2">0</div>
</div>

</div>

<canvas id="chart"></canvas>

<script src="app.js"></script>

</body>
</html>
