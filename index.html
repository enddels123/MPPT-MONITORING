<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ISOKUIKI SMART ENERGY</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#030712,
#071426
);

color:white;

font-family:'Orbitron',sans-serif;

overflow-x:hidden;
}

/* HEADER */

.header{

text-align:center;

padding:20px;
}

.header h1{

font-size:34px;

color:#00ffd5;

text-shadow:
0 0 25px #00ffd5;
}

/* NETWORK */

.network{

text-align:center;

margin-bottom:20px;

font-size:14px;
}

.online{
color:#00ff88;
}

.offline{
color:red;
}

/* STATUS */

.status-widget{

display:flex;

flex-direction:column;

align-items:center;

margin-bottom:25px;
}

.status-icon{

font-size:90px;

color:#00ff88;

text-shadow:
0 0 30px #00ff88;
}

.device-box{

margin-top:15px;

padding:15px 40px;

border-radius:15px;

background:
rgba(16,25,43,0.9);

border:
2px solid #00ff88;

font-size:24px;

font-weight:bold;

box-shadow:
0 0 25px rgba(0,255,150,0.3);

backdrop-filter:blur(12px);
}

/* FLOW */

.power-container{

display:flex;

flex-direction:column;

align-items:center;

margin-top:20px;

margin-bottom:40px;
}

.power-node{

width:100px;
height:100px;

border-radius:50%;

background:
rgba(16,25,43,0.8);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:40px;

border:
2px solid rgba(0,255,200,0.3);

box-shadow:
0 0 30px rgba(0,255,200,0.25);

backdrop-filter:blur(10px);
}

.power-node span{

font-size:12px;

margin-top:5px;

color:#00ffd5;
}

.line{

position:relative;

overflow:hidden;

background:#23304d;
}

.vertical{

width:6px;
height:80px;
}

.horizontal{

width:140px;
height:6px;

margin-top:50px;
}

.split-container{

display:flex;

gap:120px;
}

.split-side{

display:flex;

flex-direction:column;

align-items:center;
}

.particle{

position:absolute;

width:20px;
height:20px;

border-radius:50%;

background:#00ff88;

box-shadow:
0 0 20px #00ff88;

animation:
flowAnim 1.2s linear infinite;
}

.vertical .particle{

left:-7px;
}

.horizontal .particle{

top:-7px;
}

@keyframes flowAnim{

0%{
transform:
translate(-20px,-20px);

opacity:0;
}

50%{
opacity:1;
}

100%{
transform:
translate(150px,90px);

opacity:0;
}
}

/* WIDGET */

.flow{

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:20px;

padding:20px;
}

.box{

width:260px;

background:
rgba(16,25,43,0.85);

border-radius:20px;

padding:20px;

backdrop-filter:blur(10px);

box-shadow:
0 0 25px rgba(0,255,200,0.12);
}

.box h2{

text-align:center;

color:#00ffd5;

margin-bottom:20px;
}

.data{

display:flex;

justify-content:space-between;

background:#151f34;

padding:12px;

border-radius:12px;

margin-top:10px;
}

/* SOC */

.soc-bar{

width:100%;

height:24px;

background:#1c2740;

border-radius:20px;

overflow:hidden;

margin-top:15px;
}

.soc-fill{

width:0%;

height:100%;

background:
linear-gradient(
90deg,
#00ff88,
#00ffd5
);

transition:1s;
}

/* ALARM */

.alarm{

width:95%;

margin:auto;

margin-top:20px;

background:#3b0a0a;

color:#ffaaaa;

padding:15px;

border-radius:15px;

text-align:center;

display:none;
}

/* CHART */

.chart-area{

width:95%;

margin:auto;

margin-top:30px;

background:
rgba(16,25,43,0.9);

border-radius:20px;

padding:20px;
}

.chart-box{

height:300px;

margin-bottom:40px;
}

/* MOBILE */

@media(max-width:900px){

.flow{
flex-direction:column;
align-items:center;
}

.box{
width:95%;
}

.split-container{
gap:40px;
}

.horizontal{
width:90px;
}
}

</style>

</head>

<body>

<div class="header">

<h1>
ISOKUIKI SMART ENERGY 
</h1>

</div>

<div class="network">

<span id="network_status"
class="offline">

OFFLINE

</span>

</div>

<div class="status-widget">

<div class="status-icon">

⚡

</div>

<div class="device-box"
id="device_box">

DEVICE SHUTDOWN

</div>

</div>

<!-- FLOW -->

<div class="power-container">

<div class="power-node">
☀️
<span>PV</span>
</div>

<div class="line vertical">
<div class="particle"
id="pv_flow"></div>
</div>

<div class="power-node">
⚙️
<span>MPPT</span>
</div>

<div class="split-container">

<div class="split-side">

<div class="line horizontal">
<div class="particle"
id="bat_flow"></div>
</div>

<div class="power-node">
🔋
<span>BATTERY</span>
</div>

</div>

<div class="split-side">

<div class="line horizontal">
<div class="particle"
id="load_flow"></div>
</div>

<div class="power-node">
⚡
<span>ENERGY</span>
</div>

</div>

</div>

</div>

<!-- ALARM -->

<div class="alarm"
id="alarm_box">

LOW BATTERY WARNING

</div>

<!-- WIDGET -->

<div class="flow">

<div class="box">

<h2>☀️ PHOTOVOLTAIC</h2>

<div class="data">
<span>Voltage</span>
<span id="pv_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="pv_i">0</span>
</div>

<div class="data">
<span>Power</span>
<span id="pv_p">0</span>
</div>

</div>

<div class="box">

<h2>⚙️ MPPT</h2>

<div class="data">
<span>Charge Power</span>
<span id="charge_p">0</span>
</div>

<div class="data">
<span>Efficiency</span>
<span id="mppt_eff">0</span>
</div>

</div>

<div class="box">

<h2>🔋 BATTERY</h2>

<div class="data">
<span>Voltage</span>
<span id="bat_v">0</span>
</div>

<div class="data">
<span>Current</span>
<span id="bat_i">0</span>
</div>

<div class="data">
<span>SOC</span>
<span id="soc">0</span>
</div>

<div class="soc-bar">
<div class="soc-fill"
id="soc_fill"></div>
</div>

<div style="margin-top:15px;text-align:center"
id="battery_status">

STANDBY

</div>

</div>

<div class="box">

<h2>⚡ ENERGY</h2>

<div class="data">
<span>Total Power</span>
<span id="total_power">0</span>
</div>

<div class="data">
<span>Daily kWh</span>
<span id="kwh_day">0</span>
</div>

<div class="data">
<span>Monthly kWh</span>
<span id="kwh_month">0</span>
</div>

</div>

</div>

<div class="chart-area">

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyDayChart"></canvas>
</div>

<div class="chart-box">
<canvas id="energyMonthChart"></canvas>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
